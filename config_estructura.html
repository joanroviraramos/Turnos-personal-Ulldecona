<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f0f0f0;color:#1a1a1a;font-size:13px}
:root{
  --green:#1b5e20;--green-l:#e8f5e9;--border:#d0d0d0;--border-l:#e0e0e0;
  --white:#fff;--surface:#f8f8f8;--muted:#666;--faint:#999;--danger:#b71c1c;
}
.doc-header{background:var(--white);border-bottom:2px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.logo{font-size:13px;font-weight:700;color:var(--green);letter-spacing:.04em;text-transform:uppercase}
.title{font-size:13px;font-weight:600;color:#e65100}
.toolbar{background:var(--white);border-bottom:1px solid var(--border-l);padding:8px 16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{font-family:'Inter',sans-serif;font-size:12px;font-weight:600;padding:6px 14px;border-radius:4px;border:1px solid var(--border);cursor:pointer;background:var(--white);color:#333;transition:all .15s}
.btn:hover{background:#f5f5f5}
.btn-green{background:var(--green);color:var(--white);border-color:var(--green)}
.btn-green:hover{background:#145214}
.btn-danger{background:var(--danger);color:var(--white);border-color:var(--danger)}
.btn-danger:hover{background:#7f0000}
.main{padding:16px;max-width:1000px;margin:0 auto}
/* Tabs */
.dept-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.dept-tab{padding:6px 14px;border-radius:20px;border:1px solid var(--border-l);font-size:12px;font-weight:600;cursor:pointer;background:var(--white);color:var(--muted);transition:all .15s}
.dept-tab:hover{background:#f5f5f5}
.dept-tab.active{background:var(--green);color:var(--white);border-color:var(--green)}
/* Cards */
.section-card{background:var(--white);border:1px solid var(--border-l);border-radius:8px;margin-bottom:16px;overflow:hidden}
.section-header{background:var(--green);color:var(--white);font-size:12px;font-weight:700;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;text-transform:uppercase;letter-spacing:.05em}
.section-body{padding:12px}
/* Tabla items */
.item-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border-l)}
.item-row:last-child{border-bottom:none}
.item-id{font-size:10px;font-weight:700;color:var(--faint);width:80px;flex-shrink:0;font-family:monospace}
.item-label{flex:1;font-size:13px;font-weight:500}
.item-type{font-size:11px;color:var(--muted);width:90px;flex-shrink:0}
.item-color{width:20px;height:20px;border-radius:3px;flex-shrink:0}
.item-count{font-size:11px;color:var(--muted);width:70px;text-align:center}
.btn-sm{font-family:'Inter',sans-serif;font-size:11px;padding:3px 9px;border-radius:3px;border:1px solid var(--border);cursor:pointer;background:var(--white);transition:all .15s}
.btn-sm:hover{background:#f5f5f5}
.btn-sm.del{color:var(--danger);border-color:#ef9a9a}
.btn-sm.del:hover{background:#ffebee}
/* Form añadir */
.add-form{background:var(--surface);border:1px solid var(--border-l);border-radius:6px;padding:12px;margin-top:10px;display:none}
.add-form.show{display:block}
.form-row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
.form-group{display:flex;flex-direction:column;gap:3px}
.form-group label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.form-group input,.form-group select{font-family:'Inter',sans-serif;font-size:12px;border:1px solid var(--border);border-radius:4px;padding:5px 8px;background:var(--white)}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--green)}
/* Info especial para lineas */
.linea-badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700}
.badge-green{background:#e8f5e9;color:#1b5e20}
.badge-yellow{background:#fff8e1;color:#854F0B}
.badge-l2sub{background:#e3f2fd;color:#0d47a1}
/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1b5e20;color:var(--white);font-size:13px;font-weight:500;padding:10px 20px;border-radius:6px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999;white-space:nowrap}
.toast.show{opacity:1}
/* Loading */
.loading{text-align:center;padding:32px;color:var(--faint)}
/* Roles */
.roles-list{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.role-chip{background:var(--surface);border:1px solid var(--border-l);border-radius:12px;padding:2px 8px;font-size:11px;display:flex;align-items:center;gap:4px}
.role-chip .del-role{color:var(--danger);cursor:pointer;font-size:12px;font-weight:700;margin-left:2px}

/* Drag & drop */
.item-row[draggable]{cursor:grab}
.item-row[draggable]:active{cursor:grabbing}
.item-row.drag-over{border-top:2px solid var(--green);background:var(--green-l)}
.item-row.dragging{opacity:0.4}
.drag-handle{color:var(--faint);font-size:14px;cursor:grab;padding:0 4px;flex-shrink:0;user-select:none}
.drag-handle:hover{color:var(--muted)}
</style>

];

let config = null;
let currentDept = 'envasado';

// ─── CARGAR ───────────────────────────────────────────────────────────────────
async function cargarConfig() {
  try {
    const doc = await db.collection('config').doc('estructura').get();
    if (doc.exists) {
      config = doc.data();
      toast('✅ Configuración cargada de Firebase');
    } else {
      config = JSON.parse(JSON.stringify(CONFIG_DEFAULT));
      toast('📋 Usando configuración por defecto');
    }
  } catch(e) {
    config = JSON.parse(JSON.stringify(CONFIG_DEFAULT));
    toast('⚠️ Error Firebase, usando config por defecto');
  }
  renderTabs();
  renderDept(currentDept);
}

// ─── GUARDAR ──────────────────────────────────────────────────────────────────
async function guardarConfig() {
  document.getElementById('estado-txt').textContent = 'Guardando...';
  try {
    await db.collection('config').doc('estructura').set(config);
    document.getElementById('estado-txt').textContent = 'Guardado ' + new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
    toast('✅ Configuración guardada en Firebase');
  } catch(e) {
    toast('⚠️ Error al guardar: ' + e.message);
    document.getElementById('estado-txt').textContent = 'Error al guardar';
  }
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function renderTabs() {
  document.getElementById('dept-tabs').innerHTML = DEPTS.map(d =>
    `<button class="dept-tab ${d.id===currentDept?'active':''}" onclick="selectDept('${d.id}')">${d.label}</button>`
  ).join('');
}

function selectDept(id) {
  currentDept = id;
  renderTabs();
  renderDept(id);
}

// ─── RENDER DEPT ──────────────────────────────────────────────────────────────
function renderDept(id) {
  const dept = DEPTS.find(d => d.id === id);
  const c = document.getElementById('dept-content');
  if (dept.tipo === 'envasado') {
    c.innerHTML = renderEnvasado();
  } else if (dept.tipo === 'calidad') {
    c.innerHTML = renderCalidadSub(id, dept);
  } else {
    c.innerHTML = renderSimple(id, dept);
  }
  // Activar drag & drop en todos los section-body
  setTimeout(() => {
    document.querySelectorAll('.section-body').forEach(initDragDrop);
  }, 0);
}

// ─── RENDER ENVASADO ──────────────────────────────────────────────────────────
function renderEnvasado() {
  const e = config.envasado;
  let html = '';

  // Especiales TOP
  html += `<div class="section-card">
    <div class="section-header" style="background:#006064">
      <span>Puestos especiales — Parte superior</span>
      <button class="btn-sm" onclick="showFormEsp('top')" style="background:rgba(255,255,255,.2);color:white;border-color:rgba(255,255,255,.4)">+ Añadir</button>
    </div>
    <div class="section-body">
      ${e.especiales_top.map((p,i) => `
        <div class="item-row" draggable="true" data-i="${i}" data-zona="top" data-type="esp">
          <span class="drag-handle" title="Arrastrar para reordenar">⠿</span>
          <div class="item-id">${p.id}</div>
          <div class="item-label">${p.label}</div>

          <button class="btn-sm del" onclick="delEsp('top',${i})">✕ Quitar</button>
        </div>`).join('')}
      <div class="add-form" id="form-esp-top">
        <div class="form-row">
          <div class="form-group"><label>ID (sin espacios)</label><input id="esp-top-id" placeholder="ej: tol5" maxlength="20"></div>
          <div class="form-group"><label>Nombre</label><input id="esp-top-label" placeholder="ej: TOLVAS NAVE 5" style="width:220px"></div>
          <div class="form-group"><label>Tipo</label>
            <select id="esp-top-type"><option value="sup">Supervisor</option><option value="special" selected>Especial</option></select>
          </div>
          <button class="btn btn-green" onclick="addEsp('top')" style="align-self:flex-end">Añadir</button>
        </div>
      </div>
    </div>
  </div>`;

  // Líneas
  const mainLines = e.lineas.filter(l => !l.isL2sub);
  const l2subs    = e.lineas.filter(l => l.isL2sub);
  html += `<div class="section-card">
    <div class="section-header" style="background:#1b5e20">
      <span>Líneas de producción</span>
      <button class="btn-sm" onclick="showFormLinea(false)" style="background:rgba(255,255,255,.2);color:white;border-color:rgba(255,255,255,.4)">+ Añadir línea</button>
    </div>
    <div class="section-body">
      ${mainLines.map((l,i) => renderLineaRow(l, i, false)).join('')}
      <div class="add-form" id="form-linea-main">
        ${formLineaHTML('main')}
      </div>
    </div>
  </div>`;

  // Líneas L2 subgrupo
  html += `<div class="section-card">
    <div class="section-header" style="background:#1565c0">
      <span>Líneas L2 — Subgrupo</span>
      <button class="btn-sm" onclick="showFormLinea(true)" style="background:rgba(255,255,255,.2);color:white;border-color:rgba(255,255,255,.4)">+ Añadir L2.x</button>
    </div>
    <div class="section-body">
      ${l2subs.map((l,i) => renderLineaRow(l, i, true)).join('')}
      <div class="add-form" id="form-linea-l2sub">
        ${formLineaHTML('l2sub')}
      </div>
    </div>
  </div>`;

  // Especiales BOT
  html += `<div class="section-card">
    <div class="section-header" style="background:#006064">
      <span>Puestos especiales — Parte inferior</span>
      <button class="btn-sm" onclick="showFormEsp('bot')" style="background:rgba(255,255,255,.2);color:white;border-color:rgba(255,255,255,.4)">+ Añadir</button>
    </div>
    <div class="section-body">
      ${e.especiales_bot.map((p,i) => `
        <div class="item-row" draggable="true" data-i="${i}" data-zona="bot" data-type="esp">
          <span class="drag-handle" title="Arrastrar para reordenar">⠿</span>
          <div class="item-id">${p.id}</div>
          <div class="item-label">${p.label}</div>
          <div class="item-type">${p.type}</div>
          <button class="btn-sm del" onclick="delEsp('bot',${i})">✕ Quitar</button>
        </div>`).join('')}
      <div class="add-form" id="form-esp-bot">
        <div class="form-row">
          <div class="form-group"><label>ID (sin espacios)</label><input id="esp-bot-id" placeholder="ej: tol5" maxlength="20"></div>
          <div class="form-group"><label>Nombre</label><input id="esp-bot-label" placeholder="ej: TOLVAS NAVE 5" style="width:220px"></div>

  return html;
}

function renderLineaRow(l, i, isL2sub) {
  const colorBadge = `<span class="linea-badge badge-${l.color}">${l.color}</span>`;
  const roles = (l.roles||[{id:'maq',label:'OPERADOR/A MÁQUINA'},{id:'ops',label:'OPERARIO/A'}]);
  const rolesHTML = `<div class="roles-list">${roles.map((r,ri) =>
    `<div class="role-chip">${r.label}<span class="del-role" onclick="delRoleLinea('${l.id}',${ri})">✕</span></div>`
  ).join('')}
  <button class="btn-sm" onclick="addRoleLinea('${l.id}')" style="font-size:10px;padding:2px 6px">+ Rol</button>
  </div>`;
  return `<div class="item-row" draggable="true" data-id="${l.id}" data-type="linea" data-l2sub="${isL2sub}" style="align-items:flex-start;flex-direction:column;gap:4px">
    <div style="display:flex;align-items:center;gap:8px;width:100%">
      <span class="drag-handle" title="Arrastrar para reordenar">⠿</span>
      <div class="item-id">${l.id}</div>
      <div class="item-label" style="font-weight:700">${l.label}</div>
      ${colorBadge}
      ${isL2sub ? '<span class="linea-badge badge-l2sub">L2 sub</span>' : ''}
      <button class="btn-sm del" style="margin-left:auto" onclick="delLinea('${l.id}')">✕ Quitar</button>
    </div>
    <div style="padding-left:88px">${rolesHTML}</div>
  </div>`;
}

function formLineaHTML(key) {
  return `<div class="form-row">
    <div class="form-group"><label>ID</label><input id="linea-${key}-id" placeholder="ej: L8" maxlength="10"></div>
    <div class="form-group"><label>Etiqueta</label><input id="linea-${key}-label" placeholder="ej: L8" maxlength="10"></div>
    <div class="form-group"><label>Color</label>
      <select id="linea-${key}-color"><option value="green">Verde</option><option value="yellow">Amarillo</option></select>
    </div>
    <button class="btn btn-green" onclick="addLinea('${key}')" style="align-self:flex-end">Añadir línea</button>
  </div>`;
}

// ─── RENDER SIMPLE (dept sin líneas) ─────────────────────────────────────────
function renderCalidadSub(id, dept) {
  // Leer puestos del sub-key correcto de config.calidad
  const subKey = dept.subKey;
  if (!config.calidad) config.calidad = {};
  if (!config.calidad[subKey]) config.calidad[subKey] = [];
  const d = { puestos: config.calidad[subKey] };
  return renderSimpleData(id, dept, d, subKey);
}

function renderSimple(id, dept) {
  const d = config[id];
  if (!d) return '<div class="loading">Sin datos</div>';
  return renderSimpleData(id, dept, d, 'puestos');
}

function renderSimpleData(id, dept, d, puestosKey) {
  const puestos = d[puestosKey] || d.puestos || [];
  return `<div class="section-card">
    <div class="section-header" style="background:${dept.color}">
      <span>Puestos — ${dept.label}</span>
      <button class="btn-sm" onclick="showFormPuesto('${id}','${puestosKey}')" style="background:rgba(255,255,255,.2);color:white;border-color:rgba(255,255,255,.4)">+ Añadir puesto</button>
    </div>
    <div class="section-body">
      ${puestos.map((p,i) => `
        <div class="item-row" draggable="true" data-id="${p.id}" data-dept="${id}" data-type="puesto" data-key="${puestosKey}">
          <span class="drag-handle" title="Arrastrar para reordenar">⠿</span>
          <div class="item-id">${p.id}</div>
          <div class="item-label">${p.label}</div>
          <div class="item-type">${p.type}</div>
          <div class="item-count" title="Filas iniciales">${p.count||1} fila${(p.count||1)!==1?'s':''}</div>
          <button class="btn-sm del" onclick="delPuesto('${id}',${i},'${puestosKey}')">✕ Quitar</button>
        </div>`).join('')}
      <div class="add-form" id="form-puesto-${id}">
        <div class="form-row">
          <div class="form-group"><label>ID</label><input id="p-${id}-id" placeholder="ej: alm_nuevo" maxlength="20"></div>
          <div class="form-group"><label>Nombre</label><input id="p-${id}-label" placeholder="ej: NUEVO PUESTO" style="width:200px"></div>
          <div class="form-group"><label>Tipo</label>
            <select id="p-${id}-type">
              <option value="sup">Supervisor</option>
              <option value="green" selected>Verde</option>
              <option value="yellow">Amarillo</option>
            </select>
          </div>
          <div class="form-group"><label>Filas iniciales</label>
            <input id="p-${id}-count" type="number" min="1" max="20" value="1" style="width:60px">
          </div>
          <button class="btn btn-green" onclick="addPuesto('${id}')" style="align-self:flex-end">Añadir</button>
        </div>
      </div>
    </div>
  </div>`;
}

// ─── ACCIONES ─────────────────────────────────────────────────────────────────
function showFormEsp(zona) {
  const f = document.getElementById('form-esp-'+zona);
  f.classList.toggle('show');
}
function showFormLinea(isL2sub) {
  document.getElementById('form-linea-' + (isL2sub?'l2sub':'main')).classList.toggle('show');
}
function showFormPuesto(id) {
  document.getElementById('form-puesto-'+id).classList.toggle('show');
}

function sanitizeId(s) {
  return s.trim().toLowerCase().replace(/[^a-z0-9_\.]/g,'_');
}

// Especiales
function addEsp(zona) {
  const id    = sanitizeId(document.getElementById('esp-'+zona+'-id').value);
  const label = document.getElementById('esp-'+zona+'-label').value.trim().toUpperCase();
  const type  = document.getElementById('esp-'+zona+'-type').value;
  if (!id || !label) { toast('⚠️ Rellena ID y nombre'); return; }
  const arr = zona==='top' ? config.envasado.especiales_top : config.envasado.especiales_bot;
  if (arr.find(p => p.id === id)) { toast('⚠️ Ya existe ese ID'); return; }
  arr.push({id, label, type});
  renderDept(currentDept);
  toast('✅ Puesto añadido — recuerda guardar');
}
function delEsp(zona, i) {
  const arr = zona==='top' ? config.envasado.especiales_top : config.envasado.especiales_bot;
  if (!confirm('¿Quitar "'+arr[i].label+'"?')) return;
  arr.splice(i, 1);
  renderDept(currentDept);
  toast('🗑 Puesto eliminado — recuerda guardar');
}

// Líneas
function addLinea(key) {
  const isL2sub = key === 'l2sub';
  const id    = document.getElementById('linea-'+key+'-id').value.trim();
  const label = document.getElementById('linea-'+key+'-label').value.trim().toUpperCase();
  const color = document.getElementById('linea-'+key+'-color').value;
  if (!id || !label) { toast('⚠️ Rellena ID y etiqueta'); return; }
  if (config.envasado.lineas.find(l => l.id === id)) { toast('⚠️ Ya existe esa línea'); return; }
  config.envasado.lineas.push({
    id, label, color, isL2sub,
    roles:[{id:'maq',label:'OPERADOR/A MÁQUINA'},{id:'ops',label:'OPERARIO/A'}]
  });
  renderDept(currentDept);
  toast('✅ Línea añadida — recuerda guardar');
}
function delLinea(id) {
  if (!confirm('¿Quitar línea "'+id+'"?')) return;
  config.envasado.lineas = config.envasado.lineas.filter(l => l.id !== id);
  renderDept(currentDept);
  toast('🗑 Línea eliminada — recuerda guardar');
}

// Roles de línea
function addRoleLinea(lineaId) {
  const label = prompt('Nombre del nuevo rol (ej: CALIDAD LÍNEA):');
  if (!label || !label.trim()) return;
  const linea = config.envasado.lineas.find(l => l.id === lineaId);
  if (!linea) return;
  if (!linea.roles) linea.roles = [];
  const id = sanitizeId(label) + '_' + Date.now().toString(36);
  linea.roles.push({id, label: label.trim().toUpperCase()});
  renderDept(currentDept);
  toast('✅ Rol añadido — recuerda guardar');
}
function delRoleLinea(lineaId, ri) {
  const linea = config.envasado.lineas.find(l => l.id === lineaId);
  if (!linea || !linea.roles) return;
  if (linea.roles.length <= 1) { toast('⚠️ Debe haber al menos un rol'); return; }
  linea.roles.splice(ri, 1);
  renderDept(currentDept);
  toast('🗑 Rol eliminado — recuerda guardar');
}

// Puestos simples
function getPuestosArr(deptId, puestosKey) {
  const k = puestosKey || 'puestos';
  const dept = DEPTS.find(d => d.id === deptId);
  if (dept && dept.tipo === 'calidad') {
    if (!config.calidad) config.calidad = {};
    if (!config.calidad[k]) config.calidad[k] = [];
    return config.calidad[k];
  }
  if (!config[deptId]) config[deptId] = {puestos:[]};
  return config[deptId][k] || config[deptId].puestos;
}
function showFormPuesto(id, puestosKey) {
  document.getElementById('form-puesto-'+id).classList.toggle('show');
  document.getElementById('form-puesto-'+id).dataset.key = puestosKey || 'puestos';
}
function addPuesto(deptId) {
  const form = document.getElementById('form-puesto-'+deptId);
  const puestosKey = form ? form.dataset.key : 'puestos';
  const id    = sanitizeId(document.getElementById('p-'+deptId+'-id').value);
  const label = document.getElementById('p-'+deptId+'-label').value.trim().toUpperCase();
  const type  = document.getElementById('p-'+deptId+'-type').value;
  const count = parseInt(document.getElementById('p-'+deptId+'-count').value) || 1;
  if (!id || !label) { toast('⚠️ Rellena ID y nombre'); return; }
  const arr = getPuestosArr(deptId, puestosKey);
  if (arr.find(p => p.id === id)) { toast('⚠️ Ya existe ese ID'); return; }
  arr.push({id, label, type, count});
  renderDept(currentDept);
  toast('✅ Puesto añadido — recuerda guardar');
}
function delPuesto(deptId, i, puestosKey) {
  const arr = getPuestosArr(deptId, puestosKey || 'puestos');
  const p = arr[i];
  if (!confirm('¿Quitar "'+p.label+'"?')) return;
  arr.splice(i, 1);
  renderDept(currentDept);
  toast('🗑 Puesto eliminado — recuerda guardar');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}


// ─── DRAG & DROP ──────────────────────────────────────────────────────────────
let _dragSrc = null;

function initDragDrop(container) {
  const rows = container.querySelectorAll('.item-row[draggable]');
  rows.forEach(row => {
    row.addEventListener('dragstart', e => {
      _dragSrc = row;
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    row.addEventListener('dragend', () => {
      row.classList.remove('dragging');
      container.querySelectorAll('.item-row').forEach(r => r.classList.remove('drag-over'));
    });
    row.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      container.querySelectorAll('.item-row').forEach(r => r.classList.remove('drag-over'));
      if (row !== _dragSrc) row.classList.add('drag-over');
    });
    row.addEventListener('drop', e => {
      e.preventDefault();
      if (!_dragSrc || _dragSrc === row) return;
      row.classList.remove('drag-over');

      const type = _dragSrc.dataset.type;

      if (type === 'linea') {
        const isL2sub = _dragSrc.dataset.l2sub === 'true';
        const fromId = _dragSrc.dataset.id;
        const toId = row.dataset.id;
        const arr = isL2sub ? config.envasado.lineas.filter(l => l.isL2sub)
                            : config.envasado.lineas.filter(l => !l.isL2sub);
        const allLines = config.envasado.lineas;
        const fromIdx = allLines.findIndex(l => l.id === fromId);
        const toIdx   = allLines.findIndex(l => l.id === toId);
        if (fromIdx < 0 || toIdx < 0) return;
        const [item] = allLines.splice(fromIdx, 1);
        allLines.splice(toIdx, 0, item);
        config.envasado.lineas = allLines;

      } else if (type === 'puesto') {
        const deptId = _dragSrc.dataset.dept;
        const fromId = _dragSrc.dataset.id;
        const toId   = row.dataset.id;
        const arr = config[deptId] && config[deptId].puestos;
        if (!arr) return;
        const fromIdx = arr.findIndex(p => p.id === fromId);
        const toIdx   = arr.findIndex(p => p.id === toId);
        if (fromIdx < 0 || toIdx < 0) return;
        const [item] = arr.splice(fromIdx, 1);
        arr.splice(toIdx, 0, item);

      } else if (type === 'esp') {
        const zona = _dragSrc.dataset.zona;
        const arr = zona === 'top' ? config.envasado.especiales_top : config.envasado.especiales_bot;
        const fromI = parseInt(_dragSrc.dataset.i);
        const toI   = parseInt(row.dataset.i);
        if (isNaN(fromI) || isNaN(toI) || fromI === toI) return;
        const [item] = arr.splice(fromI, 1);
        arr.splice(toI, 0, item);
      }

      renderDept(currentDept);
      toast('↕ Orden actualizado — recuerda guardar');
    });
  });
}

// initDragDrop se llama desde selectDept y renderDept directamente

cargarConfig();
