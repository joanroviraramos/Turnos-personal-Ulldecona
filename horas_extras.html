// ─── CONFIG DINÁMICA DESDE FIREBASE ──────────────────────────────────────────
async function loadConfig() {
  try {
    const doc = await db.collection('config').doc('estructura').get();
    if (!doc.exists) return;
    const cfg = doc.data();

    // Actualizar envasado
    if (cfg.envasado) {
      if (cfg.envasado.especiales_top) { SPECIAL_TOP.length=0; cfg.envasado.especiales_top.forEach(p=>SPECIAL_TOP.push(p)); }
      if (cfg.envasado.especiales_bot) { SPECIAL_BOT.length=0; cfg.envasado.especiales_bot.forEach(p=>SPECIAL_BOT.push(p)); }
      ALL_SPECIALS.length=0; [...SPECIAL_TOP,...SPECIAL_BOT].forEach(p=>ALL_SPECIALS.push(p));
      if (cfg.envasado.lineas) {
        DEFAULT_LINES.length=0;
        cfg.envasado.lineas.forEach(l => DEFAULT_LINES.push({id:l.id,label:l.label,color:l.color,isL2sub:l.isL2sub||false,roles:l.roles||[]}));
      }
    }

    // Actualizar post depts
    const DEPT_META = {
      elaboracion:  {cls:'dept-elaboracion', deptKey:'elaboracion'},
      almacen:      {cls:'dept-almacen',     deptKey:'almacen'},
      mantenimiento:{cls:'dept-mto',         deptKey:'mantenimiento'},
      calidad:      {cls:'dept-calidad',     deptKey:'calidadlineas'},
      soplado:      {cls:'dept-soplado',     deptKey:'soplado'},
      mejora:       {cls:'dept-mejora',      deptKey:'mejoracontinua'},
    };
    POST_DEPTS.length=0;
    Object.entries(DEPT_META).forEach(([id, meta]) => {
      const d = cfg[id];
      if (!d || !d.puestos) return;
      const label = {elaboracion:'Elaboración',almacen:'Almacén',mantenimiento:'Mantenimiento',
                     calidad:'Calidad',soplado:'Soplado',mejora:'Mejora Continua'}[id]||id;
      POST_DEPTS.push({id, label, cls:meta.cls, deptKey:meta.deptKey, puestos:d.puestos});
    });
  } catch(e) { console.warn('loadConfig error:', e); }
}

const TURNOS = ['M','T','N','P'];
const TURNO_LABELS = {M:'Mañana',T:'Tarde',N:'Noche',P:'Partido'};

// ─── ESTADO ───────────────────────────────────────────────────────────────────
let lines = [];
let specialW = {};
let postW = {};

function mkW() { return {nombre:'', turno:'M', tipo:'pagar'}; }

function initState() {
  lines = DEFAULT_LINES.map(l => {
    const roles = l.roles && l.roles.length ? l.roles : [{id:'maq'},{id:'ops'}];
    const obj = {...l, roles};
    roles.forEach(r => { obj[r.id] = [mkW()]; });
    return obj;
  });
  specialW = {};
  ALL_SPECIALS.forEach(p => { specialW[p.id] = [mkW()]; });
  postW = {};
  POST_DEPTS.forEach(d => {
    postW[d.id] = {};
    d.puestos.forEach(p => { postW[d.id][p.id] = [mkW()]; });
  });
}

// ─── QUÉ MOSTRAR SEGÚN DEPT ───────────────────────────────────────────────────
function showEnvasado() {
  return ['admin','envasado'].includes(deptParam);
}
function showPostDept(dept) {
  if (deptParam === 'admin') return true;
  return deptParam === dept.deptKey ||
    (dept.id === 'calidad' && ['calidadlineas','calidadfq','calidadmicro','calidadmat'].includes(deptParam));
}


// ─── SELECTOR TIPO ───────────────────────────────────────────────────────────
function tipoSel(val, onchange) {
  const vPagar = val === 'pagar' ? ' selected' : '';
  const vComp  = val === 'compensar' ? ' selected' : '';
  return '<select class="turno-sel" style="width:108px;font-size:11px" onchange="' + onchange + '">' +
    '<option value="pagar"' + vPagar + '>💰 Pagar</option>' +
    '<option value="compensar"' + vComp + '>🏖 Compensar</option>' +
  '</select>';
}

function checkLimitesAntesDPublicar() {
  // Devuelve array de {nombre, total} que superan 60h
  const superan = [];
  const safeArr = a => Array.isArray(a) ? a : [];
  const nombres = new Set();

  // Recoger todos los nombres con tipo pagar del formulario actual
  ALL_SPECIALS.forEach(p => safeArr(specialW[p.id]).forEach(w => {
    if (w.nombre && w.tipo === 'pagar') nombres.add(w.nombre.trim().toUpperCase());
  }));
  lines.forEach(l => {
    const acRoles = l.roles && l.roles.length ? l.roles : [{id:'maq'},{id:'ops'}];
    acRoles.forEach(r => safeArr(l[r.id]).forEach(w => { if (w && w.nombre && w.tipo === 'pagar') nombres.add(w.nombre.trim().toUpperCase()); }));
  });
  POST_DEPTS.forEach(d => d.puestos.forEach(p => safeArr(postW[d.id][p.id]).forEach(w => {
    if (w.nombre && w.tipo === 'pagar') nombres.add(w.nombre.trim().toUpperCase());
  })));

  nombres.forEach(nombre => {
    const acum = getHorasPagar(nombre);
    const hoy  = getHorasHoy(nombre);
    const total = acum + hoy;
    if (total > 64) superan.push({ nombre, total });
  });
  return superan;
}

function renderAll() {
  let html = '';
  if (showEnvasado()) html += renderEnvasadoHTML();
  POST_DEPTS.forEach(d => { if (showPostDept(d)) html += renderPostDeptHTML(d); });
  document.getElementById('sections-container').innerHTML = html;
  mountPendingAcInputs();
}

function turnoSel(val, onchange) {
  let opts = '';
  TURNOS.forEach(function(t) {
    opts += '<option value="' + t + '"' + (val===t?' selected':'') + '>' + t + ' – ' + TURNO_LABELS[t] + '</option>';
  });
  return '<select class="turno-sel" onchange="' + onchange + '">' + opts + '</select>';
}

const _acRegistry = {};
let _acCounter = 0;
let _acPending = [];

function nombreInp(val, deptId, cbFn) {
  const uid = 'ac_' + (++_acCounter);
  _acRegistry[uid] = cbFn;
  _acPending.push({uid, val, deptId});
  return '<span id="' + uid + '" style="display:block;width:100%"></span>';
}

function regNombreInp(val, deptId, cbFn) {
  return nombreInp(val, deptId, cbFn);
}

function mountPendingAcInputs() {
  _acPending.forEach(function(item) {
    const span = document.getElementById(item.uid);
    if (!span) return;
    const cb = _acRegistry[item.uid];
    const acEl = makeAcInput(item.val, item.deptId, cb || function(){});
    span.replaceWith(acEl);
  });
  _acPending = [];
}



// ── ENVASADO ──────────────────────────────────────────────────────────────────
function renderEnvasadoHTML() {
  let html = `<div class="section-card">
    <div class="section-header dept-envasado">🏭 Envasado</div>
    <table class="extras-table">
    <thead><tr>
      <th style="width:55px;min-width:55px">Línea</th>
      <th style="width:120px;min-width:120px">Rol / Puesto</th>
      <th style="width:80px;min-width:80px">Turno</th>
      <th style="width:105px;min-width:105px">Tipo</th>
      <th style="min-width:180px">Trabajador/a</th>
      <th style="width:50px;min-width:50px;text-align:center">+/−</th>
    </tr></thead><tbody>`;

  // Especiales
  ALL_SPECIALS.forEach(puesto => {
    const arr = specialW[puesto.id] || [];
    const rc = puesto.type==='sup'?'row-sup':'row-special';
    arr.forEach((w,wi) => {
      html += `<tr class="${rc}">
        <td class="linea-label">${wi===0?'—':''}</td>
        <td class="puesto-label">${wi===0?puesto.label:''}</td>
        <td>${turnoSel(w.turno,"setSpT('" + puesto.id + "'," + wi + ",this.value)")}</td>
        <td>${tipoSel(w.tipo,"setSpTipo('" + puesto.id + "'," + wi + ",this.value)")}</td>
        <td style="min-width:0"><div style="width:100%">${regNombreInp(w.nombre,'envasado', function(v){setSpN(''+puesto.id,wi,v);})}</div></td>
        <td style="text-align:center;white-space:nowrap">
          <button class="ctrl-btn ctrl-add" onclick="addSp('${puesto.id}')">+</button>
          ${arr.length>1?`<button class="ctrl-btn ctrl-del" onclick="remSp('${puesto.id}',${wi})">−</button>`:''}
        </td>
      </tr>`;
    });
  });

  // Líneas
  lines.forEach(line => {
    const mg = line.color==='green'?'row-maq-g':'row-maq-y';
    const og = line.color==='green'?'row-green':'row-yellow';
    const lineRoles = line.roles && line.roles.length ? line.roles : [{id:'maq',label:'Op. Máquina'},{id:'ops',label:'Operario/a'}];
    // Asegurar arrays de workers para cada rol
    lineRoles.forEach(r => { if (!line[r.id]) line[r.id] = [mkW()]; });
    const totalRows = lineRoles.reduce((s,r) => s + (line[r.id]||[]).length, 0);
    let firstRoleRow = true;

    lineRoles.forEach((role, roleIdx) => {
      const rowCls = roleIdx===0 ? mg : og;
      const arr = line[role.id] || [];
      arr.forEach((w,wi) => {
        const rid = role.id; const lid = line.id;
        html += `<tr class="${rowCls}">
          ${firstRoleRow && wi===0 ? (firstRoleRow=false, `<td class="linea-label" rowspan="${totalRows}">${line.label}</td>`) : (firstRoleRow && (firstRoleRow=false), '')}
          <td class="rol-label">${role.label}</td>
          <td>${turnoSel(w.turno,"setLT('" + lid + "','" + rid + "'," + wi + ",this.value)")}</td>
          <td>${tipoSel(w.tipo,"setLTipo('" + lid + "','" + rid + "'," + wi + ",this.value)")}</td>
          <td style="min-width:0"><div style="width:100%">${regNombreInp(w.nombre,'envasado', function(v){setLN(''+lid,''+rid,wi,v);})}</div></td>
          <td style="text-align:center;white-space:nowrap">
            ${wi===arr.length-1?`<button class="ctrl-btn ctrl-add" onclick="addLRole('${lid}','${rid}')">+</button>`:''}
            ${arr.length>1&&wi===arr.length-1?`<button class="ctrl-btn ctrl-del" onclick="remLRole('${lid}','${rid}')">−</button>`:''}
          </td>
        </tr>`;
      });
    });
  });

  html += '</tbody></table></div>';
  return html;
}

// ─── SETTERS ──────────────────────────────────────────────────────────────────
function setSpN(id,wi,v){ specialW[id][wi].nombre=v.trim(); }
function setSpT(id,wi,v){ specialW[id][wi].turno=v; }
function setSpTipo(id,wi,v){ specialW[id][wi].tipo=v; renderAll(); }
function addSp(id){ specialW[id].push(mkW()); renderAll(); }
function remSp(id,wi){ specialW[id].splice(wi,1); if(!specialW[id].length) specialW[id]=[mkW()]; renderAll(); }

function getL(id){ return lines.find(l=>l.id===id); }
function setLN(lid,rol,wi,v){ const l=getL(lid); if(!l[rol])l[rol]=[]; l[rol][wi].nombre=v.trim(); }
function setLT(lid,rol,wi,v){ const l=getL(lid); if(!l[rol])l[rol]=[]; l[rol][wi].turno=v; }
function setLTipo(lid,rol,wi,v){ const l=getL(lid); if(!l[rol])l[rol]=[]; l[rol][wi].tipo=v; renderAll(); }
function addLRole(lid,rid){ const l=getL(lid); if(!l[rid])l[rid]=[]; l[rid].push(mkW()); renderAll(); }
function remLRole(lid,rid){ const l=getL(lid); if(!l[rid]||l[rid].length<=1)return; l[rid].splice(l[rid].length-1,1); renderAll(); }
function addLMaq(lid){ addLRole(lid,'maq'); }
function remLMaq(lid){ const l=getL(lid); if(l.maq.length>1) l.maq.pop(); renderAll(); }
function addLOps(lid){ getL(lid).ops.push(mkW()); renderAll(); }
function remLOps(lid){ const l=getL(lid); if(l.ops.length>1) l.ops.pop(); renderAll(); }

function setPN(did,pid,wi,v){ postW[did][pid][wi].nombre=v.trim(); renderAll(); }
function setPT(did,pid,wi,v){ postW[did][pid][wi].turno=v; }
function setPTipo(did,pid,wi,v){ postW[did][pid][wi].tipo=v; renderAll(); }
function addP(did,pid){ postW[did][pid].push(mkW()); renderAll(); }
function remP(did,pid,wi){ postW[did][pid].splice(wi,1); if(!postW[did][pid].length) postW[did][pid]=[mkW()]; renderAll(); }

// ─── FECHA BADGE ─────────────────────────────────────────────────────────────
function onFechaChange() {
  const fecha = document.getElementById('fecha-extra').value;
  const badge = document.getElementById('dia-badge');
  badge.className = 'dia-badge'; badge.textContent = '';
  if (!fecha) return;
  const dow = new Date(fecha+'T12:00:00').getDay();
  if      (FESTIVOS_2026.has(fecha))     { badge.classList.add('festivo'); badge.textContent='🔴 Festivo / Planta cerrada'; }
  else if (SABADOS_LABORABLES.has(fecha)){ badge.classList.add('sab-lab'); badge.textContent='🟢 Sábado laborable'; }
  else if (dow===0)                       { badge.classList.add('domingo'); badge.textContent='🟣 Domingo'; }
  else if (dow===6)                       { badge.classList.add('sabado');  badge.textContent='🟠 Sábado'; }
  cargarFecha(fecha);
}

// ─── BUILD PAYLOAD ────────────────────────────────────────────────────────────
function buildPayload() {
  const fecha = document.getElementById('fecha-extra').value;
  if (!fecha) return null;

  // Envasado
  const envSpecial = {};
  ALL_SPECIALS.forEach(p => {
    const con = specialW[p.id].filter(w=>w.nombre);
    if (con.length) envSpecial[p.id] = con;
  });
  const envLines = [];
  lines.forEach(l => {
    const roles = l.roles && l.roles.length ? l.roles : [{id:'maq'},{id:'ops'}];
    const lineOut = {id:l.id,label:l.label,color:l.color,isL2sub:l.isL2sub,roles};
    let hasData = false;
    roles.forEach(r => {
      const con = (l[r.id]||[]).filter(w=>w.nombre);
      lineOut[r.id] = con;
      if (con.length) hasData = true;
    });
    if (hasData) envLines.push(lineOut);
  });

  // Post depts
  const depts = {};
  POST_DEPTS.forEach(d => {
    const pCon = {};
    d.puestos.forEach(p => {
      const con = postW[d.id][p.id].filter(w=>w.nombre);
      if (con.length) pCon[p.id] = con;
    });
    if (Object.keys(pCon).length) depts[d.id] = pCon;
  });

  return {
    _version:1, tipo:'horas_extras', fecha,
    responsable: document.getElementById('responsable').value.trim(),
    timestamp: Date.now(),
    envasado: {special:envSpecial, lines:envLines},
    depts
  };
}

// ─── GUARDAR / PUBLICAR ───────────────────────────────────────────────────────
function guardar() {
  const p = buildPayload();
  if (!p) { toast('⚠️ Selecciona una fecha primero'); return; }
  localStorage.setItem('ubesol_extras_'+p.fecha, JSON.stringify(p));
  toast('💾 Guardado: '+formatFecha(p.fecha));
}

function publicar() {
  const p = buildPayload();
  if (!p) { toast('⚠️ Selecciona una fecha primero'); return; }
  _doPublicar(p);
}

function _doPublicar(p) {
  localStorage.setItem('ubesol_extras_'+p.fecha, JSON.stringify(p));
  db.collection('horas_extras').doc('extras_'+p.fecha).set(p)
    .then(()=>{ toast('✅ Publicado: '+formatFecha(p.fecha)); cargarHistorial(); })
    .catch(e=>toast('⚠️ Error: '+e.message));
}

function limpiarFormulario() {
  if (!confirm('¿Limpiar todos los datos?')) return;
  initState(); renderAll();
  document.getElementById('estado-txt').textContent='';
  toast('🗑 Formulario limpiado');
}

// ─── CARGAR FECHA ─────────────────────────────────────────────────────────────
function cargarFecha(fecha) {
  const raw = localStorage.getItem('ubesol_extras_'+fecha);
  if (raw) {
    try { applyPayload(JSON.parse(raw)); document.getElementById('estado-txt').textContent='📂 Cargado local'; return; }
    catch(e){}
  }
  db.collection('horas_extras').doc('extras_'+fecha).get()
    .then(doc => {
      if (doc.exists) { applyPayload(doc.data()); document.getElementById('estado-txt').textContent='☁️ Cargado Firebase'; }
      else { initState(); renderAll(); document.getElementById('estado-txt').textContent='Sin datos para este día'; }
    })
    .catch(()=>{ initState(); renderAll(); });
}

function applyPayload(d) {
  initState();
  if (!d) { renderAll(); return; }
  // Envasado especiales
  if (d.envasado && d.envasado.special) {
    Object.entries(d.envasado.special).forEach(([id,arr])=>{ if(specialW[id]) specialW[id]=arr; });
  }
  // Envasado líneas
  if (d.envasado && d.envasado.lines) {
    d.envasado.lines.forEach(sl => {
      const l = lines.find(x=>x.id===sl.id);
      if (l) { if(sl.maq&&sl.maq.length) l.maq=sl.maq; if(sl.ops&&sl.ops.length) l.ops=sl.ops; }
    });
  }
  // Post depts
  if (d.depts) {
    POST_DEPTS.forEach(dept => {
      if (d.depts[dept.id]) {
        Object.entries(d.depts[dept.id]).forEach(([pid,arr])=>{ if(postW[dept.id]&&postW[dept.id][pid]) postW[dept.id][pid]=arr; });
      }
    });
  }
  if (d.responsable) document.getElementById('responsable').value=d.responsable;
  renderAll();
}

// Mapeo deptParam -> qué secciones del documento tiene datos
function deptTienePersonas(d) {
  if (deptParam === 'admin') return true; // admin ve todo
  const safeArr = a => Array.isArray(a) ? a : [];
  const tieneNombre = arr => safeArr(arr).some(w => w && w.nombre && w.nombre.trim());

  if (deptParam === 'envasado') {
    if (Object.values(d.envasado&&d.envasado.special||{}).some(tieneNombre)) return true;
    if (safeArr(d.envasado&&d.envasado.lines).some(l => {
      const r2 = l.roles&&l.roles.length ? l.roles : [{id:'maq'},{id:'ops'}];
      return r2.some(r => tieneNombre(l[r.id]));
    })) return true;
    return false;
  }
  // Mapear deptParam al id interno del POST_DEPT
  const deptMap = {
    elaboracion:'elaboracion', almacen:'almacen', mantenimiento:'mantenimiento',
    calidadlineas:'calidad', calidadfq:'calidad', calidadmicro:'calidad', calidadmat:'calidad',
    soplado:'soplado', mejoracontinua:'mejora'
  };
  const deptId = deptMap[deptParam];
  if (!deptId || !d.depts || !d.depts[deptId]) return false;
  return Object.values(d.depts[deptId]).some(tieneNombre);
}

// Contar personas del departamento actual en un documento
function contarPersonasDept(d) {
  if (deptParam === 'admin') {
    let total = 0;
    Object.values(d.envasado&&d.envasado.special||{}).forEach(a=>total+=(a||[]).length);
    (d.envasado&&d.envasado.lines||[]).forEach(l=>total+=(l.maq||[]).length+(l.ops||[]).length);
    Object.values(d.depts||{}).forEach(dp=>Object.values(dp).forEach(a=>total+=(a||[]).length));
    return total;
  }
  const safeArr = a => Array.isArray(a) ? a : [];
  const contarArr = arr => safeArr(arr).filter(w => w && w.nombre && w.nombre.trim()).length;

  if (deptParam === 'envasado') {
    let t = 0;
    Object.values(d.envasado&&d.envasado.special||{}).forEach(a => t += contarArr(a));
    safeArr(d.envasado&&d.envasado.lines).forEach(l => {
      const r3 = l.roles&&l.roles.length ? l.roles : [{id:'maq'},{id:'ops'}];
      r3.forEach(r => { t += contarArr(l[r.id]); });
    });
    return t;
  }
  const deptMap = {
    elaboracion:'elaboracion', almacen:'almacen', mantenimiento:'mantenimiento',
    calidadlineas:'calidad', calidadfq:'calidad', calidadmicro:'calidad', calidadmat:'calidad',
    soplado:'soplado', mejoracontinua:'mejora'
  };
  const deptId = deptMap[deptParam];
  if (!deptId || !d.depts || !d.depts[deptId]) return 0;
  let t = 0;
  Object.values(d.depts[deptId]).forEach(a => t += contarArr(a));
  return t;
}

function cargarHistorial() {
  const list = document.getElementById('historial-list');
  list.innerHTML = '<div style="padding:16px;color:var(--faint);text-align:center">Cargando...</div>';
  db.collection('horas_extras').orderBy('fecha','desc').limit(60).get()
    .then(snap => {
      if (snap.empty) { list.innerHTML='<div style="padding:16px;color:var(--faint);text-align:center">No hay días publicados aún</div>'; return; }
      let html='';
      snap.forEach(doc => {
        const d=doc.data(); const fecha=d.fecha||'';
        // Filtrar por departamento
        if (!deptTienePersonas(d)) return;
        const total = contarPersonasDept(d);
        if (total === 0) return; // no mostrar si no hay personas de este dept
        const dow=fecha?new Date(fecha+'T12:00:00').getDay():-1;
        const esFest=FESTIVOS_2026.has(fecha); const esSabL=SABADOS_LABORABLES.has(fecha);
        const tlabel=esFest?'🔴 Festivo':esSabL?'🟢 Sáb.lab.':dow===0?'🟣 Domingo':'🟠 Sábado';
        const tbg=esFest?'#ffebee':esSabL?'#e8f5e9':dow===0?'#f3e5f5':'#fff3e0';
        const tcol=esFest?'#b71c1c':esSabL?'#1b5e20':dow===0?'#6a1b9a':'#e65100';
        html+=`<div class="historial-item" onclick="cargarDesdeHistorial('${fecha}')">
          <span class="fecha">${formatFecha(fecha)}</span>
          <span class="tipo-badge" style="background:${tbg};color:${tcol}">${tlabel}</span>
          <span style="color:var(--muted);font-size:11px">${total} persona${total!==1?'s':''}</span>
          <span style="margin-left:auto;font-size:11px;color:#999">${d.responsable||''}</span>
        </div>`;
      });
      list.innerHTML = html || '<div style="padding:16px;color:var(--faint);text-align:center">No hay días publicados para este departamento</div>';
    })
    .catch(()=>{ list.innerHTML='<div style="padding:16px;color:var(--faint);text-align:center">Error al cargar</div>'; });
}

function cargarDesdeHistorial(fecha) {
  document.getElementById('fecha-extra').value=fecha;
  onFechaChange();
  document.getElementById('historial-body').classList.remove('open');
  document.getElementById('historial-arrow').textContent='▶';
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function formatFecha(fecha) {
  if (!fecha) return '';
  const [y,m,d]=fecha.split('-');
  const dias=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  return `${dias[new Date(fecha+'T12:00:00').getDay()]} ${d}/${m}/${y}`;
}
function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

const DEPT_MAP = {
  envasado:       ["Envasado"],
  elaboracion:    ["Elaboración"],
  almacen:        ["Almacén"],
  mantenimiento:  ["Mantenimiento"],
  calidadlineas:  ["Calidad Líneas"],
  calidadfq:      ["Calidad Fís-Quím"],
  calidadmicro:   ["Calidad Microbiología"],
  calidadmat:     ["Calidad Materiales"],
  mejoracontinua: ["Mejora Continua"],
  soplado:        ["Soplado"],
  admin:          null, // null = todos
};

let usedNames = new Set();

function getWorkersForSection(deptId) {
  // deptId es el id del POST_DEPT o 'envasado'
  const deptToWData = {
    envasado:     ["Envasado"],
    elaboracion:  ["Elaboración"],
    almacen:      ["Almacén"],
    mantenimiento:["Mantenimiento"],
    calidad:      ["Calidad","Calidad Lineas","Calidad Líneas","Calidad FIS-QUim","Calidad Fís-Quím","Calidad Fisico Quimico","Calidad FQ","Calidad Microbiologia","Calidad Microbiología","Calidad Micro","Calidad Materiales","Calidad Mat"],
    soplado:      ["Soplado"],
    mejora:       ["Mejora Continua"],
  };
  const depts = deptToWData[deptId];
  if (!depts) return WORKERS_DATA;
  return WORKERS_DATA.filter(w => depts.includes(w.departamento));
}

function rebuildUsedNames() {
  usedNames = new Set();
  const add = v => { if(v&&v.trim()) usedNames.add(v.trim().toUpperCase()); };
  ALL_SPECIALS.forEach(p => (specialW[p.id]||[]).forEach(w => add(w.nombre)));
  lines.forEach(l => { l.maq.forEach(w=>add(w.nombre)); l.ops.forEach(w=>add(w.nombre)); });
  POST_DEPTS.forEach(d => d.puestos.forEach(p => (postW[d.id][p.id]||[]).forEach(w=>add(w.nombre))));
}

function makeAcInput(currentVal, deptId, onSelect) {
  const wrap = document.createElement('div');
  wrap.className = 'ac-wrap';

  const inp = document.createElement('input');
  inp.className = 'ac-inp';
  inp.type = 'text';
  inp.value = currentVal || '';
  inp.placeholder = 'Nombre trabajador/a...';
  inp.autocomplete = 'off';

  const list = document.createElement('div');
  list.className = 'ac-list';

  function showList(query) {
    rebuildUsedNames();
    const own = inp.value.trim().toUpperCase();
    if (own) usedNames.delete(own);
    const q = query.trim().toUpperCase();
    const workers = getWorkersForSection(deptId);
    const available = workers.filter(w => {
      const nu = w.nombre.toUpperCase();
      return (!q || nu.includes(q)) && !usedNames.has(nu);
    });
    list.innerHTML = '';
    if (!available.length) {
      list.innerHTML = '<div class="ac-empty">' + (q ? 'Sin resultados' : 'Todos asignados') + '</div>';
    } else {
      available.slice(0,30).forEach(w => {
        const item = document.createElement('div');
        item.className = 'ac-item';
        item.innerHTML = '<span class="ac-name">'+w.nombre+'</span><span class="ac-dni">'+w.dni+'</span>';
        item.onmousedown = e => {
          e.preventDefault();
          inp.value = w.nombre;
          onSelect(w.nombre);
          list.classList.remove('open');

        };
        list.appendChild(item);
      });
    }
    list.classList.add('open');
  }

  inp.addEventListener('focus', () => showList(inp.value));
  inp.addEventListener('click', () => showList(inp.value));
  inp.addEventListener('input', () => { onSelect(inp.value); showList(inp.value); });
  inp.addEventListener('blur', () => { setTimeout(() => list.classList.remove('open'), 200); });

  wrap.appendChild(inp);
  wrap.appendChild(list);
  return wrap;
}

loadConfig().then(async () => {
  // Cargar trabajadores de Firebase
  try {
    const snap = await db.collection('trabajadores').get();
    if (!snap.empty) {
      WORKERS_DATA.length = 0;
      snap.forEach(doc => {
        const d = doc.data();
        if (d.nombre && d.dni) {
          // Mapear departamento a los valores que usa horas_extras
          WORKERS_DATA.push({nombre:d.nombre, dni:d.dni, departamento:d.departamento||''});
        }
      });
      localStorage.setItem('ubesol_workers_cache', JSON.stringify(WORKERS_DATA));
    } else {
      const cache = localStorage.getItem('ubesol_workers_cache');
      if (cache) { WORKERS_DATA.length=0; JSON.parse(cache).forEach(w=>WORKERS_DATA.push(w)); }
    }
  } catch(e) {
    const cache = localStorage.getItem('ubesol_workers_cache');
    if (cache) { WORKERS_DATA.length=0; JSON.parse(cache).forEach(w=>WORKERS_DATA.push(w)); }
  }
  initState();
  renderAll();
  const hoy=new Date();
  document.getElementById('fecha-extra').value=
    hoy.getFullYear()+'-'+String(hoy.getMonth()+1).padStart(2,'0')+'-'+String(hoy.getDate()).padStart(2,'0');
  onFechaChange();
});
