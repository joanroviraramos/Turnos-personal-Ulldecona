<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel EPIs — GrupoUbesol</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f0f4f0;color:#1a1a1a;font-size:13px;min-height:100vh;}
.top-header{background:#2d5a1a;color:white;padding:16px 24px;display:flex;flex-direction:column;align-items:center;gap:2px;position:relative;}
.top-header h1{font-size:16px;font-weight:700;}
.top-header .sub{font-size:12px;opacity:.75;}
.btn-portal{position:absolute;left:16px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:white;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;text-decoration:none;}
.btn-portal:hover{background:rgba(255,255,255,0.25);}
.counters{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:20px 24px;}
.counter-card{background:white;border-radius:10px;padding:20px 24px;border:1px solid #e0e8e0;}
.counter-num{font-size:32px;font-weight:700;line-height:1;}
.counter-num.orange{color:#e65100;}.counter-num.green{color:#1b5e20;}.counter-num.blue{color:#1565c0;}
.counter-label{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-top:6px;}
.panel{background:white;margin:0 24px 24px;border-radius:10px;border:1px solid #e0e8e0;overflow:hidden;}
.toolbar{display:flex;align-items:center;gap:8px;padding:14px 16px;border-bottom:1px solid #eee;flex-wrap:wrap;}
.tab-btn{padding:7px 18px;border-radius:20px;border:1.5px solid #ddd;background:white;color:#666;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
.tab-btn.active{background:#1b5e20;color:white;border-color:#1b5e20;}
.tab-btn:hover:not(.active){background:#f5f5f5;}
.search-input{margin-left:auto;padding:7px 12px;border:1.5px solid #ddd;border-radius:6px;font-family:'Inter',sans-serif;font-size:12px;width:220px;outline:none;}
.search-input:focus{border-color:#1b5e20;}
table{width:100%;border-collapse:collapse;}
thead th{background:#f8faf8;border-bottom:2px solid #e0e8e0;padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;}
tbody tr{border-bottom:1px solid #f0f0f0;transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:#f8fdf8;}
tbody td{padding:10px 14px;vertical-align:middle;}
.empty-row td{text-align:center;color:#aaa;padding:40px;}
.tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;}
.tag-pend{background:#fff8e1;color:#e65100;border:1px solid #ffcc80;}
.tag-ok{background:#e8f5e9;color:#1b5e20;border:1px solid #a5d6a7;}
.tag-rech{background:#ffebee;color:#b71c1c;border:1px solid #ef9a9a;}
.btn-aprobar{background:#1b5e20;color:white;border:none;border-radius:5px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-aprobar:hover{background:#145214;}
.btn-rechazar{background:#b71c1c;color:white;border:none;border-radius:5px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin-left:4px;}
.btn-rechazar:hover{background:#7f0000;}
.btn-reabrir{background:white;color:#555;border:1px solid #ccc;border-radius:5px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-reabrir:hover{background:#f5f5f5;}
.btn-eliminar{background:white;color:#b71c1c;border:1px solid #ef9a9a;border-radius:5px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;margin-left:4px;}
.btn-eliminar:hover{background:#ffebee;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1b5e20;color:white;font-size:13px;font-weight:500;padding:10px 20px;border-radius:6px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999;}
.toast.show{opacity:1;}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f0f4f0;}
.login-card{background:white;border-radius:12px;border:1px solid #d0d8d0;padding:32px;max-width:360px;width:100%;}
.login-card .logo{font-size:11px;font-weight:700;color:#1b5e20;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;}
.login-card h2{font-size:18px;font-weight:700;margin-bottom:4px;}
.login-card .sub{font-size:12px;color:#888;margin-bottom:20px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.form-group input{width:100%;padding:9px 12px;border:1.5px solid #d0d0d0;border-radius:6px;font-family:'Inter',sans-serif;font-size:13px;outline:none;}
.form-group input:focus{border-color:#1b5e20;}
.btn-login{width:100%;padding:10px;background:#1b5e20;color:white;border:none;border-radius:6px;font-size:14px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;margin-top:4px;}
.btn-login:hover{background:#145214;}
.login-err{color:#b71c1c;font-size:12px;margin-top:8px;display:none;}
.login-err.show{display:block;}
</style>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyBnrOQqP83lotv-EozHuql704DU20m-wWU",authDomain:"maverick-turnos-81d4a.firebaseapp.com",projectId:"maverick-turnos-81d4a",storageBucket:"maverick-turnos-81d4a.firebasestorage.app",messagingSenderId:"170123467344",appId:"1:170123467344:web:142eee4473940ebd924f55"};
if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
</script>
</head>
<body>

<div class="login-wrap" id="login-section">
  <div class="login-card">
    <div class="logo">GrupoUbesol</div>
    <h2>Panel de EPIs</h2>
    <p class="sub">Acceso para responsables</p>
    <div class="form-group"><label>Usuario</label><input type="text" id="inp-user" placeholder="Tu usuario" autocomplete="username"></div>
    <div class="form-group"><label>Contraseña</label><input type="password" id="inp-pass" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn-login" onclick="doLogin()">Entrar</button>
    <div class="login-err" id="login-err">Usuario o contraseña incorrectos</div>
  </div>
</div>

<div id="panel-section" style="display:none;">
  <div class="top-header">
    <a class="btn-portal" href="index.html">‹ Portal</a>
    <h1>Panel de Aprobación de EPIs</h1>
    <div class="sub" id="panel-dept-label">—</div>
  </div>
  <div class="counters">
    <div class="counter-card"><div class="counter-num orange" id="cnt-pendientes">0</div><div class="counter-label">Pendientes</div></div>
    <div class="counter-card"><div class="counter-num green"  id="cnt-aprobadas">0</div><div class="counter-label">Aprobadas</div></div>
    <div class="counter-card"><div class="counter-num blue"   id="cnt-total">0</div><div class="counter-label">Total solicitudes</div></div>
  </div>
  <div class="panel">
    <div class="toolbar">
      <button class="tab-btn active" id="tab-todas"     onclick="setTab('todas')">Todas</button>
      <button class="tab-btn"        id="tab-pendiente" onclick="setTab('pendiente')">Pendientes</button>
      <button class="tab-btn"        id="tab-aprobado"  onclick="setTab('aprobado')">Aprobadas</button>
      <button class="tab-btn"        id="tab-rechazado" onclick="setTab('rechazado')">Rechazadas</button>
      <input class="search-input" id="search-input" placeholder="Buscar trabajador o EPI..." oninput="renderTabla()">
    </div>
    <table>
      <thead><tr>
        <th>Trabajador</th><th>EPI solicitado</th><th>Comentario</th><th>Fecha</th><th>Estado</th><th>Acciones</th>
      </tr></thead>
      <tbody id="tabla-body"></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let _responsable=null, _unsubscribe=null, _tabActual='todas', _allData={}, _trabajadores=[];

const RESPONSABLES=[
  {user:'admin',       pass:'ubesol2026', nombre:'Administrador',             departamento:'Administración', dept:'admin'},
  {user:'envasado',    pass:'env2026',    nombre:'Responsable Envasado',      departamento:'Envasado',       dept:'envasado'},
  {user:'elaboracion', pass:'elab2026',   nombre:'Responsable Elaboración',   departamento:'Elaboración',    dept:'elaboracion'},
  {user:'almacen',     pass:'alm2026',    nombre:'Responsable Almacén',       departamento:'Almacén',        dept:'almacen'},
  {user:'mto',         pass:'mto2026',    nombre:'Responsable Mantenimiento', departamento:'Mantenimiento',  dept:'mantenimiento'},
  {user:'callineas',   pass:'cal2026',    nombre:'Responsable Calidad Líneas',departamento:'Calidad Líneas', dept:'calidadlineas'},
  {user:'calfq',       pass:'calfq2026',  nombre:'Responsable Calidad FQ',    departamento:'Calidad FQ',     dept:'calidadfq'},
  {user:'calmicro',    pass:'micro2026',  nombre:'Responsable Calidad Micro', departamento:'Calidad Micro',  dept:'calidadmicro'},
  {user:'calmat',      pass:'calmat2026', nombre:'Responsable Calidad Mat.',  departamento:'Calidad Mat.',   dept:'calidadmat'},
  {user:'mejora',      pass:'mc2026',     nombre:'Responsable Mejora Cont.',  departamento:'Mejora Continua',dept:'mejoracontinua'},
  {user:'soplado',     pass:'sopl2026',   nombre:'Responsable Soplado',       departamento:'Soplado',        dept:'soplado'},
];

const LS_KEY='ubesol_portal_session';

(function(){
  const sess=JSON.parse(localStorage.getItem(LS_KEY)||'null');
  if(sess) mostrarPanel(sess);
})();

function doLogin(){
  const user=document.getElementById('inp-user').value.trim().toLowerCase();
  const pass=document.getElementById('inp-pass').value;
  const err=document.getElementById('login-err');
  if(!user||!pass){err.textContent='Introduce usuario y contraseña';err.classList.add('show');return;}
  const r=RESPONSABLES.find(r=>r.user===user&&r.pass===pass);
  if(!r){err.classList.add('show');document.getElementById('inp-pass').value='';return;}
  err.classList.remove('show');
  localStorage.setItem(LS_KEY,JSON.stringify(r));
  mostrarPanel(r);
}

function mostrarPanel(r){
  _responsable=r;
  document.getElementById('login-section').style.display='none';
  document.getElementById('panel-section').style.display='';
  document.getElementById('panel-dept-label').textContent=r.departamento;

  // Cargar trabajadores desde Firebase primero
  db.collection('trabajadores').get().then(snap=>{
    _trabajadores=[];
    snap.forEach(doc=>_trabajadores.push(doc.data()));
    // Luego escuchar EPIs en tiempo real
    if(_unsubscribe)_unsubscribe();
    _unsubscribe=db.collection('epis').doc('solicitudes').onSnapshot(function(snap){
      _allData=snap.exists?snap.data():{};
      actualizarContadores();
      renderTabla();
    },function(e){toast('⚠️ Error: '+e.message);});
  }).catch(e=>toast('⚠️ Error cargando trabajadores: '+e.message));
}

function getSolicitudes(){
  const isAdmin=_responsable.user==='admin';
  const miDept=(_responsable.departamento||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  let lista=[];
  Object.entries(_allData).forEach(([dni,epis])=>{
    if(!isAdmin){
      const t=_trabajadores.find(t=>t.dni===dni);
      if(!t)return;
      const deptT=(t.departamento||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      if(!deptT.includes(miDept)&&!miDept.includes(deptT))return;
    }
    const nombre=(_trabajadores.find(t=>t.dni===dni)||{}).nombre||dni;
    (epis||[]).forEach((e,idx)=>lista.push({dni,idx,nombre,...e}));
  });
  return lista;
}

function actualizarContadores(){
  const l=getSolicitudes();
  document.getElementById('cnt-pendientes').textContent=l.filter(s=>s.estado==='pendiente').length;
  document.getElementById('cnt-aprobadas').textContent=l.filter(s=>s.estado==='aprobado').length;
  document.getElementById('cnt-total').textContent=l.length;
}

function setTab(tab){
  _tabActual=tab;
  ['todas','pendiente','aprobado','rechazado'].forEach(t=>
    document.getElementById('tab-'+t).classList.toggle('active',t===tab));
  renderTabla();
}

function renderTabla(){
  let lista=getSolicitudes();
  if(_tabActual!=='todas')lista=lista.filter(s=>s.estado===_tabActual);
  const q=(document.getElementById('search-input').value||'').trim().toLowerCase();
  if(q)lista=lista.filter(s=>(s.nombre||'').toLowerCase().includes(q)||(s.tipo||'').toLowerCase().includes(q)||(s.dni||'').toLowerCase().includes(q));
  lista.sort((a,b)=>{const o={pendiente:0,aprobado:1,rechazado:2};const d=(o[a.estado]??3)-(o[b.estado]??3);return d!==0?d:(b.fecha||0)-(a.fecha||0);});
  const tbody=document.getElementById('tabla-body');
  if(!lista.length){tbody.innerHTML='<tr class="empty-row"><td colspan="6">No hay solicitudes</td></tr>';return;}
  tbody.innerHTML=lista.map(s=>{
    const fecha=s.fecha?new Date(s.fecha).toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'}):'—';
    const tagCls=s.estado==='pendiente'?'tag-pend':s.estado==='aprobado'?'tag-ok':'tag-rech';
    const tagLabel=s.estado==='pendiente'?'Pendiente':s.estado==='aprobado'?'Aprobada':'Rechazada';
    const acc=s.estado==='pendiente'
      ?`<button class="btn-aprobar" onclick="cambiarEstado('${s.dni}',${s.idx},'aprobado')">✓ Aprobar</button><button class="btn-rechazar" onclick="cambiarEstado('${s.dni}',${s.idx},'rechazado')">✗ Rechazar</button>`
      :`<button class="btn-reabrir" onclick="cambiarEstado('${s.dni}',${s.idx},'pendiente')">↺ Reabrir</button>`;
    const btnEliminar = _responsable.user==='admin'
      ? `<button class="btn-eliminar" onclick="eliminarSolicitud('${s.dni}',${s.idx})" title="Eliminar solicitud">🗑</button>`
      : '';
    return`<tr>
      <td><strong>${esc(s.nombre)}</strong><br><span style="color:#999;font-size:11px">${s.dni}</span></td>
      <td>${esc(s.tipo||'—')}${s.talla?'<br><span style="color:#999;font-size:11px">Talla: '+esc(s.talla)+'</span>':''}</td>
      <td style="color:#666;max-width:180px">${esc(s.nota||'—')}</td>
      <td style="white-space:nowrap">${fecha}</td>
      <td><span class="tag ${tagCls}">${tagLabel}</span></td>
      <td style="white-space:nowrap">${acc}${btnEliminar}</td>
    </tr>`;
  }).join('');
}

async function cambiarEstado(dni,idx,nuevoEstado){
  try{
    const docRef=db.collection('epis').doc('solicitudes');
    const snap=await docRef.get();
    const all=snap.exists?snap.data():{};
    if(!all[dni]||all[dni][idx]===undefined)return;
    all[dni][idx].estado=nuevoEstado;
    await docRef.set(all);
    const msg=nuevoEstado==='aprobado'?'✅ Solicitud aprobada':nuevoEstado==='rechazado'?'❌ Solicitud rechazada':'↺ Solicitud reabierta';
    toast(msg);
  }catch(e){toast('⚠️ Error: '+e.message);}
}

async function eliminarSolicitud(dni,idx){
  if(!confirm('¿Eliminar esta solicitud? Desaparecerá también de la app del trabajador.'))return;
  try{
    const docRef=db.collection('epis').doc('solicitudes');
    const snap=await docRef.get();
    const all=snap.exists?snap.data():{};
    if(!all[dni])return;
    all[dni].splice(idx,1);
    if(all[dni].length===0)delete all[dni];
    await docRef.set(all);
    toast('🗑 Solicitud eliminada');
  }catch(e){toast('⚠️ Error: '+e.message);}
}

function esc(s){return(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

document.getElementById('inp-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('inp-user').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('inp-pass').focus();});
</script>
</body>
</html>
