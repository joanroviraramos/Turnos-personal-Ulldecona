<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Limpiar datos</title></head>
<body>
<h2>Limpiando localStorage...</h2>
<script>
// Borrar TODAS las claves de ubesol (mantener sesiones de app)
const toDelete = [];
for (let i = 0; i < localStorage.length; i++) {
  const k = localStorage.key(i);
  if (k && k.startsWith('ubesol_') && !k.startsWith('ubesol_app_')) {
    toDelete.push(k);
  }
}
toDelete.forEach(k => localStorage.removeItem(k));
document.body.innerHTML = '<h2>✅ Limpiado. Claves borradas: ' + toDelete.length + '</h2><p>Claves borradas:</p><ul>' + toDelete.map(k=>'<li>'+k+'</li>').join('') + '</ul><br><a href="ubesol_envasado.html">Ir al cuadrante</a>';
</script>
</body>
</html>
