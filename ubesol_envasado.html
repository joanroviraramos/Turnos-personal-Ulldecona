<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planificación de Turnos — Grupo Ubesol</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #f0f0f0;
  --white: #ffffff;
  --border: #b0b0b0;
  --border-l: #d0d0d0;
  --text: #1a1a1a;
  --muted: #555;
  --faint: #999;

  /* Line background colors (alternating green / yellow like Excel) */
  --line-green: #e8f5e4;
  --line-yellow: #fffde7;
  --line-green-hdr: #c8e6c1;
  --line-yellow-hdr: #fff9c4;

  /* Turno colors */
  --m-bg: #e3f2fd; --m-bd: #90caf9; --m-tx: #0d47a1; --m-hdr: #bbdefb;
  --t-bg: #fff8e1; --t-bd: #ffe082; --t-tx: #e65100; --t-hdr: #ffecb3;
  --n-bg: #ede7f6; --n-bd: #b39ddb; --n-tx: #311b92; --n-hdr: #d1c4e9;
  --p-bg: #fce4ec; --p-bd: #f48fb1; --p-tx: #880e4f; --p-hdr: #f8bbd0;

  --sup-bg: #e0f7fa;
  --special-bg: #f3e5f5;
  --bajas-bg: #ffebee;
  --vac-bg: #e8f5e9;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 12px;
  padding: 0;
}

/* ── HEADER ── */
.doc-header {
  background: var(--white);
  border-bottom: 2px solid var(--border);
  padding: 16px 24px 12px;
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 20px;
}

.logo-area {
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.logo-text {
  display: flex;
  align-items: center;
  gap: 6px;
  line-height: 1;
}

.logo-grupo {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -.01em;
  color: #6a8a3a;
}

.logo-ubesol {
  font-size: 26px;
  font-weight: 900;
  letter-spacing: -.01em;
  color: #6a8a3a;
}

.logo-icons {
  display: flex;
  align-items: center;
  gap: 3px;
  margin-left: 4px;
}

.logo-icon {
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-sub {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--faint);
  margin-top: 1px;
}

.doc-title {
  text-align: center;
}

.doc-title h1 {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--muted);
}

.doc-title h2 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--text);
  margin-top: 2px;
}

.doc-meta {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 16px;
  font-size: 11px;
}

.meta-row { display: flex; align-items: center; gap: 6px; }
.meta-row label { font-weight: 600; color: var(--muted); white-space: nowrap; }
.meta-row input {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  border: 1px solid var(--border-l);
  border-radius: 3px;
  padding: 2px 6px;
  background: var(--white);
  color: var(--text);
  width: 100px;
  outline: none;
}
.meta-row input:focus { border-color: #666; }

/* ── DEPT TABS ── */
.dept-tabs {
  background: #e8e8e8;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 2px;
  padding: 8px 24px 0;
}

.tab {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
  padding: 7px 16px;
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: 5px 5px 0 0;
  cursor: pointer;
  background: #d8d8d8;
  color: var(--muted);
  transition: all .15s;
}

.tab:hover { background: #ebebeb; color: var(--text); }
.tab.active { background: var(--white); color: var(--text); border-bottom: 1px solid var(--white); margin-bottom: -1px; }
.tab.disabled { opacity: .4; cursor: default; }

/* ── MAIN TABLE AREA ── */
.table-area {
  padding: 20px 24px;
  overflow: visible;
}
.table-scroll-x {
  overflow-x: auto;
}

/* ── THE TABLE ── */
table {
  border-collapse: collapse;
  min-width: 900px;
  width: 100%;
  background: var(--white);
  border: 2px solid var(--border);
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}

/* Column widths */
col.c-linea  { width: 52px; }
col.c-puesto { width: 160px; }
col.c-m      { width: 1fr; }
col.c-t      { width: 1fr; }
col.c-n      { width: 1fr; }
col.c-p      { width: 1fr; }

/* ── TURNO HEADER ── */
thead tr.turno-hdr th {
  padding: 8px 10px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  border: 1px solid var(--border);
  text-align: center;
}

.th-linea { background: #f5f5f5; }
.th-puesto { background: #f5f5f5; }
.th-m  { background: var(--m-hdr); color: var(--m-tx); }
.th-t  { background: var(--t-hdr); color: var(--t-tx); }
.th-n  { background: var(--n-hdr); color: var(--n-tx); }
.th-p  { background: var(--p-hdr); color: var(--p-tx); }

/* ── DATA ROWS ── */
tbody td {
  border: 1px solid var(--border-l);
  padding: 0;
  vertical-align: middle;
}

/* Line label cell */
td.linea-label {
  font-size: 11px;
  font-weight: 700;
  text-align: center;
  color: var(--text);
  vertical-align: middle;
  border: 1px solid var(--border);
  padding: 4px;
}

/* Puesto label cell */
td.puesto-label {
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 600;
  color: #333;
  border: 1px solid var(--border-l);
  white-space: nowrap;
}

/* Name input cell */
td.name-cell {
  padding: 2px 4px;
}

.name-inp {
  width: 100%;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 400;
  padding: 4px 8px;
  border: none;
  outline: none;
  background: transparent;
  color: var(--text);
  cursor: text;
}

.name-inp::placeholder {
  color: #ccc;
  font-style: italic;
}

.name-inp:focus {
  background: rgba(255,255,255,.9);
  box-shadow: inset 0 0 0 1px #aaa;
  border-radius: 2px;
}

/* Row backgrounds by line type */
tr.line-maq { background: var(--line-green-hdr); }
tr.line-op  { background: var(--line-green); }
tr.line-maq.yellow { background: var(--line-yellow-hdr); }
tr.line-op.yellow  { background: var(--line-yellow); }

/* Special section rows */
tr.section-divider td {
  background: #e8e8e8;
  border-top: 2px solid var(--border);
  border-bottom: 2px solid var(--border);
  padding: 5px 10px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
}

tr.special-row { background: var(--special-bg); }
tr.special-row td.puesto-label { font-weight: 700; color: #4a0080; }
tr.sup-row { background: var(--sup-bg); }
tr.sup-row td.puesto-label { font-weight: 700; color: #006064; }
tr.bajas-row { background: var(--bajas-bg); }
tr.bajas-row td.puesto-label { font-weight: 700; color: #b71c1c; }
tr.vac-row { background: var(--vac-bg); }
tr.vac-row td.puesto-label { font-weight: 700; color: #1b5e20; }

/* Line header row (merged linea cell) */
.line-group td.linea-label {
  border-right: 2px solid var(--border);
  border-left: 2px solid var(--border);
}

/* Turno cell coloring */
td.cell-m { background: var(--m-bg) !important; }
td.cell-t { background: var(--t-bg) !important; }
td.cell-n { background: var(--n-bg) !important; }
td.cell-p { background: var(--p-bg) !important; }

/* ── ROW CONTROLS ── */
.row-controls {
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 1px 4px;
}

.del-row {
  width: 14px; height: 14px;
  border-radius: 2px;
  background: none;
  border: none;
  cursor: pointer;
  color: #ccc;
  font-size: 11px;
  display: flex; align-items: center; justify-content: center;
  padding: 0; line-height: 1;
  flex-shrink: 0;
  transition: all .12s;
  margin-left: auto;
}
.del-row:hover { color: #c00; background: #fde0e0; }

/* ── ROW CONTROL BUTTONS (+ and −) ── */
.ctrl-btn {
  width: 18px; height: 18px;
  border-radius: 3px;
  font-size: 14px;
  font-weight: 700;
  line-height: 1;
  border: 1px solid;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  transition: all .12s;
  flex-shrink: 0;
}
.ctrl-add {
  background: #e8f5e9;
  color: #2e7d32;
  border-color: #a5d6a7;
}
.ctrl-add:hover { background: #c8e6c9; border-color: #66bb6a; }
.ctrl-del {
  background: #fce4ec;
  color: #c62828;
  border-color: #f48fb1;
}
.ctrl-del:hover { background: #f8bbd0; border-color: #e57373; }

/* ── ADD LINE AREA ── */
.add-line-area {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  align-items: center;
}

.add-line-btn {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 5px;
  cursor: pointer;
  border: 1px dashed var(--border);
  background: var(--white);
  color: var(--muted);
  transition: all .15s;
  letter-spacing: .03em;
}
.add-line-btn:hover { background: #f0f0f0; color: var(--text); }

/* ── BOTTOM ACTIONS ── */
.bottom-bar {
  background: var(--white);
  border-top: 1px solid var(--border-l);
  padding: 12px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
  position: sticky;
  bottom: 0;
}

.legend {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}

.leg {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  color: var(--muted);
}

.leg-chip {
  width: 28px;
  height: 15px;
  border-radius: 3px;
  font-size: 8px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'IBM Plex Mono', monospace;
  border: 1px solid;
}

.btn-group { display: flex; gap: 8px; }

.btn {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 600;
  padding: 7px 16px;
  border-radius: 5px;
  cursor: pointer;
  border: 1px solid var(--border);
  letter-spacing: .03em;
  transition: all .15s;
}

.btn-sec { background: var(--white); color: var(--muted); }
.btn-sec:hover { background: #f0f0f0; color: var(--text); }
.btn-pri { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.btn-pri:hover { background: #333; }
.btn-pub { background: #1b5e20; color: #fff; border-color: #1b5e20; }
.btn-pub:hover { background: #2e7d32; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 70px;
  right: 24px;
  background: #1a1a1a;
  color: #fff;
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  transform: translateY(40px);
  opacity: 0;
  transition: all .25s;
  z-index: 999;
  pointer-events: none;
}
.toast.show { transform: translateY(0); opacity: 1; }

/* ── AUTOCOMPLETE ── */
.ac-wrap { position: relative; flex: 1; display: flex; align-items: center; min-width: 0; }
.ac-wrap input { width: 100%; }
.ac-list {
  position: absolute;
  top: calc(100% + 2px);
  left: 0;
  min-width: 260px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 6px;
  box-shadow: 0 4px 20px rgba(0,0,0,.15);
  z-index: 9999;
  max-height: 220px;
  overflow-y: auto;
  display: none;
}
.ac-list.open { display: block; }
.ac-item {
  padding: 7px 12px;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--border-l);
}
.ac-item:last-child { border-bottom: none; }
.ac-item:hover { background: #f0ede6; }
.ac-item.used { opacity: .35; pointer-events: none; background: #fafafa; }
.ac-item .ac-name { font-weight: 500; color: var(--text); }
.ac-item .ac-dni { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--faint); }
.ac-empty { padding: 8px 12px; font-size: 12px; color: var(--faint); font-style: italic; }

/* Permitir que el dropdown salga fuera de la celda */
.name-cell { overflow: visible !important; }
td.name-cell { overflow: visible !important; }

</style>

<!-- DOCUMENT HEADER -->
<div class="doc-header">
  <div class="logo-area">
    <div class="logo-text">

</div>

</div>

<!-- TABLE AREA -->

// ═══════════════════════════════════════════════════════════════════════
//  DATA MODEL — Envasado
//  Each line has:
//    - id, label (L1, L2, L2.1...), color ('green'|'yellow')
//    - maq: 1 Operador/a Máquina row (always 1)
//    - ops: N Operaria/o rows (variable, min 1)
//    - type: 'standard' | 'L2sub' (L2.1, L2.2 ... grouped under L2 block)
//
//  Special rows (no line): Supervisor, Tracking Nave1, Suministro, etc.
//  Bottom rows: Tolvas Nave3, Traslado Nave3, Tracking Nave3/4,
//               Componentes Nave4, Bajas, Vacaciones
// ═══════════════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════════════
//  WORKERS DATA — embebidos directamente (no requiere servidor)
//  Para actualizar: sustituir WORKERS_DATA con los datos reales
// ═══════════════════════════════════════════════════════════════════════
const WORKERS_DATA = [
  {nombre:"CARLOS MARTINEZ LOPEZ",dni:"12345678A",departamento:"Envasado"},
  {nombre:"MARIA GARCIA FERNANDEZ",dni:"23456789B",departamento:"Envasado"},
  {nombre:"JOSE RODRIGUEZ SANCHEZ",dni:"34567890C",departamento:"Envasado"},
  {nombre:"ANA LOPEZ MARTINEZ",dni:"45678901D",departamento:"Envasado"},

function getWorkersForDept(dept) {
  return allWorkers.filter(w => w.departamento === dept);
}

function rebuildUsedNames() {
  usedNames = new Set();
  const add = (v) => { if(v && v.trim()) usedNames.add(v.trim().toUpperCase()); };
  const safeArr = (a) => Array.isArray(a) ? a : [];

  // Envasado — lines tienen maq[] y ops[], cada worker tiene cells:{M,T,N,P}
  safeArr(lines).forEach(l => {
    [...safeArr(l.maq), ...safeArr(l.ops)].forEach(w => {
      if(w && w.cells) Object.values(w.cells).forEach(add);
    });
  });

  // Servicios transversales Envasado
  if (specialWorkers) Object.values(specialWorkers).forEach(arr =>
    safeArr(arr).forEach(w => { if(w && w.cells) Object.values(w.cells).forEach(add); }));

  // Todos los depts tipo post
  [elabWorkers, almWorkers, mtoWorkers, calWorkers, calfqWorkers,
   calmicroWorkers, calmatWorkers, mcWorkers, soplWorkers].forEach(obj => {
    if (!obj) return;
    Object.values(obj).forEach(arr => safeArr(arr).forEach(w => {
      if(w && w.cells) Object.values(w.cells).forEach(add);
    }));
  });

  // Bajas / vacaciones de todos los depts
  [bajas, vacaciones, elabBajas, elabVacaciones, almBajas, almVacaciones,
   mtoBajas, mtoVacaciones, calBajas, calVacaciones, calfqBajas, calfqVacaciones,
   calmicroBajas, calmicroVacaciones, calmatBajas, calmatVacaciones,
   mcBajas, mcVacaciones, soplBajas, soplVacaciones].forEach(arr => {
    safeArr(arr).forEach(w => { if(w && w.cells) Object.values(w.cells).forEach(add); });
  });
}

// ── AUTOCOMPLETE ENGINE ────────────────────────────────────────────────
function makeAcInput(currentVal, dept, onSelect, blockDuplicates = true) {
  const wrap = document.createElement('div');
  wrap.className = 'ac-wrap';

  const inp = document.createElement('input');
  inp.className = 'name-inp';
  inp.type = 'text';
  inp.value = currentVal || '';
  inp.placeholder = 'Nombre…';
  inp.autocomplete = 'off';

  const list = document.createElement('div');
  list.className = 'ac-list';

  function showList(query) {
    rebuildUsedNames();
    const own = inp.value.trim().toUpperCase();
    if (own) usedNames.delete(own);

    const q = query.trim().toUpperCase();
    const workers = getWorkersForDept(dept);

    const available = workers.filter(w => {
      const nameUpper = w.nombre.toUpperCase();
      const matchesQuery = !q || nameUpper.includes(q);
      // Si blockDuplicates: ocultar ya asignados. Si no: mostrar todos
      const notUsed = !blockDuplicates || !usedNames.has(nameUpper);
      return matchesQuery && notUsed;
    });

    list.innerHTML = '';
    if (!available.length) {
      list.innerHTML = `<div class="ac-empty">${q ? 'Sin resultados' : 'Todos los trabajadores ya están asignados'}</div>`;
    } else {
      available.slice(0, 30).forEach(w => {
        const item = document.createElement('div');
        item.className = 'ac-item';
        item.innerHTML = `<span class="ac-name">${w.nombre}</span><span class="ac-dni">${w.dni}</span>`;
        item.onmousedown = (e) => {
          e.preventDefault();
          selectedFromList = true;
          inp.value = w.nombre;
          onSelect(w.nombre);
          autoSave();
          list.classList.remove('open');
        };
        list.appendChild(item);
      });
    }
    list.classList.add('open');
  }

  let selectedFromList = false;

  inp.addEventListener('focus', () => showList(inp.value));
  inp.addEventListener('click', () => showList(inp.value));
  inp.addEventListener('input', () => { selectedFromList = false; onSelect(inp.value); showList(inp.value); });
  inp.addEventListener('blur', () => {
    setTimeout(() => {
      list.classList.remove('open');
      if (!selectedFromList && blockDuplicates) {
        const v = inp.value.trim().toUpperCase();
        if (v) {
          rebuildUsedNames();
          usedNames.delete(v);
          if (usedNames.has(v)) {
            inp.value = '';
            onSelect('');
            inp.style.boxShadow = 'inset 0 0 0 2px #e53e3e';
            setTimeout(() => inp.style.boxShadow = '', 1500);
          }
        }
      }
      autoSave();
      selectedFromList = false;
    }, 200);
  });

  wrap.appendChild(inp);
  wrap.appendChild(list);
  return { wrap, inp };
}

function render() {
  const root = document.getElementById('table-root');
  root.innerHTML = '';

  const tbl = document.createElement('table');
  tbl.innerHTML = `<colgroup>
    <col class="c-linea"><col class="c-puesto">
    <col class="c-m"><col class="c-t"><col class="c-n"><col class="c-p">
  </colgroup>`;

  // THEAD
  const thead = document.createElement('thead');
  thead.innerHTML = `<tr class="turno-hdr">
    <th class="th-linea">LÍNEA</th>
    <th class="th-puesto">PUESTO</th>
    <th class="th-m">TURNO MAÑANA</th>
    <th class="th-t">TURNO TARDE</th>
    <th class="th-n">TURNO NOCHE</th>
    <th class="th-p">TURNO PARTIDO / ESPECIAL</th>
  </tr>`;
  tbl.appendChild(thead);

  const tbody = document.createElement('tbody');

  // ── SUPERVISOR / SPECIAL TOP ROWS ──
  SPECIAL_TOP.forEach(puesto => {
    const arr = specialWorkers[puesto.id];
    arr.forEach((w, wi) => tbody.appendChild(buildExpandableRow(w, wi, puesto, arr)));
  });

  // Divider
  tbody.appendChild(buildDivider('Líneas de Producción'));

  // ── LINES ──
  // Separate L2sub lines to group them visually
  const mainLines = lines.filter(l => !l.isL2sub);
  const l2subs    = lines.filter(l => l.isL2sub);

  mainLines.forEach(line => renderLineRows(tbody, line));

  if(l2subs.length > 0) {
    tbody.appendChild(buildDivider('Líneas L2 — Subgrupo'));
    l2subs.forEach(line => renderLineRows(tbody, line));
  }

  // ── BOTTOM SPECIALS ──
  tbody.appendChild(buildDivider('Servicios Transversales'));
  SPECIAL_BOT.forEach(puesto => {
    const arr = specialWorkers[puesto.id];
    arr.forEach((w, wi) => tbody.appendChild(buildExpandableRow(w, wi, puesto, arr)));
  });

  // ── BAJAS ──
  tbody.appendChild(buildDivider('Bajas'));
  bajas.forEach((w, wi) => {
    tbody.appendChild(buildExpandableRow(w, wi, {id:'bajas', label:'BAJA', type:'bajas'}, bajas));
  });

  // ── VACACIONES ──
  tbody.appendChild(buildDivider('Vacaciones'));
  vacaciones.forEach((w, wi) => {
    tbody.appendChild(buildExpandableRow(w, wi, {id:'vacaciones', label:'VACACIONES', type:'vac'}, vacaciones));
  });

  tbl.appendChild(tbody);
  root.appendChild(tbl);
}

function renderLineRows(tbody, line) {
  const color = line.color;
  const totalRows = line.maq.length + line.ops.length;

  // ── OPERADOR/A MÁQUINA rows ──
  line.maq.forEach((w, wi) => {
    const tr = document.createElement('tr');
    tr.className = `line-maq${color==='yellow'?' yellow':''}`;

    // Line label cell — spans all rows of this line, only on first row
    if(wi === 0) {
      const tdLinea = document.createElement('td');
      tdLinea.className = 'linea-label';
      tdLinea.rowSpan = totalRows;
      tdLinea.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;gap:4px">
        <span>${line.label}</span>
        <button onclick="removeLine('${line.id}')" title="Eliminar línea"
          style="font-size:9px;color:#ccc;background:none;border:none;cursor:pointer;padding:0;transition:color .12s"
          onmouseover="this.style.color='#c00'" onmouseout="this.style.color='#ccc'">✕</button>
      </div>`;
      tr.appendChild(tdLinea);
    }

    // Puesto label + controls
    const tdPuesto = document.createElement('td');
    tdPuesto.className = 'puesto-label';
    tdPuesto.innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between;gap:4px">
      <span>OPERADOR/A MÁQUINA</span>
      <div style="display:flex;gap:2px;flex-shrink:0">
        ${line.maq.length > 1 && wi === line.maq.length-1
          ? `<button class="ctrl-btn ctrl-del" onclick="removeMaq('${line.id}')" title="Quitar operador/a máquina">−</button>`
          : ''}
        ${wi === line.maq.length-1
          ? `<button class="ctrl-btn ctrl-add" onclick="addMaq('${line.id}')" title="Añadir operador/a máquina">+</button>`
          : ''}
      </div>
    </div>`;
    tr.appendChild(tdPuesto);

    TURNOS.forEach(t => tr.appendChild(buildNameCell(w, t)));
    tbody.appendChild(tr);
  });

  // ── OPERARIA/O rows ──
  line.ops.forEach((w, wi) => {
    const tr = document.createElement('tr');
    tr.className = `line-op${color==='yellow'?' yellow':''}`;

    const tdPuesto = document.createElement('td');
    tdPuesto.className = 'puesto-label';
    tdPuesto.innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between;gap:4px">
      <span>OPERARIA/O</span>
      <div style="display:flex;gap:2px;flex-shrink:0">
        ${line.ops.length > 1 && wi === line.ops.length-1
          ? `<button class="ctrl-btn ctrl-del" onclick="removeOp('${line.id}')" title="Quitar operaria/o">−</button>`
          : ''}
        ${wi === line.ops.length-1
          ? `<button class="ctrl-btn ctrl-add" onclick="addOp('${line.id}')" title="Añadir operaria/o">+</button>`
          : ''}
      </div>
    </div>`;
    tr.appendChild(tdPuesto);

    TURNOS.forEach(t => tr.appendChild(buildNameCell(w, t)));
    tbody.appendChild(tr);
  });
}

function buildNameCell(worker, turno) {
  const td = document.createElement('td');
  td.className = `name-cell cell-${turno.toLowerCase()}`;
  const div = document.createElement('div');
  div.className = 'row-controls';
  const { wrap } = makeAcInput(
    worker.cells[turno] || '',
    currentTab,
    (val) => { worker.cells[turno] = val; },
    true   // bloquear duplicados igual que el resto de departamentos
  );
  div.appendChild(wrap);
  td.appendChild(div);
  return td;
}

  tdP.className = 'puesto-label';
  const isLast = wi === arr.length - 1;
  tdP.innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between;gap:4px">
    <span>${label}</span>
    ${isLast ? `<div style="display:flex;gap:2px;flex-shrink:0">
      ${arr.length > 1
        ? `<button class="ctrl-btn ctrl-del" onclick="removeSpecial('${puestoId}')" title="Quitar fila">−</button>`
        : ''}
      <button class="ctrl-btn ctrl-add" onclick="addSpecial('${puestoId}')" title="Añadir persona">+</button>
    </div>` : ''}
  </div>`;
  tr.appendChild(tdP);

  // Usar autocomplete igual que en los turnos
  TURNOS.forEach(t => {
    const td = document.createElement('td');
    td.className = `name-cell cell-${t.toLowerCase()}`;
    const div = document.createElement('div');
    div.className = 'row-controls';
    const { wrap } = makeAcInput(
      worker.cells[t] || '',
      currentTab,
      (val) => { worker.cells[t] = val; }
    );
    div.appendChild(wrap);
    td.appendChild(div);
    tr.appendChild(td);
  });

  return tr;
}

//  GUARDAR MANUAL
// ═══════════════════════════════════════════════════════════════════════
function guardarManual() {
  // 1. Guardar la semana activa
  autoSaveToKey(weekKey());

  // 2. Publicar TODAS las semanas con datos al histórico
  let count = 0;
  try {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('ubesol_') && !k.startsWith('ubesol_historico_') && k !== 'ubesol_publicado') {
        keys.push(k);
      }
    }
    keys.forEach(k => {
      const raw = localStorage.getItem(k);
      if (!raw) return;
      try {
        const d = JSON.parse(raw);
        if (!d || !d._version) return;
        const hk = 'ubesol_historico_' + d.ano + '_s' + String(d.semana).padStart(2,'0');
        localStorage.setItem(hk, raw);
        count++;
      } catch(e) {}
    });
  } catch(e) {
    console.error('guardarManual error:', e);
  }

  toast('💾 ' + count + ' semana' + (count !== 1 ? 's' : '') + ' guardada' + (count !== 1 ? 's' : '') + ' y publicadas');
}

function removeMaq(lineId) {

  line.maq.pop();

}

function addOp(lineId) {
  const line = lines.find(l => l.id === lineId);
  if(!line) return;

function removeLine(lineId) {

function addLine(type) {
  const isL2 = type === 'L2';
  const prefix = isL2 ? 'L2.' : 'L';
  const existing = lines.filter(l => l.isL2sub === isL2);
  const nums = existing.map(l => parseFloat(l.label.replace(/[^\d.]/g,''))).filter(n=>!isNaN(n));
  const next = nums.length ? Math.max(...nums) + 1 : (isL2 ? 2.11 : 8);
  const id = prefix + next;
  const colors = ['green','yellow'];
  const color = colors[lines.length % 2];
  lines.push(mkLine(id, id, color, isL2));
  render();
  toast('Línea ' + id + ' añadida');
}

// ═══════════════════════════════════════════════════════════════════════
//  DATES — calcula lunes a domingo a partir de semana + año ISO
// ═══════════════════════════════════════════════════════════════════════
function getWeekDates(year, week) {
  // ISO week: week 1 = week containing first Thursday of year
  const jan4 = new Date(year, 0, 4);
  const startOfW1 = new Date(jan4);
  startOfW1.setDate(jan4.getDate() - ((jan4.getDay() + 6) % 7));
  const monday = new Date(startOfW1);
  monday.setDate(startOfW1.getDate() + (week - 1) * 7);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  return { monday, sunday };
}

function fmtDate(d) {
  return String(d.getDate()).padStart(2,'0') + '/' +
         String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear();
}

function fmtISO(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function updateWeekFromSelector() {
  const year = parseInt(document.getElementById('meta-ano').value) || 2026;
  const week = parseInt(document.getElementById('meta-sem').value) || 1;
  const { monday, sunday } = getWeekDates(year, week);
  document.getElementById('meta-dates').textContent =
    'Del ' + fmtDate(monday) + ' al ' + fmtDate(sunday);
}

function changeWeek(delta) {
  // Guardar la semana ACTUAL con su clave correcta ANTES de tocar el selector
  const oldKey = weekKey();
  autoSaveToKey(oldKey);

  const sem = document.getElementById('meta-sem');
  let w = parseInt(sem.value) + delta;
  const year = parseInt(document.getElementById('meta-ano').value) || 2026;
  if (w < 1) {
    w = 52;
    document.getElementById('meta-ano').value = year - 1;
  } else if (w > 52) {
    w = 1;
    document.getElementById('meta-ano').value = year + 1;
  }
  sem.value = w;
  updateWeekFromSelector();
  loadWeekFromStorage();
}

// legacy compat — keep for any old references
function updateWeek() { updateWeekFromSelector(); }

function loadJSON(input) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if (!d._version) { toast('Fichero no válido'); return; }

      // ── Meta ──
      if (d.semana)       document.getElementById('meta-sem').value  = d.semana;
      if (d.ano)          document.getElementById('meta-ano').value  = d.ano;
      if (d.fecha_inicio) document.getElementById('meta-ini').value  = d.fecha_inicio;
      if (d.fecha_fin)    document.getElementById('meta-fin').value  = d.fecha_fin;
      if (d.responsable && document.getElementById('responsable')) document.getElementById('responsable').value = d.responsable;

      // ── Envasado ──
      if (d.envasado) {
        if (d.envasado.specialWorkers) Object.assign(specialWorkers, d.envasado.specialWorkers);
        if (d.envasado.lines)          lines      = d.envasado.lines;
        if (d.envasado.bajas)          bajas      = d.envasado.bajas;
        if (d.envasado.vacaciones)     vacaciones = d.envasado.vacaciones;

        if (d.elaboracion.bajas)      elabBajas      = d.elaboracion.bajas;
        if (d.elaboracion.vacaciones) elabVacaciones = d.elaboracion.vacaciones;

      // ── Almacén ──
      if (d.almacen) {
        if (d.almacen.workers)    Object.assign(almWorkers, d.almacen.workers);
        if (d.almacen.bajas)      almBajas      = d.almacen.bajas;
        if (d.almacen.vacaciones) almVacaciones = d.almacen.vacaciones;

        if (d.calidadFQ.bajas)      calfqBajas      = d.calidadFQ.bajas;
        if (d.calidadFQ.vacaciones) calfqVacaciones = d.calidadFQ.vacaciones;
      }
      // ── Calidad Micro ──
      if (d.calidadMicro) {
        if (d.calidadMicro.workers)    Object.assign(calmicroWorkers, d.calidadMicro.workers);
        if (d.calidadMicro.bajas)      calmicroBajas      = d.calidadMicro.bajas;
        if (d.calidadMicro.vacaciones) calmicroVacaciones = d.calidadMicro.vacaciones;
      }
      // ── Calidad Materiales ──
      if (d.calidadMat) {
        if (d.calidadMat.workers)    Object.assign(calmatWorkers, d.calidadMat.workers);
        if (d.calidadMat.bajas)      calmatBajas      = d.calidadMat.bajas;

        if (d.mejoraContinua.bajas)      mcBajas      = d.mejoraContinua.bajas;
        if (d.mejoraContinua.vacaciones) mcVacaciones = d.mejoraContinua.vacaciones;

function publicar() {
  // ── Buscar duplicados ─────────────────────────────────────────────
  const count = {};
  const add = (v, dept) => {
    if (!v || !v.trim()) return;
    const k = v.trim().toUpperCase();
    if (!count[k]) count[k] = { nombre: v.trim(), depts: [] };
    count[k].depts.push(dept);
  };
  const safeArr = (a) => Array.isArray(a) ? a : [];

  // Envasado lines — tienen maq[] y ops[], no groups[]
  safeArr(lines).forEach(l => {
    [...safeArr(l.maq), ...safeArr(l.ops)].forEach(w => {
      if (w && w.cells) TURNOS.forEach(t => add(w.cells[t], 'Envasado / ' + l.label));
    });
  });
  // Especiales Envasado
  if (specialWorkers) Object.values(specialWorkers).forEach(arr =>
    safeArr(arr).forEach(w => { if(w && w.cells) TURNOS.forEach(t => add(w.cells[t], 'Envasado / Especiales')); }));
  // Post depts
  const postDepts = [
    [elabWorkers,    'Elaboración'],
    [almWorkers,     'Almacén'],
    [mtoWorkers,     'Mantenimiento'],
    [calWorkers,     'Calidad Líneas'],
    [calfqWorkers,   'Calidad Fís-Quím'],
    [calmicroWorkers,'Calidad Microbiología'],
    [calmatWorkers,  'Calidad Materiales'],
    [mcWorkers,      'Mejora Continua'],
    [soplWorkers,    'Soplado'],
  ];
  postDepts.forEach(([obj, label]) => {
    if (!obj) return;
    Object.values(obj).forEach(arr => safeArr(arr).forEach(w => {
      if(w && w.cells) TURNOS.forEach(t => add(w.cells[t], label));
    }));
  });

  // Encontrar nombres que aparecen más de una vez
  const duplicados = Object.values(count).filter(d => d.depts.length > 1);

  if (duplicados.length > 0) {
    // Mostrar modal de aviso
    const msg = duplicados.map(d =>
      `• ${d.nombre} — aparece ${d.depts.length} veces (${d.depts.join(', ')})`
    ).join('\n');

    const continuar = confirm(
      '⚠️ ATENCIÓN — Se han encontrado ' + duplicados.length + ' trabajador(es) duplicado(s):\n\n' +
      msg + '\n\n' +
      '¿Desea publicar el cuadrante igualmente?'
    );
    if (!continuar) return;
  }

  autoSave();

  const payload = buildPayload();

  try {
    const json = JSON.stringify(payload, null, 2);

    // Guardar en histórico local
    const historicoKey = 'ubesol_historico_' + payload.ano + '_s' + String(payload.semana).padStart(2,'0');
    localStorage.setItem(historicoKey, json);

    // Guardar en Firebase para sincronización entre dispositivos
    try {
      const deptKey = (payload.dept || currentTab || 'Envasado').toLowerCase()
        .replace(/\s+/g,'').replace(/á/g,'a').replace(/é/g,'e')
        .replace(/í/g,'i').replace(/ó/g,'o').replace(/ú/g,'u').replace(/ñ/g,'n');
      const semKey = payload.ano + '_s' + String(payload.semana).padStart(2,'0');
      db.collection('cuadrantes').doc(deptKey + '_' + semKey).set(payload)
        .then(function(){ console.log('Publicado en Firebase: ' + deptKey + '_' + semKey); })
        .catch(function(e){ console.warn('Firebase error:', e); });
    } catch(e) { console.warn('Firebase sync error:', e); }

    toast(duplicados.length > 0
      ? `⚠️ Cuadrante semana ${payload.semana} publicado con ${duplicados.length} duplicado(s)`
      : `✓ Cuadrante semana ${payload.semana} publicado correctamente`);

  } catch(e) {
    toast('⚠️ Error al publicar: ' + e.message);
  }
}

  document.getElementById('close-modal-btn').onclick = () => overlay.remove();

    sopl_pal:'Paletizadores',sopl_ref:'Refuerzo Turno',
  };

  function buildTable(rows) {
    let h = '<table><thead><tr><th class="cp">PUESTO</th>';
    h += '<th style="background:'+TC.M+';color:'+TX.M+'">MAÑANA</th>';
    h += '<th style="background:'+TC.T+';color:'+TX.T+'">TARDE</th>';
    h += '<th style="background:'+TC.N+';color:'+TX.N+'">NOCHE</th>';
    h += '<th style="background:'+TC.P+';color:'+TX.P+'">PARTIDO</th>';
    h += '</tr></thead><tbody>';
    rows.forEach(r => {
      h += '<tr><td class="cp">'+r.puesto+'</td>';
      T.forEach(t => { h += '<td style="background:'+TC[t]+'30">'+(r[t]||'')+'</td>'; });
      h += '</tr>';
    });
    return h + '</tbody></table>';
  }

  function page(name, rows) {
    if (!rows.length) return '';
    return '<div class="pg"><div class="ph"><span class="logo">GRUPOUBESOL</span>'
      +'<span class="dept">'+name.toUpperCase()+'</span>'
      +'<span class="sem">Semana '+sem+' &nbsp;·&nbsp; '+fechas+'</span></div>'
      +buildTable(rows)+'</div>';
  }

  let pages = '';

  // Envasado
  const env = payload.envasado;
  if (env) {
    const rows = [];
    if (env.specialWorkers) {
      Object.entries(env.specialWorkers).forEach(([id,arr]) => {
        safeArr(arr).forEach(w => {
          if (w && w.cells && T.some(t => w.cells[t]))
            rows.push({puesto:SLABELS[id]||id, ...w.cells});
        });
      });
    }
    safeArr(env.lines).forEach(line => {
      [...safeArr(line.maq),...safeArr(line.ops)].forEach((w,wi) => {
        if (w && w.cells) {
          const p = wi < line.maq.length ? line.label+' — O.Máquina' : line.label+' — Operaria/O';
          rows.push({puesto:p, ...w.cells});
        }
      });
    });
    pages += page('Envasado', rows);
  }

  // Post depts
  [
    ['elaboracion','Elaboración'],['almacen','Almacén'],['mantenimiento','Mantenimiento'],
    ['calidadLineas','Calidad Líneas'],['calidadFQ','Calidad Fís-Quím'],
    ['calidadMicro','Calidad Microbiología'],['calidadMat','Calidad Materiales'],
    ['mejoraContinua','Mejora Continua'],['soplado','Soplado']
  ].forEach(([key,name]) => {
    const d = payload[key];
    if (!d || !d.workers) return;
    const rows = [];
    Object.entries(d.workers).forEach(([pid,arr]) => {
      safeArr(arr).forEach(w => {
        if (w && w.cells && T.some(t => w.cells[t]))
          rows.push({puesto:PLABELS[pid]||pid, ...w.cells});
      });
    });
    pages += page(name, rows);
  });

  if (!pages) { toast('No hay datos para generar el PDF. Rellena el cuadrante primero.'); return; }

  const win = window.open('','_blank');
  win.document.write('<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">'
    +'<title>Cuadrante S'+sem+' — GrupoUbesol</title><style>'
    +'* {box-sizing:border-box;margin:0;padding:0}'
    +'body {font-family:Segoe UI,Arial,sans-serif;background:#fff}'
    +'.pg {width:100%;padding:28px 36px;page-break-after:always}'
    +'.ph {display:flex;align-items:center;justify-content:space-between;'
    +'border-bottom:3px solid #6a8a3a;padding-bottom:10px;margin-bottom:18px}'
    +'.logo {font-size:20px;font-weight:800;color:#6a8a3a}'
    +'.dept {font-size:30px;font-weight:800;color:#1a1a1a;letter-spacing:0.05em}'
    +'.sem {font-size:12px;color:#666;text-align:right}'
    +'table {width:100%;border-collapse:collapse}'
    +'th {padding:9px 12px;font-size:12px;font-weight:700;letter-spacing:0.07em;'
    +'text-transform:uppercase;text-align:center;border:1px solid #d0cdc5}'
    +'td {padding:8px 12px;font-size:14px;font-weight:500;border:1px solid #e0ddd6;text-align:center}'
    +'.cp {text-align:left;font-size:11px;font-weight:700;letter-spacing:0.05em;'
    +'text-transform:uppercase;color:#555;background:#f8f7f4;width:200px}'
    +'@media print {.pg{padding:14px 18px}.dept{font-size:22px}th{padding:6px 8px;font-size:10px}td{padding:5px 8px;font-size:12px}}'
    +'</style></head><body>'+pages
    +'<script>window.onload=()=>window.print();<\/script></body></html>');
  win.document.close();
}


// ═══════════════════════════════════════════════════════════════════════
//  GENERAR PRÓXIMAS 10 SEMANAS — rotación M → N → T → M
// ═══════════════════════════════════════════════════════════════════════
function generarProximasSemanas() {
  const ROTACION = { M: 'N', N: 'T', T: 'M', P: 'P' };

  const semBase = parseInt(document.getElementById('meta-sem').value) || 1;
  const anoBase = parseInt(document.getElementById('meta-ano').value) || 2026;

  if (!confirm(
    `¿Generar las próximas 10 semanas a partir de la semana ${semBase}?\n\n` +
    `Los nombres se mantendrán en los mismos puestos rotando el turno:\n` +
    `Mañana → Noche → Tarde → Mañana...\n\n` +
    `⚠️ Las semanas existentes serán sobreescritas.`
  )) return;

  // Guardar semana actual primero
  autoSave();

  // Leer el payload de la semana base
  const basePayload = buildPayload();

  let generadas = 0;

  // rotarTurno aplica N pasos a un turno (M→N→T→M...)
  function rotarTurno(turno, pasos) {
    let t = turno;
    for (let p = 0; p < pasos; p++) t = ROTACION[t] || t;
    return t;
  }

  const safeArr = a => Array.isArray(a) ? a : [];

  // Función que rota los workers de un payload 1 solo paso
  function rotarPayload1Paso(payload) {
    // Envasado
    if (payload.envasado) {
      if (payload.envasado.specialWorkers) {
        Object.values(payload.envasado.specialWorkers).forEach(arr => {
          safeArr(arr).forEach(w => {
            if (!w || !w.cells) return;
            const newCells = { M:'', T:'', N:'', P:'' };
            Object.entries(w.cells).forEach(([t, nombre]) => {
              if (nombre) newCells[rotarTurno(t, 1)] = nombre;
            });
            w.cells = newCells;
          });
        });
      }
      safeArr(payload.envasado.lines).forEach(line => {
        [...safeArr(line.maq), ...safeArr(line.ops)].forEach(w => {
          if (!w || !w.cells) return;
          const newCells = { M:'', T:'', N:'', P:'' };
          Object.entries(w.cells).forEach(([t, nombre]) => {
            if (nombre) newCells[rotarTurno(t, 1)] = nombre;
          });
          w.cells = newCells;
        });
      });
      ['bajas','vacaciones'].forEach(k => {
        safeArr(payload.envasado[k]).forEach(w => {
          if (!w || !w.cells) return;
          const newCells = { M:'', T:'', N:'', P:'' };
          Object.entries(w.cells).forEach(([t, nombre]) => {
            if (nombre) newCells[rotarTurno(t, 1)] = nombre;
          });
          w.cells = newCells;
        });
      });
    }
    // Resto de departamentos
    const POST_KEYS = ['elaboracion','almacen','mantenimiento','calidadLineas','calidadFQ',
      'calidadMicro','calidadMat','mejoraContinua','soplado'];
    POST_KEYS.forEach(depKey => {
      const dep = payload[depKey];
      if (!dep) return;
      if (dep.workers) {
        Object.values(dep.workers).forEach(arr => {
          safeArr(arr).forEach(w => {
            if (!w || !w.cells) return;
            const newCells = { M:'', T:'', N:'', P:'' };
            Object.entries(w.cells).forEach(([t, nombre]) => {
              if (nombre) newCells[rotarTurno(t, 1)] = nombre;
            });
            w.cells = newCells;
          });
        });
      }
      ['bajas','vacaciones'].forEach(k => {
        safeArr(dep[k]).forEach(w => {
          if (!w || !w.cells) return;
          const newCells = { M:'', T:'', N:'', P:'' };
          Object.entries(w.cells).forEach(([t, nombre]) => {
            if (nombre) newCells[rotarTurno(t, 1)] = nombre;
          });
          w.cells = newCells;
        });
      });
    });
  }

  // Generamos semana a semana aplicando 1 rotación respecto a la anterior
  let prevPayload = basePayload;

  for (let i = 1; i <= 10; i++) {
    let sem = semBase + i;
    let ano = anoBase;
    if (sem > 52) { sem = sem - 52; ano++; }

    const key = 'ubesol_' + ano + '_s' + String(sem).padStart(2,'0');

    const newPayload = JSON.parse(JSON.stringify(prevPayload));
    newPayload.semana = String(sem);
    newPayload.ano    = String(ano);

    const { monday, sunday } = getWeekDates(ano, sem);
    newPayload.fecha_inicio = fmtISO(monday);
    newPayload.fecha_fin    = fmtISO(sunday);

    rotarPayload1Paso(newPayload);

    localStorage.setItem(key, JSON.stringify(newPayload));
    // Publicar esta semana al histórico inmediatamente
    const hk = 'ubesol_historico_' + ano + '_s' + String(sem).padStart(2,'0');
    localStorage.setItem(hk, JSON.stringify(newPayload));
    prevPayload = newPayload;
    generadas++;
  }

  // Publicar también la semana base
  autoSaveToKey('ubesol_' + anoBase + '_s' + String(semBase).padStart(2,'0'));
  const hkBase = 'ubesol_historico_' + anoBase + '_s' + String(semBase).padStart(2,'0');
  localStorage.setItem(hkBase, localStorage.getItem('ubesol_' + anoBase + '_s' + String(semBase).padStart(2,'0')));

  toast(`✓ ${generadas} semanas generadas y publicadas a partir de la semana ${semBase}`);

  // Ir a la semana siguiente para que el usuario pueda revisarla
  if (generadas > 0) {
    let semSig = semBase + 1;
    let anoSig = anoBase;
    if (semSig > 52) { semSig = 1; anoSig++; }
    document.getElementById('meta-sem').value = semSig;
    document.getElementById('meta-ano').value = anoSig;
    loadWeekFromStorage(weekKey());
  }
}

function clearStorage() {
  // Calcular semana actual para bloquear semanas pasadas
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth(), d = now.getDate();
  const localNow = new Date(y, m, d);
  const dow = localNow.getDay();
  const thu = new Date(y, m, d - ((dow + 6) % 7) + 3);
  const anoActual = thu.getFullYear();
  const jan4 = new Date(anoActual, 0, 4);
  const startW1 = new Date(jan4.getFullYear(), 0, jan4.getDate() - ((jan4.getDay() + 6) % 7));
  const semActual = Math.round((thu - startW1) / 604800000) + 1;
  const claveActual = anoActual * 100 + semActual;

  // Recoger todas las semanas guardadas
  const semanas = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (!k || !k.startsWith('ubesol_') || k.startsWith('ubesol_historico_') || k === 'ubesol_publicado') continue;
    try {
      const d = JSON.parse(localStorage.getItem(k));
      if (!d || !d._version) continue;
      const clave = parseInt(d.ano) * 100 + parseInt(d.semana);
      if (clave < claveActual) continue; // no mostrar semanas pasadas
      const { monday, sunday } = getWeekDates(parseInt(d.ano), parseInt(d.semana));
      semanas.push({ key: k, semana: d.semana, ano: d.ano,
        label: 'S' + String(d.semana).padStart(2,'0') + ' / ' + d.ano + '  ·  ' + fmtDate(monday) + ' – ' + fmtDate(sunday) });
    } catch(e) {}
  }

  if (!semanas.length) { toast('No hay semanas guardadas.'); return; }

  semanas.sort((a, b) => (a.ano + String(a.semana).padStart(2,'0')) < (b.ano + String(b.semana).padStart(2,'0')) ? -1 : 1);

  const old = document.getElementById('clear-modal');
  if (old) old.remove();

  const overlay = document.createElement('div');
  overlay.id = 'clear-modal';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';

  const modal = document.createElement('div');
  modal.style.cssText = 'background:#fff;border-radius:12px;padding:28px;max-width:520px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.2);max-height:80vh;display:flex;flex-direction:column;gap:16px';

  modal.innerHTML = `
    <h3 style="font-size:15px;font-weight:700;color:#1a1a1a;margin:0">🗑️ Borrar semanas</h3>
    <p style="font-size:12px;color:#888;margin:0">Selecciona las semanas que quieres eliminar. Esta acción no se puede deshacer.</p>
    <div style="display:flex;gap:8px">
      <button id="cm-all"  style="font-size:11px;font-weight:600;padding:4px 10px;border:1px solid #d0cdc5;border-radius:4px;background:#f5f5f5;cursor:pointer;color:#333">Seleccionar todo</button>
      <button id="cm-none" style="font-size:11px;font-weight:600;padding:4px 10px;border:1px solid #d0cdc5;border-radius:4px;background:#f5f5f5;cursor:pointer;color:#333">Deseleccionar todo</button>
    </div>
    <div id="cm-list" style="overflow-y:auto;flex:1;min-height:60px;border:1px solid #e0ddd6;border-radius:6px;padding:4px 0"></div>
    <div style="display:flex;justify-content:flex-end;gap:8px">
      <button id="cm-cancel"  style="padding:8px 20px;background:#f0ede6;color:#333;border:1px solid #d0cdc5;border-radius:6px;cursor:pointer;font-size:13px">Cancelar</button>
      <button id="cm-confirm" style="padding:8px 20px;background:#c62828;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600">Borrar seleccionadas</button>
    </div>
  `;

  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  const list = document.getElementById('cm-list');
  semanas.forEach(s => {
    const row = document.createElement('label');
    row.style.cssText = 'display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;border-bottom:1px solid #f0ede6;font-size:13px;color:#222';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.dataset.key = s.key;
    cb.style.cssText = 'width:15px;height:15px;accent-color:#c62828;cursor:pointer;flex-shrink:0';
    row.appendChild(cb);
    row.appendChild(document.createTextNode(s.label));
    row.onmouseover = () => row.style.background = '#fff5f5';
    row.onmouseout  = () => row.style.background = '';
    list.appendChild(row);
  });

  document.getElementById('cm-all').onclick  = () => list.querySelectorAll('input').forEach(c => c.checked = true);
  document.getElementById('cm-none').onclick = () => list.querySelectorAll('input').forEach(c => c.checked = false);

  const cerrar = () => overlay.remove();
  document.getElementById('cm-cancel').onclick = cerrar;
  overlay.onclick = (e) => { if (e.target === overlay) cerrar(); };

  document.getElementById('cm-confirm').onclick = () => {
    const sel = [...list.querySelectorAll('input:checked')].map(c => c.dataset.key);
    if (!sel.length) { toast('No has seleccionado ninguna semana.'); return; }

    // Obtener labels para el mensaje de confirmación
    const labels = sel.map(k => {
      const s = semanas.find(s => s.key === k);
      return s ? 'S' + String(s.semana).padStart(2,'0') + '/' + s.ano : k;
    });
    if (!confirm('¿Seguro que quieres borrar estas ' + sel.length + ' semana' + (sel.length !== 1 ? 's' : '') + '?\n\n' + labels.join('\n') + '\n\nEsta acción no se puede deshacer.')) return;

    const estaActiva = sel.includes(weekKey());

    // Bloquear autoSave para que no reescriba lo que vamos a borrar
    _autoSaveBlocked = true;

    // 1. Borrar del localStorage principal Y del histórico
    const savedKey = weekKey();
    sel.forEach(k => {
      localStorage.removeItem(k);
      const match = k.match(/ubesol_(\d+)_s(\d+)/);
      if (match) localStorage.removeItem('ubesol_historico_' + match[1] + '_s' + match[2]);
    });

    cerrar();

    // 2. Solo guardar la semana activa si NO estaba entre las borradas
    if (!estaActiva) autoSaveToKey(savedKey);
    autoPublicarTodasLasSemanas();

    _autoSaveBlocked = false;

    toast('🗑️ ' + sel.length + ' semana' + (sel.length !== 1 ? 's' : '') + ' eliminada' + (sel.length !== 1 ? 's' : '') + ' · restantes guardadas y publicadas');
    if (estaActiva) loadWeekFromStorage(weekKey());
  };
}

// ── GENERIC POST-DEPT RENDER ────────────────────────────────────────────
// Shared by Almacén, Mantenimiento and any future post-mode dept
function renderPostDept(deptKey, puestos, workers, bottomGroups) {
  const root = document.getElementById('table-root');
  root.innerHTML = '';
  document.getElementById('add-line-area').style.display = 'none';

  const tbl = document.createElement('table');
  tbl.innerHTML = `<colgroup><col style="width:200px"><col><col><col><col></colgroup>`;

  const thead = document.createElement('thead');
  thead.innerHTML = `<tr class="turno-hdr">
    <th class="th-puesto" style="text-align:left;padding-left:12px">PUESTO</th>
    <th class="th-m">TURNO MAÑANA</th>
    <th class="th-t">TURNO TARDE</th>
    <th class="th-n">TURNO NOCHE</th>
    <th class="th-p">TURNO PARTIDO / ESPECIAL</th>
  </tr>`;
  tbl.appendChild(thead);

  const tbody = document.createElement('tbody');

  puestos.forEach(puesto => {
    const arr = workers[puesto.id];
    arr.forEach((w, wi) => tbody.appendChild(buildPostRow(w, wi, puesto, arr)));
  });

  // Separator
  const sep = document.createElement('tr');
  sep.innerHTML = `<td colspan="5" style="height:20px;background:#f0f0f0;border-top:2px solid var(--border);border-bottom:2px solid var(--border)"></td>`;
  tbody.appendChild(sep);

  // Bottom groups (bajas / vacaciones)
  bottomGroups.forEach(grp => {
    grp.arr.forEach((w, wi) =>
      tbody.appendChild(buildPostRow(w, wi, {id: grp.id, label: grp.label, type: grp.type}, grp.arr)));
  });

  tbl.appendChild(tbody);
  root.appendChild(tbl);
}

function buildPostRow(worker, wi, puesto, arr) {
  const isLast = wi === arr.length - 1;
  const type   = puesto.type;

  const tr = document.createElement('tr');
  // Row background: alternate green/yellow for puestos, special for bajas/vac
  if      (type === 'sup')   tr.className = 'sup-row';
  else if (type === 'bajas') tr.className = 'bajas-row';
  else if (type === 'vac')   tr.className = 'vac-row';
  else if (type === 'green') tr.className = 'line-op';
  else                       tr.className = 'line-op yellow';

  // Puesto label — show on first row only, with rowSpan
  if (wi === 0) {
    const tdP = document.createElement('td');
    tdP.className = 'puesto-label';
    tdP.rowSpan = arr.length;
    tdP.style.cssText = 'vertical-align:middle;border-right:2px solid var(--border);font-size:12px;font-weight:700';
    tdP.innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between;gap:6px">
      <span>${puesto.label}</span>
      <div style="display:flex;gap:2px;flex-shrink:0">
        ${arr.length > 1
          ? `<button class="ctrl-btn ctrl-del" onclick="removePostWorker('${puesto.id}')" title="Quitar fila">−</button>`
          : ''}
        <button class="ctrl-btn ctrl-add" onclick="addPostWorker('${puesto.id}')" title="Añadir persona">+</button>
      </div>
    </div>`;
    tr.appendChild(tdP);
  }

  // 4 turno cells
  TURNOS.forEach(t => {
    const td = document.createElement('td');
    td.className = `name-cell cell-${t.toLowerCase()}`;
    const { wrap } = makeAcInput(
      worker.cells[t] || '',
      currentTab,
      (val) => { worker.cells[t] = val; }
    );
    td.appendChild(wrap);
    tr.appendChild(td);
  });

  return tr;
}

function addPostWorker(puestoId) {
  const arr = getPostArr(puestoId);
  arr.push(mkWorker(puestoId+'_'+Date.now()));
  renderCurrent();
}

function removePostWorker(puestoId) {
  const arr = getPostArr(puestoId);
  if(arr.length <= 1) { toast('Mínimo 1 persona'); return; }
  arr.pop();
  renderCurrent();
}

  // Calidad FQ

// ── LOCALSTORAGE — guarda por semana ──────────────────────────────────
function weekKey() {
  const ano = document.getElementById('meta-ano').value || '2026';
  const sem = String(document.getElementById('meta-sem').value || '1').padStart(2,'0');
  return 'ubesol_' + ano + '_s' + sem;
}

function buildPayload() {
  const ano = document.getElementById('meta-ano').value || '2026';
  const sem = document.getElementById('meta-sem').value || '1';
  const { monday, sunday } = getWeekDates(parseInt(ano), parseInt(sem));
  const base = {
    _version: 1, semana: sem, ano: ano, dept: currentTab,
    fecha_inicio: fmtISO(monday), fecha_fin: fmtISO(sunday),
    responsable: (document.getElementById('responsable') || {value:''}).value,
  };
  const t = currentTab;
  if (t==='Envasado')        return {...base, envasado:      {specialWorkers, lines, bajas, vacaciones}};
  if (t==='Elaboración')     return {...base, elaboracion:   {workers:elabWorkers,    bajas:elabBajas,     vacaciones:elabVacaciones}};
  if (t==='Almacén')         return {...base, almacen:       {workers:almWorkers,     bajas:almBajas,      vacaciones:almVacaciones}};
  if (t==='Mantenimiento')   return {...base, mantenimiento: {workers:mtoWorkers,     bajas:mtoBajas,      vacaciones:mtoVacaciones}};
  if (t==='Calidad Líneas')  return {...base, calidadLineas: {workers:calWorkers,     bajas:calBajas,      vacaciones:calVacaciones}};
  if (t==='Calidad FQ')      return {...base, calidadFQ:     {workers:calfqWorkers,   bajas:calfqBajas,    vacaciones:calfqVacaciones}};
  if (t==='Calidad Micro')   return {...base, calidadMicro:  {workers:calmicroWorkers,bajas:calmicroBajas, vacaciones:calmicroVacaciones}};
  if (t==='Calidad Mat')     return {...base, calidadMat:    {workers:calmatWorkers,  bajas:calmatBajas,   vacaciones:calmatVacaciones}};
  if (t==='Mejora Continua') return {...base, mejoraContinua:{workers:mcWorkers,      bajas:mcBajas,       vacaciones:mcVacaciones}};
  if (t==='Soplado')         return {...base, soplado:       {workers:soplWorkers,    bajas:soplBajas,     vacaciones:soplVacaciones}};
  return base;
}
function autoSaveToKey(key) {
  try {
    localStorage.setItem(key, JSON.stringify(buildPayload()));
  } catch(e) {
    console.error('autoSave error:', e);
  }
}

let _autoSaveBlocked = false;

function autoSave() {
  if (_autoSaveBlocked) return;
  autoSaveToKey(weekKey());
  autoPublicarTodasLasSemanas();
}

// Publica silenciosamente en el histórico todas las semanas que tengan datos
function autoPublicarTodasLasSemanas() {
  try {
    // Construir set de semanas activas en localStorage
    const activas = new Set();
    const keysToProcess = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!k || !k.startsWith('ubesol_') || k.startsWith('ubesol_historico_') || k === 'ubesol_publicado') continue;
      keysToProcess.push(k);
    }

    // Publicar cada semana activa al histórico
    keysToProcess.forEach(k => {
      const raw = localStorage.getItem(k);
      if (!raw) return;
      try {
        const d = JSON.parse(raw);
        if (!d || !d._version) return;
        const hk = 'ubesol_historico_' + d.ano + '_s' + String(d.semana).padStart(2,'0');
        localStorage.setItem(hk, raw);
        activas.add(hk);
      } catch(e) {}
    });

    // Eliminar del histórico las semanas que ya no existen en localStorage
    const historicoKeys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('ubesol_historico_')) historicoKeys.push(k);
    }
    historicoKeys.forEach(k => {
      if (!activas.has(k)) localStorage.removeItem(k);
    });

  } catch(e) {
    console.error('autoPublicar error:', e);
  }
}

function applyPayload(d) {
  if (!d || !d._version) return false;
  // NO sobreescribir el selector — el INIT ya calcula la semana actual
  if (d.responsable && document.getElementById('responsable')) document.getElementById('responsable').value = d.responsable;
  updateWeekFromSelector();

  const merge = (target, src) => { if(src) Object.assign(target, src); };
  if (d.envasado)       { merge(specialWorkers, d.envasado.specialWorkers); if(d.envasado.lines) lines=d.envasado.lines; if(d.envasado.bajas) bajas=d.envasado.bajas; if(d.envasado.vacaciones) vacaciones=d.envasado.vacaciones; }
  if (d.elaboracion)    { merge(elabWorkers, d.elaboracion.workers);    if(d.elaboracion.bajas)    elabBajas=d.elaboracion.bajas;       if(d.elaboracion.vacaciones)    elabVacaciones=d.elaboracion.vacaciones; }
  if (d.almacen)        { merge(almWorkers,  d.almacen.workers);        if(d.almacen.bajas)        almBajas=d.almacen.bajas;            if(d.almacen.vacaciones)        almVacaciones=d.almacen.vacaciones; }
  if (d.mantenimiento)  { merge(mtoWorkers,  d.mantenimiento.workers);  if(d.mantenimiento.bajas)  mtoBajas=d.mantenimiento.bajas;      if(d.mantenimiento.vacaciones)  mtoVacaciones=d.mantenimiento.vacaciones; }
  if (d.calidadLineas)  { merge(calWorkers,  d.calidadLineas.workers);  if(d.calidadLineas.bajas)  calBajas=d.calidadLineas.bajas;      if(d.calidadLineas.vacaciones)  calVacaciones=d.calidadLineas.vacaciones; }
  if (d.calidadFQ)      { merge(calfqWorkers,d.calidadFQ.workers);      if(d.calidadFQ.bajas)      calfqBajas=d.calidadFQ.bajas;        if(d.calidadFQ.vacaciones)      calfqVacaciones=d.calidadFQ.vacaciones; }
  if (d.calidadMicro)   { merge(calmicroWorkers,d.calidadMicro.workers);if(d.calidadMicro.bajas)   calmicroBajas=d.calidadMicro.bajas;  if(d.calidadMicro.vacaciones)   calmicroVacaciones=d.calidadMicro.vacaciones; }
  if (d.calidadMat)     { merge(calmatWorkers,d.calidadMat.workers);    if(d.calidadMat.bajas)     calmatBajas=d.calidadMat.bajas;      if(d.calidadMat.vacaciones)     calmatVacaciones=d.calidadMat.vacaciones; }
  if (d.mejoraContinua) { merge(mcWorkers,   d.mejoraContinua.workers); if(d.mejoraContinua.bajas) mcBajas=d.mejoraContinua.bajas;      if(d.mejoraContinua.vacaciones) mcVacaciones=d.mejoraContinua.vacaciones; }
  if (d.soplado)        { merge(soplWorkers, d.soplado.workers);        if(d.soplado.bajas)        soplBajas=d.soplado.bajas;           if(d.soplado.vacaciones)        soplVacaciones=d.soplado.vacaciones; }
  return true;
}

function loadWeekFromStorage(key) {
  // Reset all departments to empty before loading
  lines = defaultLines(); initSpecialWorkers();
  bajas = [mkWorker('baja_0')]; vacaciones = [mkWorker('vac_0')];
  initSoplado(); initMejoraContinua(); initCalidadMat();
  initCalidadFQ(); initCalidadMicro(); initCalidad();
  initElaboracion(); initAlmacen(); initMantenimiento();
  try {
    const saved = localStorage.getItem(key || weekKey());
    if (saved) {
      const d = JSON.parse(saved);
      if (applyPayload(d)) {
        toast('✓ Semana ' + d.semana + '/' + d.ano + ' cargada');
      }
    } else {
      updateWeekFromSelector();
      toast('Semana nueva — sin datos guardados');
    }
  } catch(e) {}
  renderCurrent();
}

// Saved weeks list — shows which weeks have data
function listSavedWeeks() {
  const weeks = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('ubesol_')) weeks.push(k);
  }
  return weeks.sort().reverse();
}

// ── TOAST ──────────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── INIT ───────────────────────────────────────────────────────────────
(function() {
  // 1. Leer dept de URL y configurar tab
  const DEPT_MAP = {
    'envasado':'Envasado','elaboracion':'Elaboración','almacen':'Almacén',
    'mantenimiento':'Mantenimiento','calidadlineas':'Calidad Líneas',
    'calidadfq':'Calidad FQ','calidadmicro':'Calidad Micro',
    'calidadmat':'Calidad Mat','mejoracontinua':'Mejora Continua','soplado':'Soplado',
  };
  const params = new URLSearchParams(window.location.search);
  const raw = (params.get('dept')||'envasado').toLowerCase()
    .replace(/\s+/g,'').replace(/á/g,'a').replace(/é/g,'e')
    .replace(/í/g,'i').replace(/ó/g,'o').replace(/ú/g,'u').replace(/ñ/g,'n');
  const deptName = DEPT_MAP[raw] || 'Envasado';
  currentTab = deptName;

  // 2. Ocultar todas las tabs excepto la activa
  document.querySelectorAll('.tab').forEach(btn => {
    const id = btn.id.replace('tab-','');
    if (id === deptName) { btn.classList.add('active'); btn.style.display=''; }
    else btn.style.display='none';
  });

  // 3. Actualizar breadcrumb y título
  const bc = document.getElementById('dept-breadcrumb');
  if (bc) bc.textContent = deptName.toUpperCase();
  document.getElementById('dept-title').textContent = deptName;
  document.title = 'Cuadrante ' + deptName + ' — GrupoUbesol';

  // 4. Semana actual ISO con fecha local (evita bug zona horaria)
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth(), d = now.getDate();
  const localNow = new Date(y, m, d);
  const dow = localNow.getDay();
  const thu = new Date(y, m, d - ((dow + 6) % 7) + 3);
  const ano = thu.getFullYear();
  const jan4 = new Date(ano, 0, 4);
  const startW1 = new Date(jan4.getFullYear(), 0, jan4.getDate() - ((jan4.getDay() + 6) % 7));
  const wk = Math.round((thu - startW1) / 604800000) + 1;
  document.getElementById('meta-sem').value = wk;
  document.getElementById('meta-ano').value = ano;
})();

initMejoraContinua();
