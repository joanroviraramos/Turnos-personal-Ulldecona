<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planificación de Turnos — Grupo Ubesol</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg: #f0f0f0;
  --white: #ffffff;
  --border: #b0b0b0;
  --border-l: #d0d0d0;
  --text: #1a1a1a;
  --muted: #555;
  --faint: #999;

  /* Line background colors (alternating green / yellow like Excel) */
  --line-green: #e8f5e4;
  --line-yellow: #fffde7;
  --line-green-hdr: #c8e6c1;
  --line-yellow-hdr: #fff9c4;

  /* Turno colors */
  --m-bg: #e3f2fd; --m-bd: #90caf9; --m-tx: #0d47a1; --m-hdr: #bbdefb;
  --t-bg: #fff8e1; --t-bd: #ffe082; --t-tx: #e65100; --t-hdr: #ffecb3;
  --n-bg: #ede7f6; --n-bd: #b39ddb; --n-tx: #311b92; --n-hdr: #d1c4e9;
  --p-bg: #fce4ec; --p-bd: #f48fb1; --p-tx: #880e4f; --p-hdr: #f8bbd0;

  --sup-bg: #e0f7fa;
  --special-bg: #f3e5f5;
  --bajas-bg: #ffebee;
  --vac-bg: #e8f5e9;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 12px;
  padding: 0;
}

/* ── HEADER ── */
.doc-header {
  background: var(--white);
  border-bottom: 2px solid var(--border);
  padding: 16px 24px 12px;
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 20px;
}

.logo-area {
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.logo-text {
  display: flex;
  align-items: center;
  gap: 6px;
  line-height: 1;
}

.logo-grupo {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -.01em;
  color: #6a8a3a;
}

.logo-ubesol {
  font-size: 26px;
  font-weight: 900;
  letter-spacing: -.01em;
  color: #6a8a3a;
}

.logo-icons {
  display: flex;
  align-items: center;
  gap: 3px;
  margin-left: 4px;
}

.logo-icon {
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-sub {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--faint);
  margin-top: 1px;
}

.doc-title {
  text-align: center;
}

.doc-title h1 {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--muted);
}

.doc-title h2 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--text);
  margin-top: 2px;
}

.doc-meta {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 16px;
  font-size: 11px;
}

.meta-row { display: flex; align-items: center; gap: 6px; }
.meta-row label { font-weight: 600; color: var(--muted); white-space: nowrap; }
.meta-row input {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  border: 1px solid var(--border-l);
  border-radius: 3px;
  padding: 2px 6px;
  background: var(--white);
  color: var(--text);
  width: 100px;
  outline: none;
}
.meta-row input:focus { border-color: #666; }

/* ── DEPT TABS ── */
.dept-tabs {
  background: #e8e8e8;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 2px;
  padding: 8px 24px 0;
}

.tab {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
  padding: 7px 16px;
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: 5px 5px 0 0;
  cursor: pointer;
  background: #d8d8d8;
  color: var(--muted);
  transition: all .15s;
}

.tab:hover { background: #ebebeb; color: var(--text); }
.tab.active { background: var(--white); color: var(--text); border-bottom: 1px solid var(--white); margin-bottom: -1px; }
.tab.disabled { opacity: .4; cursor: default; }

/* ── MAIN TABLE AREA ── */
.table-area {
  padding: 20px 24px;
  overflow: visible;
}
.table-scroll-x {
  overflow-x: auto;
}

/* ── THE TABLE ── */
table {
  border-collapse: collapse;
  min-width: 900px;
  width: 100%;
  background: var(--white);
  border: 2px solid var(--border);
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}

/* Column widths */
col.c-linea  { width: 52px; }
col.c-puesto { width: 160px; }
col.c-m      { width: 1fr; }
col.c-t      { width: 1fr; }
col.c-n      { width: 1fr; }
col.c-p      { width: 1fr; }

/* ── TURNO HEADER ── */
thead tr.turno-hdr th {
  padding: 8px 10px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  border: 1px solid var(--border);
  text-align: center;
}

.th-linea { background: #f5f5f5; }
.th-puesto { background: #f5f5f5; }
.th-m  { background: var(--m-hdr); color: var(--m-tx); }
.th-t  { background: var(--t-hdr); color: var(--t-tx); }
.th-n  { background: var(--n-hdr); color: var(--n-tx); }
.th-p  { background: var(--p-hdr); color: var(--p-tx); }

/* ── DATA ROWS ── */
tbody td {
  border: 1px solid var(--border-l);
  padding: 0;
  vertical-align: middle;
}

/* Line label cell */
td.linea-label {
  font-size: 11px;
  font-weight: 700;
  text-align: center;
  color: var(--text);
  vertical-align: middle;
  border: 1px solid var(--border);
  padding: 4px;
}

/* Puesto label cell */
td.puesto-label {
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 600;
  color: #333;
  border: 1px solid var(--border-l);
  white-space: nowrap;
}

/* Name input cell */
td.name-cell {
  padding: 2px 4px;
}

.name-inp {
  width: 100%;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 400;
  padding: 4px 8px;
  border: none;
  outline: none;
  background: transparent;
  color: var(--text);
  cursor: text;
}

.name-inp::placeholder {
  color: #ccc;
  font-style: italic;
}

.name-inp:focus {
  background: rgba(255,255,255,.9);
  box-shadow: inset 0 0 0 1px #aaa;
  border-radius: 2px;
}

/* Row backgrounds by line type */
tr.line-maq { background: var(--line-green-hdr); }
tr.line-op  { background: var(--line-green); }
tr.line-maq.yellow { background: var(--line-yellow-hdr); }
tr.line-op.yellow  { background: var(--line-yellow); }

/* Special section rows */
tr.section-divider td {
  background: #e8e8e8;
  border-top: 2px solid var(--border);
  border-bottom: 2px solid var(--border);
  padding: 5px 10px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
}

tr.special-row { background: var(--special-bg); }
tr.special-row td.puesto-label { font-weight: 700; color: #4a0080; }
tr.sup-row { background: var(--sup-bg); }
tr.sup-row td.puesto-label { font-weight: 700; color: #006064; }
tr.bajas-row { background: var(--bajas-bg); }
tr.bajas-row td.puesto-label { font-weight: 700; color: #b71c1c; }
tr.vac-row { background: var(--vac-bg); }
tr.vac-row td.puesto-label { font-weight: 700; color: #1b5e20; }

/* Line header row (merged linea cell) */
.line-group td.linea-label {
  border-right: 2px solid var(--border);
  border-left: 2px solid var(--border);
}

/* Turno cell coloring */
td.cell-m { background: var(--m-bg) !important; }
td.cell-t { background: var(--t-bg) !important; }
td.cell-n { background: var(--n-bg) !important; }
td.cell-p { background: var(--p-bg) !important; }

/* ── ROW CONTROLS ── */
.row-controls {
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 1px 4px;
}

.del-row {
  width: 14px; height: 14px;
  border-radius: 2px;
  background: none;
  border: none;
  cursor: pointer;
  color: #ccc;
  font-size: 11px;
  display: flex; align-items: center; justify-content: center;
  padding: 0; line-height: 1;
  flex-shrink: 0;
  transition: all .12s;
  margin-left: auto;
}
.del-row:hover { color: #c00; background: #fde0e0; }

/* ── ROW CONTROL BUTTONS (+ and −) ── */
.ctrl-btn {
  width: 18px; height: 18px;
  border-radius: 3px;
  font-size: 14px;
  font-weight: 700;
  line-height: 1;
  border: 1px solid;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  transition: all .12s;
  flex-shrink: 0;
}
.ctrl-add {
  background: #e8f5e9;
  color: #2e7d32;
  border-color: #a5d6a7;
}
.ctrl-add:hover { background: #c8e6c9; border-color: #66bb6a; }
.ctrl-del {
  background: #fce4ec;
  color: #c62828;
  border-color: #f48fb1;
}
.ctrl-del:hover { background: #f8bbd0; border-color: #e57373; }

/* ── ADD LINE AREA ── */
.add-line-area {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  align-items: center;
}

.add-line-btn {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 5px;
  cursor: pointer;
  border: 1px dashed var(--border);
  background: var(--white);
  color: var(--muted);
  transition: all .15s;
  letter-spacing: .03em;
}
.add-line-btn:hover { background: #f0f0f0; color: var(--text); }

/* ── BOTTOM ACTIONS ── */
.bottom-bar {
  background: var(--white);
  border-top: 1px solid var(--border-l);
  padding: 12px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
  position: sticky;
  bottom: 0;
}

.legend {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}

.leg {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  color: var(--muted);
}

.leg-chip {
  width: 28px;
  height: 15px;
  border-radius: 3px;
  font-size: 8px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'IBM Plex Mono', monospace;
  border: 1px solid;
}

.btn-group { display: flex; gap: 8px; }

.btn {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 600;
  padding: 7px 16px;
  border-radius: 5px;
  cursor: pointer;
  border: 1px solid var(--border);
  letter-spacing: .03em;
  transition: all .15s;
}

.btn-sec { background: var(--white); color: var(--muted); }
.btn-sec:hover { background: #f0f0f0; color: var(--text); }
.btn-pri { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.btn-pri:hover { background: #333; }
.btn-pub { background: #1b5e20; color: #fff; border-color: #1b5e20; }
.btn-pub:hover { background: #2e7d32; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 70px;
  right: 24px;
  background: #1a1a1a;
  color: #fff;
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  transform: translateY(40px);
  opacity: 0;
  transition: all .25s;
  z-index: 999;
  pointer-events: none;
}
.toast.show { transform: translateY(0); opacity: 1; }

/* ── AUTOCOMPLETE ── */
.ac-wrap { position: relative; flex: 1; display: flex; align-items: center; min-width: 0; }
.ac-wrap input { width: 100%; }
.ac-list {
  position: absolute;
  top: calc(100% + 2px);
  left: 0;
  min-width: 260px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 6px;
  box-shadow: 0 4px 20px rgba(0,0,0,.15);
  z-index: 9999;
  max-height: 220px;
  overflow-y: auto;
  display: none;
}
.ac-list.open { display: block; }
.ac-item {
  padding: 7px 12px;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--border-l);
}
.ac-item:last-child { border-bottom: none; }
.ac-item:hover { background: #f0ede6; }
.ac-item.used { opacity: .35; pointer-events: none; background: #fafafa; }
.ac-item .ac-name { font-weight: 500; color: var(--text); }
.ac-item .ac-dni { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--faint); }
.ac-empty { padding: 8px 12px; font-size: 12px; color: var(--faint); font-style: italic; }

/* Permitir que el dropdown salga fuera de la celda */
.name-cell { overflow: visible !important; }
td.name-cell { overflow: visible !important; }

</style>
</head>
<body>

<!-- DOCUMENT HEADER -->
<div class="doc-header">
  <div class="logo-area">
    <div class="logo-text">
      <span class="logo-grupo">GRUPO</span><span class="logo-ubesol">UBESOL</span>
    </div>
  </div>

  <div class="doc-title">
    <h1>Planificación de Turnos Semanal</h1>
    <h2 id="dept-title">Envasado</h2>
  </div>

  <div class="doc-meta">
    <div class="meta-row"><label>AÑO:</label>
      <select id="meta-ano" onchange="updateWeekFromSelector()" style="font-family:'Inter',sans-serif;font-size:13px;font-weight:500;border:1px solid var(--border-l);border-radius:3px;padding:2px 6px;background:white;color:var(--text);cursor:pointer;width:80px">
        <option>2025</option>
        <option selected>2026</option>
        <option>2027</option>
      </select>
    </div>
    <div class="meta-row">
      <label>SEMANA:</label>
      <div style="display:flex;align-items:center;gap:6px">
        <button onclick="changeWeek(-1)" style="width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:white;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;line-height:1">‹</button>
        <input type="number" id="meta-sem" value="12" min="1" max="53"
          oninput="updateWeekFromSelector()"
          style="width:48px;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;border:1px solid var(--border-l);border-radius:3px;padding:2px 4px">
        <button onclick="changeWeek(1)" style="width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:white;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;line-height:1">›</button>
      </div>
    </div>
    <div class="meta-row" style="grid-column:1/-1;justify-content:center">
      <span id="meta-dates" style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);letter-spacing:0.04em"></span>
    </div>
  </div>
</div>

<!-- DEPARTMENT TABS -->
<div class="dept-tabs">
  <button class="tab active" id="tab-Envasado" onclick="switchTab('Envasado')">Envasado</button>
  <button class="tab" id="tab-Elaboración" onclick="switchTab('Elaboración')">Elaboración</button>
  <button class="tab" id="tab-Almacén" onclick="switchTab('Almacén')">Almacén</button>
  <button class="tab" id="tab-Mantenimiento" onclick="switchTab('Mantenimiento')">Mantenimiento</button>
  <button class="tab" id="tab-Calidad Líneas" onclick="switchTab('Calidad Líneas')">Calidad Líneas</button>
  <button class="tab" id="tab-Calidad FQ" onclick="switchTab('Calidad FQ')">Calidad Fís-Quím</button>
  <button class="tab" id="tab-Calidad Micro" onclick="switchTab('Calidad Micro')">Calidad Microbiología</button>
  <button class="tab" id="tab-Calidad Mat" onclick="switchTab('Calidad Mat')">Calidad Materiales</button>
  <button class="tab" id="tab-Mejora Continua" onclick="switchTab('Mejora Continua')">Mejora Continua</button>
  <button class="tab" id="tab-Soplado" onclick="switchTab('Soplado')">Soplado</button>
</div>

<!-- TABLE AREA -->
<div class="table-area">
  <div class="table-scroll-x">
    <div id="table-root"></div>
  </div>
  <div class="add-line-area" id="add-line-area">
    <button class="add-line-btn" onclick="addLine()">+ Añadir línea</button>
    <button class="add-line-btn" onclick="addLine('L2')">+ Añadir línea L2.x</button>
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <div class="legend">
    <div class="leg">
      <div class="leg-chip" style="background:var(--m-bg);color:var(--m-tx);border-color:var(--m-bd)">M</div>
      Turno Mañana
    </div>
    <div class="leg">
      <div class="leg-chip" style="background:var(--t-bg);color:var(--t-tx);border-color:var(--t-bd)">T</div>
      Turno Tarde
    </div>
    <div class="leg">
      <div class="leg-chip" style="background:var(--n-bg);color:var(--n-tx);border-color:var(--n-bd)">N</div>
      Turno Noche
    </div>
    <div class="leg">
      <div class="leg-chip" style="background:var(--p-bg);color:var(--p-tx);border-color:var(--p-bd)">P</div>
      Partido / Especial
    </div>
  </div>
  <div class="btn-group">
    <button class="btn btn-sec" onclick="window.print()">Imprimir / PDF</button>
    <button class="btn btn-sec" onclick="triggerLoad()" title="Carga un fichero JSON guardado anteriormente">Cargar JSON</button>
    <button class="btn btn-sec" onclick="exportJSON()">Exportar JSON</button>
    <button class="btn btn-sec" onclick="guardarManual()" title="Guardar datos en el navegador" style="color:#1b5e20;font-weight:600">💾 Guardar</button>
    <button class="btn btn-sec" onclick="clearStorage()" title="Borrar datos guardados en este navegador" style="color:#c00">Borrar datos</button>
    <button class="btn btn-pub" onclick="publicar()">Publicar cuadrante ✓</button>
  </div>
</div>

<!-- Hidden file input for loading JSON -->
<input type="file" id="json-file-input" accept=".json" style="display:none" onchange="loadJSON(this)">

<div class="toast" id="toast"></div>

soplBajas = [], soplVacaciones = [];

calWorkers = {}, calfqWorkers = {}, calmicroWorkers = {};
calmatWorkers = {}, mcWorkers = {}, soplWorkers = {};

function getWorkersForDept(dept) {
  return allWorkers.filter(w => w.departamento === dept);
}

function rebuildUsedNames() {
  usedNames = new Set();
  const add = (v) => { if(v && v.trim()) usedNames.add(v.trim().toUpperCase()); };
  const safeArr = (a) => Array.isArray(a) ? a : [];

  // Envasado — lines tienen maq[] y ops[], cada worker tiene cells:{M,T,N,P}
  safeArr(lines).forEach(l => {
    [...safeArr(l.maq), ...safeArr(l.ops)].forEach(w => {
      if(w && w.cells) Object.values(w.cells).forEach(add);
    });
  });

  // Servicios transversales Envasado
  if (specialWorkers) Object.values(specialWorkers).forEach(arr =>
    safeArr(arr).forEach(w => { if(w && w.cells) Object.values(w.cells).forEach(add); }));

  // Todos los depts tipo post
  [elabWorkers, almWorkers, mtoWorkers, calWorkers, calfqWorkers,
   calmicroWorkers, calmatWorkers, mcWorkers, soplWorkers].forEach(obj => {
    if (!obj) return;
    Object.values(obj).forEach(arr => safeArr(arr).forEach(w => {
      if(w && w.cells) Object.values(w.cells).forEach(add);
    }));
  });

  // Bajas / vacaciones de todos los depts
  [bajas, vacaciones, elabBajas, elabVacaciones, almBajas, almVacaciones,
   mtoBajas, mtoVacaciones, calBajas, calVacaciones, calfqBajas, calfqVacaciones,
   calmicroBajas, calmicroVacaciones, calmatBajas, calmatVacaciones,
   mcBajas, mcVacaciones, soplBajas, soplVacaciones].forEach(arr => {
    safeArr(arr).forEach(w => { if(w && w.cells) Object.values(w.cells).forEach(add); });
  });
}

// ── AUTOCOMPLETE ENGINE ────────────────────────────────────────────────
function makeAcInput(currentVal, dept, onSelect, blockDuplicates = true) {
  const wrap = document.createElement('div');
  wrap.className = 'ac-wrap';

  const inp = document.createElement('input');
  inp.className = 'name-inp';
  inp.type = 'text';
  inp.value = currentVal || '';
  inp.placeholder = 'Nombre…';
  inp.autocomplete = 'off';

  const list = document.createElement('div');
  list.className = 'ac-list';

  function showList(query) {
    rebuildUsedNames();
    const own = inp.value.trim().toUpperCase();
    if (own) usedNames.delete(own);

    const q = query.trim().toUpperCase();
    const workers = getWorkersForDept(dept);

    const available = workers.filter(w => {
      const nameUpper = w.nombre.toUpperCase();
      const matchesQuery = !q || nameUpper.includes(q);
      // Si blockDuplicates: ocultar ya asignados. Si no: mostrar todos
      const notUsed = !blockDuplicates || !usedNames.has(nameUpper);
      return matchesQuery && notUsed;
    });

    list.innerHTML = '';
    if (!available.length) {
      list.innerHTML = `<div class="ac-empty">${q ? 'Sin resultados' : 'Todos los trabajadores ya están asignados'}</div>`;
    } else {
      available.slice(0, 30).forEach(w => {
        const item = document.createElement('div');
        item.className = 'ac-item';
        item.innerHTML = `<span class="ac-name">${w.nombre}</span><span class="ac-dni">${w.dni}</span>`;
        item.onmousedown = (e) => {
          e.preventDefault();
          selectedFromList = true;
          inp.value = w.nombre;
          onSelect(w.nombre);
          autoSave();
          list.classList.remove('open');
        };
        list.appendChild(item);
      });
    }
    list.classList.add('open');
  }

  let selectedFromList = false;

  inp.addEventListener('focus', () => showList(inp.value));
  inp.addEventListener('click', () => showList(inp.value));
  inp.addEventListener('input', () => { selectedFromList = false; onSelect(inp.value); showList(inp.value); });
  inp.addEventListener('blur', () => {
    setTimeout(() => {
      list.classList.remove('open');
      if (!selectedFromList && blockDuplicates) {
        const v = inp.value.trim().toUpperCase();
        if (v) {
          rebuildUsedNames();
          usedNames.delete(v);
          if (usedNames.has(v)) {
            inp.value = '';
            onSelect('');
            inp.style.boxShadow = 'inset 0 0 0 2px #e53e3e';
            setTimeout(() => inp.style.boxShadow = '', 1500);
          }
        }
      }
      autoSave();
      selectedFromList = false;
    }, 200);
  });

  wrap.appendChild(inp);
  wrap.appendChild(list);
  return { wrap, inp };
}

function render() {
  const root = document.getElementById('table-root');
  root.innerHTML = '';

  const tbl = document.createElement('table');
  tbl.innerHTML = `<colgroup>
    <col class="c-linea"><col class="c-puesto">
    <col class="c-m"><col class="c-t"><col class="c-n"><col class="c-p">
  </colgroup>`;

  // THEAD
  const thead = document.createElement('thead');
  thead.innerHTML = `<tr class="turno-hdr">
    <th class="th-linea">LÍNEA</th>
    <th class="th-puesto">PUESTO</th>
    <th class="th-m">TURNO MAÑANA</th>
    <th class="th-t">TURNO TARDE</th>
    <th class="th-n">TURNO NOCHE</th>
    <th class="th-p">TURNO PARTIDO / ESPECIAL</th>
  </tr>`;
  tbl.appendChild(thead);

  const tbody = document.createElement('tbody');

  // ── SUPERVISOR / SPECIAL TOP ROWS ──
  SPECIAL_TOP.forEach(puesto => {
    const arr = specialWorkers[puesto.id];
    arr.forEach((w, wi) => tbody.appendChild(buildExpandableRow(w, wi, puesto, arr)));
  });

  // Divider
  tbody.appendChild(buildDivider('Líneas de Producción'));

  // ── LINES ──
  // Separate L2sub lines to group them visually
  const mainLines = lines.filter(l => !l.isL2sub);
  const l2subs    = lines.filter(l => l.isL2sub);

  mainLines.forEach(line => renderLineRows(tbody, line));

  if(l2subs.length > 0) {
    tbody.appendChild(buildDivider('Líneas L2 — Subgrupo'));
    l2subs.forEach(line => renderLineRows(tbody, line));
  }

  // ── BOTTOM SPECIALS ──
  tbody.appendChild(buildDivider('Servicios Transversales'));
  SPECIAL_BOT.forEach(puesto => {
    const arr = specialWorkers[puesto.id];
    arr.forEach((w, wi) => tbody.appendChild(buildExpandableRow(w, wi, puesto, arr)));
  });

  // ── BAJAS ──
  tbody.appendChild(buildDivider('Bajas'));
  bajas.forEach((w, wi) => {
    tbody.appendChild(buildExpandableRow(w, wi, {id:'bajas', label:'BAJA', type:'bajas'}, bajas));
  });

  // ── VACACIONES ──
  tbody.appendChild(buildDivider('Vacaciones'));
  vacaciones.forEach((w, wi) => {
    tbody.appendChild(buildExpandableRow(w, wi, {id:'vacaciones', label:'VACACIONES', type:'vac'}, vacaciones));
  });

  tbl.appendChild(tbody);
  root.appendChild(tbl);
}

function renderLineRows(tbody, line) {
  const color = line.color;
  const totalRows = line.maq.length + line.ops.length;

  // ── OPERADOR/A MÁQUINA rows ──
  line.maq.forEach((w, wi) => {
    const tr = document.createElement('tr');
    tr.className = `line-maq${color==='yellow'?' yellow':''}`;

    // Line label cell — spans all rows of this line, only on first row
    if(wi === 0) {
      const tdLinea = document.createElement('td');
      tdLinea.className = 'linea-label';
      tdLinea.rowSpan = totalRows;
      tdLinea.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;gap:4px">
        <span>${line.label}</span>
        <button onclick="removeLine('${line.id}')" title="Eliminar línea"
          style="font-size:9px;color:#ccc;background:none;border:none;cursor:pointer;padding:0;transition:color .12s"
          onmouseover="this.style.color='#c00'" onmouseout="this.style.color='#ccc'">✕</button>
      </div>`;
      tr.appendChild(tdLinea);
    }

    // Puesto label + controls
    const tdPuesto = document.createElement('td');
    tdPuesto.className = 'puesto-label';
    tdPuesto.innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between;gap:4px">
      <span>OPERADOR/A MÁQUINA</span>
      <div style="display:flex;gap:2px;flex-shrink:0">
        ${line.maq.length > 1 && wi === line.maq.length-1
          ? `<button class="ctrl-btn ctrl-del" onclick="removeMaq('${line.id}')" title="Quitar operador/a máquina">−</button>`
          : ''}
        ${wi === line.maq.length-1
          ? `<button class="ctrl-btn ctrl-add" onclick="addMaq('${line.id}')" title="Añadir operador/a máquina">+</button>`
          : ''}
      </div>
    </div>`;
    tr.appendChild(tdPuesto);

    TURNOS.forEach(t => tr.appendChild(buildNameCell(w, t)));
    tbody.appendChild(tr);
  });

  // ── OPERARIA/O rows ──
  line.ops.forEach((w, wi) => {
    const tr = document.createElement('tr');
    tr.className = `line-op${color==='yellow'?' yellow':''}`;

    const tdPuesto = document.createElement('td');
    tdPuesto.className = 'puesto-label';
    tdPuesto.innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between;gap:4px">
      <span>OPERARIA/O</span>
      <div style="display:flex;gap:2px;flex-shrink:0">
        ${line.ops.length > 1 && wi === line.ops.length-1
          ? `<button class="ctrl-btn ctrl-del" onclick="removeOp('${line.id}')" title="Quitar operaria/o">−</button>`
          : ''}
        ${wi === line.ops.length-1
          ? `<button class="ctrl-btn ctrl-add" onclick="addOp('${line.id}')" title="Añadir operaria/o">+</button>`
          : ''}
      </div>
    </div>`;
    tr.appendChild(tdPuesto);

    TURNOS.forEach(t => tr.appendChild(buildNameCell(w, t)));
    tbody.appendChild(tr);
  });
}

function buildNameCell(worker, turno) {
  const td = document.createElement('td');
  td.className = `name-cell cell-${turno.toLowerCase()}`;
  const div = document.createElement('div');
  div.className = 'row-controls';
  const { wrap } = makeAcInput(
    worker.cells[turno] || '',
    currentTab,
    (val) => { worker.cells[turno] = val; },
    true   // bloquear duplicados igual que el resto de departamentos
  );
  div.appendChild(wrap);
  td.appendChild(div);
  return td;
}


function buildDivider(text) {
  const tr = document.createElement('tr');
  tr.className = 'section-divider';
  const td = document.createElement('td');
  td.colSpan = 6;
  td.textContent = text;
  tr.appendChild(td);
  return tr;
}

function buildExpandableRow(worker, wi, puesto, arr) {
  const isPuestoObj = typeof puesto === 'object' && puesto.label;
  const label    = isPuestoObj ? puesto.label : (puesto === 'bajas' ? 'BAJA' : 'VACACIONES');
  const rowType  = isPuestoObj ? puesto.type  : puesto;
  const puestoId = isPuestoObj ? puesto.id    : puesto;

  const tr = document.createElement('tr');
  tr.className = rowType === 'sup'   ? 'sup-row'
               : rowType === 'bajas' ? 'bajas-row'
               : rowType === 'vac'   ? 'vac-row'
               : 'special-row';

  // Empty linea cell
  const tdL = document.createElement('td');
  tdL.className = 'linea-label';
  tdL.style.cssText = 'background:transparent;border-color:var(--border-l)';
  tr.appendChild(tdL);

  // Label + controls on last row
  const tdP = document.createElement('td');
  tdP.className = 'puesto-label';
  const isLast = wi === arr.length - 1;
  tdP.innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between;gap:4px">
    <span>${label}</span>
    ${isLast ? `<div style="display:flex;gap:2px;flex-shrink:0">
      ${arr.length > 1
        ? `<button class="ctrl-btn ctrl-del" onclick="removeSpecial('${puestoId}')" title="Quitar fila">−</button>`
        : ''}
      <button class="ctrl-btn ctrl-add" onclick="addSpecial('${puestoId}')" title="Añadir persona">+</button>
    </div>` : ''}
  </div>`;
  tr.appendChild(tdP);

  // Usar autocomplete igual que en los turnos
  TURNOS.forEach(t => {
    const td = document.createElement('td');
    td.className = `name-cell cell-${t.toLowerCase()}`;
    const div = document.createElement('div');
    div.className = 'row-controls';
    const { wrap } = makeAcInput(
      worker.cells[t] || '',
      currentTab,
      (val) => { worker.cells[t] = val; }
    );
    div.appendChild(wrap);
    td.appendChild(div);
    tr.appendChild(td);
  });

  return tr;
}

  if(!line || line.maq.length <= 1) { toast('Mínimo 1 operador/a máquina'); return; }
  line.maq.pop();
  render();
}

function addOp(lineId) {
  const line = lines.find(l => l.id === lineId);
  if(!line) return;
  line.ops.push(mkWorker('op_'+lineId+'_'+Date.now()));
  render();
}

function removeOp(lineId) {
  const line = lines.find(l => l.id === lineId);
  if(!line || line.ops.length <= 1) { toast('Mínimo 1 operaria/o'); return; }
  line.ops.pop();
  render();
}

function removeLine(lineId) {
  if(lines.length <= 1) { toast('Mínimo 1 línea'); return; }
  lines = lines.filter(l => l.id !== lineId);
  render();
}

function addLine(type) {
  const isL2 = type === 'L2';
  const prefix = isL2 ? 'L2.' : 'L';
  const existing = lines.filter(l => l.isL2sub === isL2);
  const nums = existing.map(l => parseFloat(l.label.replace(/[^\d.]/g,''))).filter(n=>!isNaN(n));
  const next = nums.length ? Math.max(...nums) + 1 : (isL2 ? 2.11 : 8);
  const id = prefix + next;
  const colors = ['green','yellow'];
  const color = colors[lines.length % 2];
  lines.push(mkLine(id, id, color, isL2));
  render();
  toast('Línea ' + id + ' añadida');
}

// ═══════════════════════════════════════════════════════════════════════
//  DATES — calcula lunes a domingo a partir de semana + año ISO
// ═══════════════════════════════════════════════════════════════════════
function getWeekDates(year, week) {
  // ISO week: week 1 = week containing first Thursday of year
  const jan4 = new Date(year, 0, 4);
  const startOfW1 = new Date(jan4);
  startOfW1.setDate(jan4.getDate() - ((jan4.getDay() + 6) % 7));
  const monday = new Date(startOfW1);
  monday.setDate(startOfW1.getDate() + (week - 1) * 7);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  return { monday, sunday };
}

function fmtDate(d) {
  return String(d.getDate()).padStart(2,'0') + '/' +
         String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear();
}

function fmtISO(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function updateWeekFromSelector() {
  const year = parseInt(document.getElementById('meta-ano').value) || 2026;
  const week = parseInt(document.getElementById('meta-sem').value) || 1;
  const { monday, sunday } = getWeekDates(year, week);
  document.getElementById('meta-dates').textContent =
    'Del ' + fmtDate(monday) + ' al ' + fmtDate(sunday);
}

function changeWeek(delta) {
  const sem = document.getElementById('meta-sem');
  let w = parseInt(sem.value) + delta;
  const year = parseInt(document.getElementById('meta-ano').value) || 2026;
  if (w < 1) {
    w = 52;
    document.getElementById('meta-ano').value = year - 1;
  } else if (w > 52) {
    w = 1;
    document.getElementById('meta-ano').value = year + 1;
  }
  sem.value = w;
  updateWeekFromSelector();
  // auto-save new week slot and load existing data for that week if available
  loadWeekFromStorage(year + '-' + String(w).padStart(2,'0'));
}

// legacy compat — keep for any old references
function updateWeek() { updateWeekFromSelector(); }

    },

      bajas: elabBajas,
      vacaciones: elabVacaciones,
    },
    // ── Almacén ──
    almacen: {
      workers: almWorkers,
      bajas: almBajas,
      vacaciones: almVacaciones,
    },
    // ── Mantenimiento ──
    mantenimiento: {
      workers: mtoWorkers,
      bajas: mtoBajas,
      vacaciones: mtoVacaciones,
    },
    // ── Calidad Líneas ──
    calidadLineas: {
      workers: calWorkers,
      bajas: calBajas,
      vacaciones: calVacaciones,
    },
    // ── Calidad FQ ──
    calidadFQ: {
      workers: calfqWorkers,
      bajas: calfqBajas,
      vacaciones: calfqVacaciones,
    },
    // ── Calidad Micro ──
    calidadMicro: {
      workers: calmicroWorkers,
      bajas: calmicroBajas,
      vacaciones: calmicroVacaciones,
    },
    // ── Calidad Materiales ──
    calidadMat: {
      workers: calmatWorkers,
      bajas: calmatBajas,
      vacaciones: calmatVacaciones,
    },
    // ── Mejora Continua ──
    mejoraContinua: {
      workers: mcWorkers,
      bajas: mcBajas,
      vacaciones: mcVacaciones,
    },
    // ── Soplado ──
    soplado: {
      workers: soplWorkers,
      bajas: soplBajas,
      vacaciones: soplVacaciones,
    },
  };

  const b = new Blob([JSON.stringify(payload, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = `ubesol_${weekKey()}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('✓ Fichero descargado: ubesol_' + weekKey() + '.json');
}

function triggerLoad() {
  const input = document.getElementById('json-file-input');
  input.value = ''; // reset so same file can be reloaded
  input.click();
}

function loadJSON(input) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if (!d._version) { toast('Fichero no válido'); return; }

      // ── Meta ──
      if (d.semana)       document.getElementById('meta-sem').value  = d.semana;
      if (d.ano)          document.getElementById('meta-ano').value  = d.ano;
      if (d.fecha_inicio) document.getElementById('meta-ini').value  = d.fecha_inicio;
      if (d.fecha_fin)    document.getElementById('meta-fin').value  = d.fecha_fin;
      if (d.responsable)  document.getElementById('responsable').value = d.responsable;

      // ── Envasado ──
      if (d.envasado) {
        if (d.envasado.specialWorkers) Object.assign(specialWorkers, d.envasado.specialWorkers);
        if (d.envasado.lines)          lines      = d.envasado.lines;
        if (d.envasado.bajas)          bajas      = d.envasado.bajas;
        if (d.envasado.vacaciones)     vacaciones = d.envasado.vacaciones;
      }
      // ── Elaboración ──
      if (d.elaboracion) {
        if (d.elaboracion.workers)    Object.assign(elabWorkers, d.elaboracion.workers);
        if (d.elaboracion.bajas)      elabBajas      = d.elaboracion.bajas;
        if (d.elaboracion.vacaciones) elabVacaciones = d.elaboracion.vacaciones;
      }
      // ── Almacén ──
      if (d.almacen) {
        if (d.almacen.workers)    Object.assign(almWorkers, d.almacen.workers);
        if (d.almacen.bajas)      almBajas      = d.almacen.bajas;
        if (d.almacen.vacaciones) almVacaciones = d.almacen.vacaciones;
      }
      // ── Mantenimiento ──
      if (d.mantenimiento) {
        if (d.mantenimiento.workers)    Object.assign(mtoWorkers, d.mantenimiento.workers);
        if (d.mantenimiento.bajas)      mtoBajas      = d.mantenimiento.bajas;
        if (d.mantenimiento.vacaciones) mtoVacaciones = d.mantenimiento.vacaciones;
      }
      // ── Calidad Líneas ──
      if (d.calidadLineas) {
        if (d.calidadLineas.workers)    Object.assign(calWorkers, d.calidadLineas.workers);
        if (d.calidadLineas.bajas)      calBajas      = d.calidadLineas.bajas;
        if (d.calidadLineas.vacaciones) calVacaciones = d.calidadLineas.vacaciones;
      }
      // ── Calidad FQ ──
      if (d.calidadFQ) {
        if (d.calidadFQ.workers)    Object.assign(calfqWorkers, d.calidadFQ.workers);
        if (d.calidadFQ.bajas)      calfqBajas      = d.calidadFQ.bajas;
        if (d.calidadFQ.vacaciones) calfqVacaciones = d.calidadFQ.vacaciones;
      }
      // ── Calidad Micro ──
      if (d.calidadMicro) {
        if (d.calidadMicro.workers)    Object.assign(calmicroWorkers, d.calidadMicro.workers);
        if (d.calidadMicro.bajas)      calmicroBajas      = d.calidadMicro.bajas;
        if (d.calidadMicro.vacaciones) calmicroVacaciones = d.calidadMicro.vacaciones;
      }
      // ── Calidad Materiales ──
      if (d.calidadMat) {
        if (d.calidadMat.workers)    Object.assign(calmatWorkers, d.calidadMat.workers);
        if (d.calidadMat.bajas)      calmatBajas      = d.calidadMat.bajas;
        if (d.calidadMat.vacaciones) calmatVacaciones = d.calidadMat.vacaciones;
      }
      // ── Mejora Continua ──
      if (d.mejoraContinua) {
        if (d.mejoraContinua.workers)    Object.assign(mcWorkers, d.mejoraContinua.workers);
        if (d.mejoraContinua.bajas)      mcBajas      = d.mejoraContinua.bajas;
        if (d.mejoraContinua.vacaciones) mcVacaciones = d.mejoraContinua.vacaciones;
      }
      // ── Soplado ──
      if (d.soplado) {
        if (d.soplado.workers)    Object.assign(soplWorkers, d.soplado.workers);
        if (d.soplado.bajas)      soplBajas      = d.soplado.bajas;
        if (d.soplado.vacaciones) soplVacaciones = d.soplado.vacaciones;
      }

      renderCurrent();
      toast('✓ Cuadrante cargado — semana ' + (d.semana||'?') + ' / ' + (d.ano||''));

    } catch(err) {
      toast('Error al leer el fichero: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function publicar() {
  // ── Buscar duplicados ─────────────────────────────────────────────
  const count = {};
  const add = (v, dept) => {
    if (!v || !v.trim()) return;
    const k = v.trim().toUpperCase();
    if (!count[k]) count[k] = { nombre: v.trim(), depts: [] };
    count[k].depts.push(dept);
  };
  const safeArr = (a) => Array.isArray(a) ? a : [];

  // Envasado lines — tienen maq[] y ops[], no groups[]
  safeArr(lines).forEach(l => {
    [...safeArr(l.maq), ...safeArr(l.ops)].forEach(w => {
      if (w && w.cells) TURNOS.forEach(t => add(w.cells[t], 'Envasado / ' + l.label));
    });
  });
  // Especiales Envasado
  if (specialWorkers) Object.values(specialWorkers).forEach(arr =>
    safeArr(arr).forEach(w => { if(w && w.cells) TURNOS.forEach(t => add(w.cells[t], 'Envasado / Especiales')); }));
  // Post depts
  const postDepts = [
    [elabWorkers,    'Elaboración'],
    [almWorkers,     'Almacén'],
    [mtoWorkers,     'Mantenimiento'],
    [calWorkers,     'Calidad Líneas'],
    [calfqWorkers,   'Calidad Fís-Quím'],
    [calmicroWorkers,'Calidad Microbiología'],
    [calmatWorkers,  'Calidad Materiales'],
    [mcWorkers,      'Mejora Continua'],
    [soplWorkers,    'Soplado'],
  ];
  postDepts.forEach(([obj, label]) => {
    if (!obj) return;
    Object.values(obj).forEach(arr => safeArr(arr).forEach(w => {
      if(w && w.cells) TURNOS.forEach(t => add(w.cells[t], label));
    }));
  });

  // Encontrar nombres que aparecen más de una vez
  const duplicados = Object.values(count).filter(d => d.depts.length > 1);

  if (duplicados.length > 0) {
    // Mostrar modal de aviso
    const msg = duplicados.map(d =>
      `• ${d.nombre} — aparece ${d.depts.length} veces (${d.depts.join(', ')})`
    ).join('\n');

    const continuar = confirm(
      '⚠️ ATENCIÓN — Se han encontrado ' + duplicados.length + ' trabajador(es) duplicado(s):\n\n' +
      msg + '\n\n' +
      '¿Desea publicar el cuadrante igualmente?'
    );
    if (!continuar) return;
  }

  autoSave();
  toast(duplicados.length > 0
    ? '⚠️ Cuadrante publicado con ' + duplicados.length + ' duplicado(s)'
    : '✓ Cuadrante publicado y guardado correctamente');
}

function clearStorage() {
  const k = weekKey();
  if (!confirm('¿Borrar los datos de la semana ' + document.getElementById('meta-sem').value + '? Esta acción no se puede deshacer.')) return;
  localStorage.removeItem(k);
  loadWeekFromStorage(k);
  toast('Datos de la semana borrados.');
}

    <th class="th-puesto" style="text-align:left;padding-left:12px">PUESTO</th>
    <th class="th-m">TURNO MAÑANA</th>
    <th class="th-t">TURNO TARDE</th>
    <th class="th-n">TURNO NOCHE</th>
    <th class="th-p">TURNO PARTIDO / ESPECIAL</th>
  </tr>`;
  tbl.appendChild(thead);

  const tbody = document.createElement('tbody');

  puestos.forEach(puesto => {
    const arr = workers[puesto.id];
    arr.forEach((w, wi) => tbody.appendChild(buildPostRow(w, wi, puesto, arr)));
  });

  // Separator
  const sep = document.createElement('tr');
  sep.innerHTML = `<td colspan="5" style="height:20px;background:#f0f0f0;border-top:2px solid var(--border);border-bottom:2px solid var(--border)"></td>`;
  tbody.appendChild(sep);

  // Bottom groups (bajas / vacaciones)
  bottomGroups.forEach(grp => {
    grp.arr.forEach((w, wi) =>
      tbody.appendChild(buildPostRow(w, wi, {id: grp.id, label: grp.label, type: grp.type}, grp.arr)));
  });

  tbl.appendChild(tbody);
  root.appendChild(tbl);
}

function buildPostRow(worker, wi, puesto, arr) {
  const isLast = wi === arr.length - 1;
  const type   = puesto.type;

  const tr = document.createElement('tr');
  // Row background: alternate green/yellow for puestos, special for bajas/vac
  if      (type === 'sup')   tr.className = 'sup-row';
  else if (type === 'bajas') tr.className = 'bajas-row';
  else if (type === 'vac')   tr.className = 'vac-row';
  else if (type === 'green') tr.className = 'line-op';
  else                       tr.className = 'line-op yellow';

  // Puesto label — show on first row only, with rowSpan
  if (wi === 0) {
    const tdP = document.createElement('td');
    tdP.className = 'puesto-label';
    tdP.rowSpan = arr.length;
    tdP.style.cssText = 'vertical-align:middle;border-right:2px solid var(--border);font-size:12px;font-weight:700';
    tdP.innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between;gap:6px">
      <span>${puesto.label}</span>
      <div style="display:flex;gap:2px;flex-shrink:0">
        ${arr.length > 1
          ? `<button class="ctrl-btn ctrl-del" onclick="removePostWorker('${puesto.id}')" title="Quitar fila">−</button>`
          : ''}
        <button class="ctrl-btn ctrl-add" onclick="addPostWorker('${puesto.id}')" title="Añadir persona">+</button>
      </div>
    </div>`;
    tr.appendChild(tdP);
  }

  // 4 turno cells
  TURNOS.forEach(t => {
    const td = document.createElement('td');
    td.className = `name-cell cell-${t.toLowerCase()}`;
    const { wrap } = makeAcInput(
      worker.cells[t] || '',
      currentTab,
      (val) => { worker.cells[t] = val; }
    );
    td.appendChild(wrap);
    tr.appendChild(td);
  });

  return tr;
}

function addPostWorker(puestoId) {
  const arr = getPostArr(puestoId);
  arr.push(mkWorker(puestoId+'_'+Date.now()));
  renderCurrent();
}

function removePostWorker(puestoId) {
  const arr = getPostArr(puestoId);
  if(arr.length <= 1) { toast('Mínimo 1 persona'); return; }
  arr.pop();
  renderCurrent();
}

function getPostArr(id) {
  // Soplado
  if(id === 'sopl_bajas') return soplBajas;
  if(id === 'sopl_vac')   return soplVacaciones;
  if(soplWorkers[id])     return soplWorkers[id];
  // Mejora Continua
  if(id === 'mc_bajas') return mcBajas;
  if(id === 'mc_vac')   return mcVacaciones;
  if(mcWorkers[id])     return mcWorkers[id];
  // Calidad Materiales
  if(id === 'calmat_bajas') return calmatBajas;
  if(id === 'calmat_vac')   return calmatVacaciones;
  if(calmatWorkers[id])     return calmatWorkers[id];
  // Calidad FQ
  if(id === 'calfq_bajas') return calfqBajas;
  if(id === 'calfq_vac')   return calfqVacaciones;
  if(calfqWorkers[id])     return calfqWorkers[id];
  // Calidad Micro
  if(id === 'calmicro_bajas') return calmicroBajas;
  if(id === 'calmicro_vac')   return calmicroVacaciones;
  if(calmicroWorkers[id])     return calmicroWorkers[id];
  // Calidad Líneas
  if(id === 'cal_bajas') return calBajas;
  if(id === 'cal_vac')   return calVacaciones;
  if(calWorkers[id])     return calWorkers[id];
  // Elaboración
  if(id === 'elab_bajas') return elabBajas;
  if(id === 'elab_vac')   return elabVacaciones;
  if(elabWorkers[id])     return elabWorkers[id];
  // Almacén
  if(id === 'alm_bajas')  return almBajas;
  if(id === 'alm_vac')    return almVacaciones;
  if(almWorkers[id])      return almWorkers[id];
  // Mantenimiento
  if(id === 'mto_bajas')  return mtoBajas;
  if(id === 'mto_vac')    return mtoVacaciones;
  if(mtoWorkers[id])      return mtoWorkers[id];
  return [];
}

// ── TAB SWITCH ─────────────────────────────────────────────────────────
function switchTab(dept) {
  if(dept === currentTab) return;
  currentTab = dept;
  document.querySelectorAll('.tab:not(.disabled)').forEach(btn => {
    btn.classList.toggle('active', btn.id === 'tab-'+dept);
  });
  document.getElementById('dept-title').textContent = dept;
  renderCurrent();
}

function renderCurrent() {
  if(currentTab === 'Envasado') {
    document.getElementById('add-line-area').style.display = '';
    render();
  } else if(currentTab === 'Soplado') {
    renderPostDept('Soplado', SOPL_PUESTOS, soplWorkers,
      [{id:'sopl_bajas', label:'BAJAS',      type:'bajas', arr: soplBajas},
       {id:'sopl_vac',   label:'VACACIONES', type:'vac',   arr: soplVacaciones}]);
  } else if(currentTab === 'Mejora Continua') {
    renderPostDept('Mejora Continua', MC_PUESTOS, mcWorkers,
      [{id:'mc_bajas', label:'BAJAS',      type:'bajas', arr: mcBajas},
       {id:'mc_vac',   label:'VACACIONES', type:'vac',   arr: mcVacaciones}]);
  } else if(currentTab === 'Calidad Mat') {
    renderPostDept('Calidad Mat', CALMAT_PUESTOS, calmatWorkers,
      [{id:'calmat_bajas', label:'BAJAS',      type:'bajas', arr: calmatBajas},
       {id:'calmat_vac',   label:'VACACIONES', type:'vac',   arr: calmatVacaciones}]);
  } else if(currentTab === 'Calidad FQ') {
    renderPostDept('Calidad FQ', CALFQ_PUESTOS, calfqWorkers,
      [{id:'calfq_bajas', label:'BAJAS',      type:'bajas', arr: calfqBajas},
       {id:'calfq_vac',   label:'VACACIONES', type:'vac',   arr: calfqVacaciones}]);
  } else if(currentTab === 'Calidad Micro') {
    renderPostDept('Calidad Micro', CALMICRO_PUESTOS, calmicroWorkers,
      [{id:'calmicro_bajas', label:'BAJAS',      type:'bajas', arr: calmicroBajas},
       {id:'calmicro_vac',   label:'VACACIONES', type:'vac',   arr: calmicroVacaciones}]);
  } else if(currentTab === 'Calidad Líneas') {
    renderPostDept('Calidad Líneas', CAL_PUESTOS, calWorkers,
      [{id:'cal_bajas', label:'BAJAS',      type:'bajas', arr: calBajas},
       {id:'cal_vac',   label:'VACACIONES', type:'vac',   arr: calVacaciones}]);
  } else if(currentTab === 'Elaboración') {
    renderPostDept('Elaboración', ELAB_PUESTOS, elabWorkers,
      [{id:'elab_bajas', label:'BAJAS',      type:'bajas', arr: elabBajas},
       {id:'elab_vac',   label:'VACACIONES', type:'vac',   arr: elabVacaciones}]);
  } else if(currentTab === 'Almacén') {
    renderPostDept('Almacén', ALMC_PUESTOS, almWorkers,
      [{id:'alm_bajas', label:'BAJAS',      type:'bajas', arr: almBajas},
       {id:'alm_vac',   label:'VACACIONES', type:'vac',   arr: almVacaciones}]);
  } else if(currentTab === 'Mantenimiento') {
    renderMantenimiento();
  }
}

// ── LOCALSTORAGE — guarda por semana ──────────────────────────────────
function weekKey() {
  const ano = document.getElementById('meta-ano').value || '2026';
  const sem = String(document.getElementById('meta-sem').value || '1').padStart(2,'0');
  return 'ubesol_' + ano + '_s' + sem;
}

function buildPayload() {
  const ano = document.getElementById('meta-ano').value || '2026';
  const sem = document.getElementById('meta-sem').value || '1';
  const { monday, sunday } = getWeekDates(parseInt(ano), parseInt(sem));
  return {
    _version: 1,
    semana:        sem,
    ano:           ano,
    fecha_inicio:  fmtISO(monday),
    fecha_fin:     fmtISO(sunday),
    responsable:   document.getElementById('responsable').value,
    envasado:       { specialWorkers, lines, bajas, vacaciones },
    elaboracion:    { workers: elabWorkers,    bajas: elabBajas,      vacaciones: elabVacaciones },
    almacen:        { workers: almWorkers,     bajas: almBajas,       vacaciones: almVacaciones },
    mantenimiento:  { workers: mtoWorkers,     bajas: mtoBajas,       vacaciones: mtoVacaciones },
    calidadLineas:  { workers: calWorkers,     bajas: calBajas,       vacaciones: calVacaciones },
    calidadFQ:      { workers: calfqWorkers,   bajas: calfqBajas,     vacaciones: calfqVacaciones },
    calidadMicro:   { workers: calmicroWorkers,bajas: calmicroBajas,  vacaciones: calmicroVacaciones },
    calidadMat:     { workers: calmatWorkers,  bajas: calmatBajas,    vacaciones: calmatVacaciones },
    mejoraContinua: { workers: mcWorkers,      bajas: mcBajas,        vacaciones: mcVacaciones },
    soplado:        { workers: soplWorkers,    bajas: soplBajas,      vacaciones: soplVacaciones },
  };
}

function autoSave() {
  try {
    localStorage.setItem(weekKey(), JSON.stringify(buildPayload()));
  } catch(e) {}
}

function applyPayload(d) {
  if (!d || !d._version) return false;
  if (d.semana)     document.getElementById('meta-sem').value    = d.semana;
  if (d.ano)        document.getElementById('meta-ano').value    = d.ano;
  if (d.responsable) document.getElementById('responsable').value = d.responsable;
  updateWeekFromSelector();

  const merge = (target, src) => { if(src) Object.assign(target, src); };
  if (d.envasado)       { merge(specialWorkers, d.envasado.specialWorkers); if(d.envasado.lines) lines=d.envasado.lines; if(d.envasado.bajas) bajas=d.envasado.bajas; if(d.envasado.vacaciones) vacaciones=d.envasado.vacaciones; }
  if (d.elaboracion)    { merge(elabWorkers, d.elaboracion.workers);    if(d.elaboracion.bajas)    elabBajas=d.elaboracion.bajas;       if(d.elaboracion.vacaciones)    elabVacaciones=d.elaboracion.vacaciones; }
  if (d.almacen)        { merge(almWorkers,  d.almacen.workers);        if(d.almacen.bajas)        almBajas=d.almacen.bajas;            if(d.almacen.vacaciones)        almVacaciones=d.almacen.vacaciones; }
  if (d.mantenimiento)  { merge(mtoWorkers,  d.mantenimiento.workers);  if(d.mantenimiento.bajas)  mtoBajas=d.mantenimiento.bajas;      if(d.mantenimiento.vacaciones)  mtoVacaciones=d.mantenimiento.vacaciones; }
  if (d.calidadLineas)  { merge(calWorkers,  d.calidadLineas.workers);  if(d.calidadLineas.bajas)  calBajas=d.calidadLineas.bajas;      if(d.calidadLineas.vacaciones)  calVacaciones=d.calidadLineas.vacaciones; }
  if (d.calidadFQ)      { merge(calfqWorkers,d.calidadFQ.workers);      if(d.calidadFQ.bajas)      calfqBajas=d.calidadFQ.bajas;        if(d.calidadFQ.vacaciones)      calfqVacaciones=d.calidadFQ.vacaciones; }
  if (d.calidadMicro)   { merge(calmicroWorkers,d.calidadMicro.workers);if(d.calidadMicro.bajas)   calmicroBajas=d.calidadMicro.bajas;  if(d.calidadMicro.vacaciones)   calmicroVacaciones=d.calidadMicro.vacaciones; }
  if (d.calidadMat)     { merge(calmatWorkers,d.calidadMat.workers);    if(d.calidadMat.bajas)     calmatBajas=d.calidadMat.bajas;      if(d.calidadMat.vacaciones)     calmatVacaciones=d.calidadMat.vacaciones; }
  if (d.mejoraContinua) { merge(mcWorkers,   d.mejoraContinua.workers); if(d.mejoraContinua.bajas) mcBajas=d.mejoraContinua.bajas;      if(d.mejoraContinua.vacaciones) mcVacaciones=d.mejoraContinua.vacaciones; }
  if (d.soplado)        { merge(soplWorkers, d.soplado.workers);        if(d.soplado.bajas)        soplBajas=d.soplado.bajas;           if(d.soplado.vacaciones)        soplVacaciones=d.soplado.vacaciones; }
  return true;
}

function loadWeekFromStorage(key) {
  // Reset all departments to empty before loading
  lines = defaultLines(); initSpecialWorkers();
  bajas = [mkWorker('baja_0')]; vacaciones = [mkWorker('vac_0')];
  initSoplado(); initMejoraContinua(); initCalidadMat();
  initCalidadFQ(); initCalidadMicro(); initCalidad();
  initElaboracion(); initAlmacen(); initMantenimiento();
  try {
    const saved = localStorage.getItem(key || weekKey());
    if (saved) {
      const d = JSON.parse(saved);
      if (applyPayload(d)) {
        toast('✓ Semana ' + d.semana + '/' + d.ano + ' cargada');
      }
    } else {
      updateWeekFromSelector();
      toast('Semana nueva — sin datos guardados');
    }
  } catch(e) {}
  renderCurrent();
}

// Saved weeks list — shows which weeks have data
function listSavedWeeks() {
  const weeks = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('ubesol_')) weeks.push(k);
  }
  return weeks.sort().reverse();
}

// Auto-save every 30s + on any input
setInterval(autoSave, 30000);
document.addEventListener('input', autoSave);
document.addEventListener('change', autoSave);

// ── TOAST ──────────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── INIT ───────────────────────────────────────────────────────────────
// Set current week number automatically
(function() {
  const now = new Date();
  const jan4 = new Date(now.getFullYear(), 0, 4);
  const startW1 = new Date(jan4);
  startW1.setDate(jan4.getDate() - ((jan4.getDay()+6)%7));
  const wk = Math.ceil((now - startW1) / 604800000) + 1;
  document.getElementById('meta-sem').value = Math.min(wk, 52);
  document.getElementById('meta-ano').value = now.getFullYear();
})();

lines = defaultLines();
initSpecialWorkers();
bajas = [mkWorker('baja_0')];
vacaciones = [mkWorker('vac_0')];
initSoplado();
initMejoraContinua();
initCalidadMat();
initCalidadFQ();
initCalidadMicro();
initCalidad();
initElaboracion();
initAlmacen();
initMantenimiento();

// Load workers CSV then restore week data
loadWorkers().finally(() => {
  loadWeekFromStorage();
});
</script>
