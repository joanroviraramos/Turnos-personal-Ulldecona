<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Horas Extras — Grupo Ubesol</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

:root {
  --bg: #f0f0f0;
  --white: #ffffff;
  --border: #b0b0b0;
  --border-l: #d0d0d0;
  --text: #1a1a1a;
  --muted: #555;
  --faint: #999;
  --green-dark: #1b5e20;
  --surface: #f8f8f8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }

.doc-header {
  background: var(--white); border-bottom: 2px solid var(--border);
  padding: 10px 16px; display: flex; align-items: center; gap: 14px;
  flex-wrap: wrap; position: sticky; top: 0; z-index: 100;
}
.logo { font-size: 13px; font-weight: 700; color: var(--green-dark); letter-spacing: 0.04em; text-transform: uppercase; }
.title { font-size: 13px; font-weight: 600; color: #e65100; }

.toolbar {
  background: var(--white); border-bottom: 1px solid var(--border-l);
  padding: 8px 16px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.btn { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 4px; border: 1px solid var(--border); cursor: pointer; background: white; color: var(--text); transition: all .15s; }
.btn:hover { background: #f5f5f5; }

.main { padding: 16px; max-width: 1200px; margin: 0 auto; }

/* Filtro año */
.year-filter { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.year-filter label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; }
.year-filter select { font-family: 'Inter', sans-serif; font-size: 12px; border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; background: white; cursor: pointer; }

/* Tabs departamento */
.dept-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.dept-tab { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border-l); font-size: 12px; font-weight: 600; cursor: pointer; background: white; color: var(--muted); transition: all .15s; }
.dept-tab:hover { background: #f5f5f5; }
.dept-tab.active { background: var(--green-dark); color: white; border-color: var(--green-dark); }

/* Summary cards */
.summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 20px; }
.metric { background: white; border: 1px solid var(--border-l); border-radius: 8px; padding: 14px 16px; }
.metric-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
.metric-val { font-size: 24px; font-weight: 700; color: var(--text); line-height: 1; }
.metric-sub { font-size: 11px; color: var(--faint); margin-top: 4px; }
.metric.danger { background: #ffebee; border-color: #ef9a9a; }
.metric.danger .metric-label { color: #b71c1c; }
.metric.danger .metric-val { color: #b71c1c; }
.metric.warning { background: #fff8e1; border-color: #ffe082; }
.metric.warning .metric-label { color: #854F0B; }
.metric.warning .metric-val { color: #854F0B; }

/* Worker list */
.section-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }

.worker-card { background: white; border: 1px solid var(--border-l); border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; transition: box-shadow .15s; }
.worker-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.08); }
.worker-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 8px; flex-wrap: wrap; }
.worker-name { font-size: 13px; font-weight: 600; color: var(--text); }
.worker-dept { font-size: 11px; color: var(--faint); margin-top: 1px; }
.badges { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; flex-shrink: 0; }
.badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
.badge-limit   { background: #ffebee; color: #b71c1c; border: 1px solid #ef9a9a; }
.badge-warning { background: #fff8e1; color: #854F0B; border: 1px solid #ffe082; }
.badge-pagar   { background: #fff3e0; color: #e65100; }
.badge-comp    { background: #e8f5e9; color: #1b5e20; }

.bar-track { height: 7px; background: #f0f0f0; border-radius: 4px; overflow: hidden; margin-bottom: 3px; }
.bar-fill  { height: 100%; border-radius: 4px; transition: width .4s ease; }
.bar-info  { display: flex; justify-content: space-between; font-size: 10px; color: var(--faint); }

/* Admin: secciones por dept */
.dept-section { margin-bottom: 24px; }
.dept-section-header {
  background: var(--green-dark); color: white; font-size: 12px; font-weight: 700;
  padding: 7px 14px; border-radius: 6px 6px 0 0; text-transform: uppercase; letter-spacing: .05em;
  display: flex; justify-content: space-between; align-items: center;
}
.dept-section-header .dept-stats { font-size: 11px; font-weight: 400; opacity: .85; }
.dept-section-body { border: 1px solid var(--border-l); border-top: none; border-radius: 0 0 6px 6px; overflow: hidden; }

/* Empty */
.empty { text-align: center; padding: 32px; color: var(--faint); font-size: 13px; }

/* Loading */
.loading { text-align: center; padding: 40px; color: var(--faint); }

/* Toast */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1b5e20; color: white; font-size: 13px; font-weight: 500; padding: 10px 20px; border-radius: 6px; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; z-index: 9999; }
.toast.show { opacity: 1; }
</style>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyBnrOQqP83lotv-EozHuql704DU20m-wWU",
  authDomain: "maverick-turnos-81d4a.firebaseapp.com",
  projectId: "maverick-turnos-81d4a",
  storageBucket: "maverick-turnos-81d4a.firebasestorage.app",
  messagingSenderId: "170123467344",
  appId: "1:170123467344:web:142eee4473940ebd924f55"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>
</head>
<body>

<div class="doc-header">
  <div class="logo">GrupoUbesol</div>
  <div class="title">📊 Dashboard Horas Extras</div>
  <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
    <span style="font-size:11px;color:var(--muted)" id="last-update"></span>
    <button class="btn" onclick="window.location.href='index.html'">‹ Portal</button>
  </div>
</div>

<div class="toolbar">
  <label style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase">Año:</label>
  <select id="sel-anio" onchange="cargarDatos()" style="font-family:'Inter',sans-serif;font-size:12px;border:1px solid var(--border);border-radius:4px;padding:4px 8px;background:white;cursor:pointer">
    <option value="2026">2026</option>
    <option value="2025">2025</option>
  </select>
  <button class="btn" onclick="cargarDatos()" style="margin-left:4px">↻ Actualizar</button>
  <span style="margin-left:auto;font-size:11px;color:var(--muted)" id="total-docs"></span>
</div>

<div class="main" id="main-content">
  <div class="loading">Cargando datos de Firebase...</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── DEPT CONFIG ──────────────────────────────────────────────────────────────
const deptParam = new URLSearchParams(window.location.search).get('dept') || 'admin';

const DEPTS_CONFIG = [
  { id:'envasado',      label:'Envasado',        color:'#1b5e20', deptKey:'envasado' },
  { id:'elaboracion',   label:'Elaboración',      color:'#0d47a1', deptKey:'elaboracion' },
  { id:'almacen',       label:'Almacén',          color:'#4a148c', deptKey:'almacen' },
  { id:'mantenimiento', label:'Mantenimiento',    color:'#bf360c', deptKey:'mantenimiento' },
  { id:'calidad',       label:'Calidad',          color:'#006064', deptKey:'calidadlineas' },
  { id:'soplado',       label:'Soplado',          color:'#33691e', deptKey:'soplado' },
  { id:'mejora',        label:'Mejora Continua',  color:'#4e342e', deptKey:'mejoracontinua' },
];

const DEPT_MAP = {
  envasado:'envasado', elaboracion:'elaboracion', almacen:'almacen',
  mantenimiento:'mantenimiento',
  calidadlineas:'calidad', calidadfq:'calidad', calidadmicro:'calidad', calidadmat:'calidad',
  soplado:'soplado', mejoracontinua:'mejora'
};

const isAdmin = deptParam === 'admin';
let currentDept = isAdmin ? 'all' : (DEPT_MAP[deptParam] || 'envasado');
let allDocs = [];

// ─── CARGAR DATOS ─────────────────────────────────────────────────────────────
function cargarDatos() {
  const anio = document.getElementById('sel-anio').value;
  document.getElementById('main-content').innerHTML = '<div class="loading">Cargando datos...</div>';

  db.collection('horas_extras').get().then(snap => {
    allDocs = [];
    snap.forEach(doc => {
      const d = doc.data();
      if (d && d.fecha && d.fecha.startsWith(anio)) allDocs.push(d);
    });
    document.getElementById('total-docs').textContent = allDocs.length + ' días publicados en ' + anio;
    document.getElementById('last-update').textContent = 'Actualizado: ' + new Date().toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit'});
    renderDashboard();
  }).catch(e => {
    document.getElementById('main-content').innerHTML = '<div class="empty">Error al cargar datos de Firebase</div>';
  });
}

// ─── CALCULAR HORAS POR TRABAJADOR ───────────────────────────────────────────
function calcularResumen(docs) {
  // resumen[nombre] = { nombre, dept, pagar, compensar }
  const resumen = {};
  const safeArr = a => Array.isArray(a) ? a : [];

  docs.forEach(d => {
    const addW = (w, dept) => {
      if (!w || !w.nombre || !w.nombre.trim()) return;
      const key = w.nombre.trim().toUpperCase();
      const tipo = w.tipo || 'pagar';
      if (!resumen[key]) resumen[key] = { nombre: w.nombre.trim(), dept, pagar: 0, compensar: 0 };
      if (tipo === 'compensar') resumen[key].compensar += 1;
      else resumen[key].pagar += 8;
    };

    // Envasado especiales
    Object.values(d.envasado && d.envasado.special || {}).forEach(arr =>
      safeArr(arr).forEach(w => addW(w, 'envasado'))
    );
    // Envasado líneas
    safeArr(d.envasado && d.envasado.lines).forEach(l => {
      safeArr(l.maq).forEach(w => addW(w, 'envasado'));
      safeArr(l.ops).forEach(w => addW(w, 'envasado'));
    });
    // Post depts
    Object.entries(d.depts || {}).forEach(([deptId, puestos]) => {
      Object.values(puestos).forEach(arr => safeArr(arr).forEach(w => addW(w, deptId)));
    });
  });

  return Object.values(resumen).sort((a, b) => b.pagar - a.pagar);
}

// ─── RENDER PRINCIPAL ─────────────────────────────────────────────────────────
function renderDashboard() {
  const main = document.getElementById('main-content');

  if (isAdmin) {
    renderAdmin(main);
  } else {
    renderEncargado(main);
  }
}

// ─── RENDER ADMIN (todos los depts) ──────────────────────────────────────────
function renderAdmin(container) {
  const workers = calcularResumen(allDocs);

  // Summary global
  const totalPagar    = workers.reduce((s, w) => s + w.pagar, 0);
  const totalComp     = workers.reduce((s, w) => s + w.compensar, 0);
  const superan       = workers.filter(w => w.pagar > 64).length;
  const cerca         = workers.filter(w => w.pagar >= 56 && w.pagar <= 64).length;

  let html = `<div class="summary-grid" style="margin-bottom:20px">
    <div class="metric"><div class="metric-label">Total horas a pagar</div><div class="metric-val">${totalPagar}h</div><div class="metric-sub">${workers.length} trabajadores</div></div>
    <div class="metric"><div class="metric-label">Días a compensar</div><div class="metric-val">${totalComp}</div><div class="metric-sub">días pendientes total</div></div>
    <div class="metric ${superan > 0 ? 'danger' : ''}"><div class="metric-label">Superan 64h</div><div class="metric-val">${superan}</div><div class="metric-sub">trabajadores</div></div>
    <div class="metric ${cerca > 0 ? 'warning' : ''}"><div class="metric-label">Cerca del límite</div><div class="metric-val">${cerca}</div><div class="metric-sub">entre 56h y 64h</div></div>
  </div>`;

  // Sección por departamento
  DEPTS_CONFIG.forEach(dept => {
    const deptWorkers = workers.filter(w => w.dept === dept.id);
    if (!deptWorkers.length) return;
    const dPagar  = deptWorkers.reduce((s, w) => s + w.pagar, 0);
    const dComp   = deptWorkers.reduce((s, w) => s + w.compensar, 0);
    const dSuperan = deptWorkers.filter(w => w.pagar > 64).length;

    html += `<div class="dept-section">
      <div class="dept-section-header" style="background:${dept.color}">
        <span>${dept.label}</span>
        <span class="dept-stats">${deptWorkers.length} trabajadores · ${dPagar}h a pagar · ${dComp}d compensar${dSuperan > 0 ? ' · ⚠️ ' + dSuperan + ' superan 64h' : ''}</span>
      </div>
      <div class="dept-section-body" style="padding:10px 12px;display:flex;flex-direction:column;gap:7px">
        ${deptWorkers.map(w => workerCardHTML(w, false)).join('')}
      </div>
    </div>`;
  });

  if (!workers.length) html += '<div class="empty">No hay datos de horas extras para el año seleccionado</div>';
  container.innerHTML = html;
}

// ─── RENDER ENCARGADO (un dept con tabs si calidad) ───────────────────────────
function renderEncargado(container) {
  const deptConf = DEPTS_CONFIG.find(d => d.id === currentDept) || DEPTS_CONFIG[0];
  const workers = calcularResumen(allDocs).filter(w => w.dept === currentDept);

  const totalPagar = workers.reduce((s, w) => s + w.pagar, 0);
  const totalComp  = workers.reduce((s, w) => s + w.compensar, 0);
  const superan    = workers.filter(w => w.pagar > 64).length;
  const cerca      = workers.filter(w => w.pagar >= 56 && w.pagar <= 64).length;

  let html = `<div class="summary-grid">
    <div class="metric"><div class="metric-label">Horas a pagar</div><div class="metric-val">${totalPagar}h</div><div class="metric-sub">${workers.length} trabajadores</div></div>
    <div class="metric"><div class="metric-label">Días a compensar</div><div class="metric-val">${totalComp}</div><div class="metric-sub">días pendientes</div></div>
    <div class="metric ${superan > 0 ? 'danger' : ''}"><div class="metric-label">Superan 64h</div><div class="metric-val">${superan}</div><div class="metric-sub">trabajadores</div></div>
    <div class="metric ${cerca > 0 ? 'warning' : ''}"><div class="metric-label">Cerca del límite</div><div class="metric-val">${cerca}</div><div class="metric-sub">entre 56h y 64h</div></div>
  </div>
  <div class="section-title" style="margin-top:20px">Detalle por trabajador</div>
  <div style="display:flex;flex-direction:column;gap:8px">
    ${workers.length ? workers.map(w => workerCardHTML(w, false)).join('') : '<div class="empty">No hay datos para este departamento</div>'}
  </div>`;

  container.innerHTML = html;
}

// ─── WORKER CARD ──────────────────────────────────────────────────────────────
function workerCardHTML(w, showDept) {
  const pct = Math.min(100, Math.round(w.pagar / 64 * 100));
  const barColor = w.pagar > 64 ? '#e53935' : w.pagar >= 56 ? '#BA7517' : '#2e7d32';
  const superaLimit = w.pagar > 64;
  const cercaLimit  = w.pagar >= 56 && w.pagar <= 64;
  const deptLabel   = DEPTS_CONFIG.find(d => d.id === w.dept)?.label || w.dept;

  return `<div class="worker-card">
    <div class="worker-top">
      <div>
        <div class="worker-name">${w.nombre}</div>
        <div class="worker-dept">${deptLabel}</div>
      </div>
      <div class="badges">
        ${superaLimit ? '<span class="badge badge-limit">⚠️ Supera 64h</span>' : ''}
        ${cercaLimit  ? '<span class="badge badge-warning">⚡ Cerca límite</span>' : ''}
        <span class="badge badge-pagar">💰 ${w.pagar}h a pagar</span>
        ${w.compensar > 0 ? `<span class="badge badge-comp">🏖 ${w.compensar}d compensar</span>` : ''}
      </div>
    </div>
    <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
    <div class="bar-info"><span>${w.pagar}h de 64h máx (año)</span><span>${pct}%</span></div>
  </div>`;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
cargarDatos();
</script>
</body>
</html>
