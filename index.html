<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo Ubesol — Turnos</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f4f2ec;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    padding: 2rem;
  }
  .logo {
    font-size: 32px;
    font-weight: 800;
    color: #6a8a3a;
    letter-spacing: -0.01em;
  }
  .subtitle {
    font-size: 14px;
    color: #888;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 4px;
    text-align: center;
  }
  .cards {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .card {
    background: #fff;
    border: 1px solid #d0cdc5;
    border-radius: 12px;
    padding: 2rem 2.5rem;
    text-align: center;
    text-decoration: none;
    color: inherit;
    transition: all 0.15s;
    min-width: 220px;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    border-color: #6a8a3a;
  }
  .card-icon {
    font-size: 40px;
    margin-bottom: 1rem;
  }
  .card-title {
    font-size: 16px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 6px;
  }
  .card-desc {
    font-size: 12px;
    color: #888;
    line-height: 1.5;
  }
  .card.primary { border-color: #6a8a3a; }
  .card.primary .card-title { color: #6a8a3a; }
</style>
</head>
<body>
  <div>
    <div class="logo">GRUPOUBESOL</div>
    <div class="subtitle">Planificación de turnos semanal</div>
  </div>

  <div class="cards">
    <a href="ubesol_envasado.html" class="card primary">
      <div class="card-icon">📋</div>
      <div class="card-title">Cuadrante</div>
      <div class="card-desc">Rellena y gestiona los turnos semanales por departamento</div>
    </a>
    <a href="ubesol_tv.html" class="card">
      <div class="card-icon">📺</div>
      <div class="card-title">Pantalla TV</div>
      <div class="card-desc">Vista para proyectar en las pantallas de planta. Rotación automática cada 2 minutos</div>
    </a>
  </div>
</body>
</html>
